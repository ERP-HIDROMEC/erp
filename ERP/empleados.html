<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hidromec ERP — RRHH</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
  :root{--bg:#0f1117;--bg2:#181c27;--bg3:#1e2436;--border:rgba(255,255,255,0.07);--text:#e8eaf0;--muted:#7a8099;--blue:#3b82f6;--green:#10b981;--red:#ef4444;--orange:#f59e0b;--purple:#8b5cf6;--teal:#14b8a6;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
  .sidebar{position:fixed;left:0;top:0;bottom:0;width:220px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:100;}
  .sidebar-logo{padding:24px 20px 20px;border-bottom:1px solid var(--border);}
  .sidebar-logo h1{font-size:16px;font-weight:600;}
  .sidebar-logo span{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;}
  .nav-section{padding:16px 12px 8px;font-size:10px;font-weight:500;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;}
  .nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;margin:1px 8px;border-radius:8px;font-size:13.5px;color:var(--muted);cursor:pointer;transition:all 0.15s;text-decoration:none;}
  .nav-item:hover{background:var(--bg3);color:var(--text);}
  .nav-item.active{background:rgba(59,130,246,0.15);color:var(--blue);}
  .nav-item svg{width:16px;height:16px;flex-shrink:0;}
  .nav-bottom{margin-top:auto;padding:16px 12px;border-top:1px solid var(--border);}
  .btn-logout{width:100%;padding:9px 12px;background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.2);border-radius:8px;color:var(--red);font-size:13px;font-family:'DM Sans',sans-serif;cursor:pointer;}
  .main{margin-left:220px;padding:28px 32px;}
  .page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px;}
  .page-header h2{font-size:22px;font-weight:600;}
  .tabs{display:flex;gap:4px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:4px;margin-bottom:24px;width:fit-content;flex-wrap:wrap;}
  .tab{padding:8px 18px;border-radius:7px;font-size:13px;cursor:pointer;color:var(--muted);transition:all 0.15s;border:none;background:none;font-family:'DM Sans',sans-serif;}
  .tab.active{background:var(--blue);color:#fff;}
  .tab:hover:not(.active){color:var(--text);}
  .filtros{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;align-items:center;}
  .filtros select,.filtros input{padding:8px 12px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;font-family:'DM Sans',sans-serif;outline:none;}
  .filtros select:focus,.filtros input:focus{border-color:var(--blue);}
  .btn{padding:9px 18px;border-radius:8px;font-size:13px;font-weight:500;font-family:'DM Sans',sans-serif;cursor:pointer;border:none;transition:all 0.15s;}
  .btn-primary{background:var(--blue);color:#fff;}
  .btn-primary:hover{background:#2563eb;}
  .btn-ghost{background:var(--bg3);color:var(--text);border:1px solid var(--border);}
  .btn-ghost:hover{border-color:var(--blue);}
  .btn-danger{background:rgba(239,68,68,0.1);color:var(--red);border:1px solid rgba(239,68,68,0.2);}
  .btn-sm{padding:5px 12px;font-size:12px;}
  .panel{background:var(--bg2);border:1px solid var(--border);border-radius:12px;overflow:hidden;}
  table{width:100%;border-collapse:collapse;}
  th{padding:10px 16px;text-align:left;font-size:11px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:0.8px;border-bottom:1px solid var(--border);background:var(--bg3);}
  td{padding:11px 16px;font-size:13px;color:var(--text);border-bottom:1px solid var(--border);vertical-align:middle;}
  tr:last-child td{border-bottom:none;}
  tr:hover td{background:rgba(255,255,255,0.02);}
  .mono{font-family:'DM Mono',monospace;font-size:12px;}
  .tag{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:500;}
  .tag.activo{background:rgba(16,185,129,0.15);color:var(--green);}
  .tag.inactivo{background:rgba(122,128,153,0.15);color:var(--muted);}
  .tag.convenio{background:rgba(59,130,246,0.15);color:var(--blue);}
  .tag.fuera_convenio{background:rgba(139,92,246,0.15);color:var(--purple);}
  .tag.monotributo{background:rgba(245,158,11,0.15);color:var(--orange);}
  .tag.pagado{background:rgba(16,185,129,0.15);color:var(--green);}
  .tag.pendiente{background:rgba(245,158,11,0.15);color:var(--orange);}
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:200;align-items:center;justify-content:center;}
  .modal-overlay.show{display:flex;}
  .modal{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:32px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto;}
  .modal h3{font-size:18px;font-weight:600;margin-bottom:24px;}
  .form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px;}
  .form-row.full{grid-template-columns:1fr;}
  .form-row.three{grid-template-columns:1fr 1fr 1fr;}
  .form-group{display:flex;flex-direction:column;gap:6px;}
  label{font-size:11.5px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:0.7px;}
  input,select,textarea{padding:10px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13.5px;font-family:'DM Sans',sans-serif;outline:none;transition:border-color 0.15s;}
  input:focus,select:focus,textarea:focus{border-color:var(--blue);}
  .modal-footer{display:flex;justify-content:flex-end;gap:10px;margin-top:24px;padding-top:20px;border-top:1px solid var(--border);}
  .kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px;}
  .kpi-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:18px 20px;position:relative;overflow:hidden;}
  .kpi-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;}
  .kpi-card.blue::before{background:var(--blue);}
  .kpi-card.green::before{background:var(--green);}
  .kpi-card.orange::before{background:var(--orange);}
  .kpi-card.purple::before{background:var(--purple);}
  .kpi-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:8px;}
  .kpi-value{font-size:20px;font-weight:600;font-family:'DM Mono',monospace;}
  .empty{padding:40px;text-align:center;color:var(--muted);font-size:13px;}
  .spinner-wrap{display:flex;align-items:center;justify-content:center;padding:40px;color:var(--muted);}
  .spinner{width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin 0.8s linear infinite;margin-right:10px;}
  @keyframes spin{to{transform:rotate(360deg);}}
  @media(max-width:768px){.main{margin-left:0;padding:16px;}.kpi-grid{grid-template-columns:repeat(2,1fr);}.form-row,.form-row.three{grid-template-columns:1fr;}}
</style>
</head>

<script>
// DB inicializado en erp-utils.js
// fmt inicializado en erp-utils.js
// fmtF inicializado en erp-utils.js
// hoy inicializado en erp-utils.js
let tabActual='empleados';
let empEditId=null;
let cliEditId=null;

async function init(){
  const usuario = await getUsuario();
  if (!usuario) return;
  await verificarAcceso('empleados');
  document.getElementById('ns-periodo').value=new Date().toISOString().substring(0,7);
  document.getElementById('ns-fecha-pago').value=hoy();
  await cargarEmpleadosModal();
  await cargarEmpleados();
}

function cambiarTab(tab,btn){
  tabActual=tab;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  const btnNuevo=document.getElementById('btn-nuevo');
  btnNuevo.textContent=tab==='clientes'?'+ Nuevo cliente':tab==='sueldos'?'+ Registrar sueldo':tab==='costos'?'':'+ Nuevo empleado';
  btnNuevo.style.display=tab==='costos'?'none':'';
  document.getElementById('f-estado').style.display=tab==='sueldos'||tab==='costos'?'none':'';
  recargar();
}

function recargar(){
  if(tabActual==='empleados') cargarEmpleados();
  else if(tabActual==='sueldos') cargarSueldos();
  else if(tabActual==='costos') cargarCostos();
  else cargarClientes();
}

function abrirNuevo(){
  if(tabActual==='clientes') abrirNuevoCliente();
  else if(tabActual==='sueldos') abrirNuevoSueldo();
  else abrirNuevoEmpleado();
}

// ===== EMPLEADOS =====
async function cargarEmpleados(){
  document.getElementById('contenido').innerHTML='<div class="spinner-wrap"><div class="spinner"></div>Cargando...</div>';
  const emp=document.getElementById('f-empresa').value;
  const activo=document.getElementById('f-estado').value;
  const buscar=document.getElementById('f-buscar').value.toLowerCase();

  const activos=rows.filter(r=>r.activo).length;

  document.getElementById('kpis').innerHTML=`

    <div class="kpi-card green"><div class="kpi-label">Fuera convenio / Mono</div><div class="kpi-value">${rows.filter(r=>r.activo&&r.tipo_contrato!=='convenio').length}</div></div>`;

  document.getElementById('contenido').innerHTML=`
    <div style="overflow-x:auto"><table>
      <thead><tr><th>Empresa</th><th>Nombre</th><th>DNI</th><th>Categoría</th><th>Contrato</th><th>Costo/hora</th><th>Estado</th><th>Acciones</th></tr></thead>
      <tbody>${rows.length?rows.map(r=>`<tr>
        <td style="font-size:12px">${r.empresas?.nombre||'—'}</td>
        <td><strong>${r.nombre}</strong></td>
        <td class="mono">${r.dni||'—'}</td>
        <td style="font-size:12px;color:var(--muted)">${r.categoria||'—'}</td>
        <td><span class="tag ${r.tipo_contrato}">${r.tipo_contrato}</span></td>
        <td class="mono">${fmt(r.costo_hora)}/h</td>
        <td><span class="tag ${r.activo?'activo':'inactivo'}">${r.activo?'Activo':'Inactivo'}</span></td>

          <button class="btn btn-sm btn-danger" onclick="toggleActivo('${r.id}',${r.activo})">${r.activo?'Dar baja':'Reactivar'}</button>
        </div></td>
      </tr>`).join(''):'<tr><td colspan="8" style="text-align:center;padding:40px;color:var(--muted)">Sin empleados</td></tr>'}</tbody>
    </table></div>`;
}

async function editarEmpleado(id){

  empEditId=id;
  document.getElementById('emp-titulo').textContent='Editar empleado';

function calcularNeto(){
  const bruto=parseFloat(document.getElementById('ns-bruto').value)||0;
  const ded=parseFloat(document.getElementById('ns-deducciones').value)||0;
  document.getElementById('ns-neto').value=(bruto-ded).toFixed(2);

async function cargarSueldos(){
  document.getElementById('kpis').innerHTML='';
  document.getElementById('contenido').innerHTML='<div class="spinner-wrap"><div class="spinner"></div>Cargando...</div>';
  const emp=document.getElementById('f-empresa').value;
  const buscar=document.getElementById('f-buscar').value.toLowerCase();
  let q=db.from('sueldos').select('*,empleados(nombre),empresas(nombre)').order('periodo',{ascending:false});
  if(emp) q=q.eq('empresa_id',emp);
  const {data}=await q;
  let rows=data||[];
  if(buscar) rows=rows.filter(r=>(r.empleados?.nombre||'').toLowerCase().includes(buscar));

  const totalBruto=rows.reduce((s,r)=>s+Number(r.monto_bruto||0),0);
  const totalNeto=rows.reduce((s,r)=>s+Number(r.monto_neto||0),0);
  const pendientes=rows.filter(r=>!r.pagado).length;

  document.getElementById('kpis').innerHTML=`
    <div class="kpi-card blue"><div class="kpi-label">Total bruto</div><div class="kpi-value" style="font-size:16px">${fmt(totalBruto)}</div></div>
    <div class="kpi-card green"><div class="kpi-label">Total neto</div><div class="kpi-value" style="font-size:16px">${fmt(totalNeto)}</div></div>
    <div class="kpi-card orange"><div class="kpi-label">Pendientes de pago</div><div class="kpi-value">${pendientes}</div></div>
    <div class="kpi-card purple"><div class="kpi-label">Registros</div><div class="kpi-value">${rows.length}</div></div>`;

  document.getElementById('contenido').innerHTML=`
    <div style="overflow-x:auto"><table>
      <thead><tr><th>Empresa</th><th>Empleado</th><th>Período</th><th>Tipo</th><th>Bruto</th><th>Deducciones</th><th>Neto</th><th>Estado</th><th>Acciones</th></tr></thead>
      <tbody>${rows.length?rows.map(r=>`<tr>
        <td style="font-size:12px">${r.empresas?.nombre||'—'}</td>
        <td>${r.empleados?.nombre||'—'}</td>
        <td class="mono">${r.periodo}</td>
        <td><span class="tag ${r.tipo}">${r.tipo}</span></td>
        <td class="mono">${fmt(r.monto_bruto)}</td>
        <td class="mono" style="color:var(--red)">-${fmt(r.deducciones)}</td>
        <td class="mono" style="color:var(--green)">${fmt(r.monto_neto)}</td>
        <td><span class="tag ${r.pagado?'pagado':'pendiente'}">${r.pagado?'Pagado':'Pendiente'}</span></td>
        <td><div style="display:flex;gap:6px">
          ${!r.pagado?`<button class="btn btn-sm btn-ghost" onclick="pagarSueldo('${r.id}')">✓ Pagar</button>`:''}
          <button class="btn btn-sm btn-danger" onclick="borrarSueldo('${r.id}')">Borrar</button>
        </div></td>
      </tr>`).join(''):'<tr><td colspan="9" style="text-align:center;padding:40px;color:var(--muted)">Sin sueldos registrados</td></tr>'}</tbody>
    </table></div>`;
}

function abrirNuevoSueldo(){

  document.getElementById('ns-neto').value='';
  document.getElementById('modal-sueldo').classList.add('show');

async function guardarSueldo(){
  const bruto=parseFloat(document.getElementById('ns-bruto').value)||0;
  const neto=parseFloat(document.getElementById('ns-neto').value)||0;
  if(!bruto){alert('Ingresá el monto bruto.');return;}
  const pagado=document.getElementById('ns-pagado').value==='true';
  const {error}=await db.from('sueldos').insert({
    empresa_id:document.getElementById('ns-empresa').value,
    empleado_id:document.getElementById('ns-empleado').value,
    periodo:document.getElementById('ns-periodo').value,
    tipo:document.getElementById('ns-tipo').value,
    monto_bruto:bruto,
    deducciones:parseFloat(document.getElementById('ns-deducciones').value)||0,
    monto_neto:neto||bruto,
    pagado,
    fecha_pago:pagado?document.getElementById('ns-fecha-pago').value:null,
  });

  cerrarModal('modal-sueldo');
  cargarSueldos();
}

async function pagarSueldo(id){
  await db.from('sueldos').update({pagado:true,fecha_pago:hoy()}).eq('id',id);
  cargarSueldos();
}

async function borrarSueldo(id){
  if(!confirm('¿Borrar este registro de sueldo?')) return;
  await db.from('sueldos').delete().eq('id',id);
  cargarSueldos();
}

        ${!rows.length?'<div style="color:var(--muted);font-size:13px">No hay roles configurados. Ejecutá el script 17_costos_categoria.sql primero.</div>':''}

async function guardarCostoRol(id,empId,rol){
  const monto=parseFloat(document.getElementById('costo-'+id).value)||0;
  const {error}=await db.from('costos_roles').update({costo_hora:monto}).eq('id',id);
  if(error){alert('Error: '+error.message);return;}
  // Feedback visual
  const btn=event.target;
  btn.textContent='✓ Guardado';
  btn.style.background='var(--green)';
  setTimeout(()=>{btn.textContent='Guardar';btn.style.background='';},2000);
}

function exportarModulo(){
  const filas=document.querySelectorAll('#contenido table tbody tr');
  if(!filas.length){alert('No hay datos para exportar.');return;}
  // Recolectar headers
  const ths=document.querySelectorAll('#contenido table thead th');
  const headers=[...ths].map(t=>t.textContent.trim()).filter(h=>h&&h!=='');
  // Recolectar filas
  const rows=[];
  filas.forEach(tr=>{
    const tds=[...tr.querySelectorAll('td')].map(td=>td.textContent.trim().replace(/\n/g,' '));
    if(tds.some(v=>v)) rows.push(tds.slice(0,headers.length));
  });
  if(!rows.length){alert('No hay datos para exportar.');return;}
  let csv=headers.join(',')+'\n';
  rows.forEach(r=>{csv+=r.map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(',')+'\n';});
  const blob=new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download='Empleados_'+new Date().toISOString().split('T')[0]+'.csv';a.click();URL.revokeObjectURL(url);
}

function cerrarModal(id){document.getElementById(id).classList.remove('show');}
