<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hidromec ERP — Presupuestos</title>
<link rel="stylesheet" href="erp-layout.css">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="erp-utils.js"></script>
<script src="erp-sidebar.js"></script>
<script src="lib/empresas.api.js"></script>
<script src="lib/clientes.api.js"></script>
<script src="lib/proyectos.api.js"></script>
<script src="lib/empleados.api.js"></script>
<script src="lib/presupuestos.api.js"></script>
<style>
  .btn-warning{background:rgba(245,158,11,0.15);color:var(--orange);border:1px solid rgba(245,158,11,0.2);}
  .kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px;}
  .kpi-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:18px 20px;position:relative;overflow:hidden;}
  .kpi-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;}
  .kpi-card.blue::before{background:var(--blue);}
  .kpi-card.green::before{background:var(--green);}
  .kpi-card.orange::before{background:var(--orange);}
  .kpi-card.red::before{background:var(--red);}
  .kpi-.kpi-value{font-size:20px;font-weight:600;font-family:'DM Mono',monospace;}
  tr:last-child tr:hover .estado.borrador{background:rgba(122,128,153,0.15);color:var(--muted);}
  .estado.enviado{background:rgba(59,130,246,0.15);color:var(--blue);}
  .estado.aprobado{background:rgba(16,185,129,0.15);color:var(--green);}
  .estado.rechazado{background:rgba(239,68,68,0.15);color:var(--red);}
  .modal-sub{font-size:13px;color:var(--muted);margin-bottom:24px;}
  .form-row.three{grid-template-columns:1fr 1fr 1fr;}
  .resumen-box{background:var(--bg3);border-radius:10px;padding:16px;margin:14px 0;}
  .resumen-row{display:flex;justify-content:space-between;padding:5px 0;font-size:13px;border-bottom:1px solid var(--border);}
  .resumen-row:last-child{border-bottom:none;font-weight:600;font-size:14px;padding-top:10px;}
  .margen-badge{display:inline-block;padding:4px 12px;border-radius:20px;font-size:13px;font-weight:600;}
  @media(max-width:768px){.main{margin-left:0;padding:16px;}.kpi-grid{grid-template-columns:repeat(2,1fr);}.form-row,.form-row.three{grid-template-columns:1fr;}}
</style>
</head>
<body>
<div id="overlay" class="overlay" onclick="ERP.closeSidebar()"></div>
<div id="sidebar-root"></div>

<main class="main">
  <div class="page-header">
    <h2>Presupuestos</h2>
    <button class="btn btn-primary" onclick="abrirNuevo()">+ Nuevo presupuesto</button>
  </div>

  <div class="filtros">
    <select id="f-empresa" onchange="cargarPresupuestos()">
      <option value="">Todas las empresas</option>
      <option value="a1000000-0000-0000-0000-000000000001">Hidromec</option>
      <option value="a2000000-0000-0000-0000-000000000002">Placemem</option>
    </select>
    <select id="f-estado" onchange="cargarPresupuestos()">
      <option value="">Todos los estados</option>
      <option value="borrador">Borrador</option>
      <option value="enviado">Enviado</option>
      <option value="aprobado">Aprobado</option>
      <option value="rechazado">Rechazado</option>
    </select>
    <input type="text" id="f-buscar" placeholder="Buscar cliente o descripción..." oninput="cargarPresupuestos()" style="min-width:220px">
  </div>

  <div class="kpi-grid" id="kpis"></div>

  <div class="panel">
    <div id="contenido"><div class="spinner-wrap"><div class="spinner"></div>Cargando...</div></div>
  </div>
</main>

<!-- MODAL PRESUPUESTO -->
<div class="modal-overlay" id="modal-pres">
  <div class="modal">
    <h3 id="pres-titulo">Nuevo presupuesto</h3>
    <p class="modal-sub">Calculá el costo interno y el precio de venta para la propuesta comercial</p>

    <div class="form-row">
      <div class="form-group">
        <label>Empresa</label>
        <select id="np-empresa" onchange="cargarDatosModal()">
          <option value="a1000000-0000-0000-0000-000000000001">Hidromec</option>
          <option value="a2000000-0000-0000-0000-000000000002">Placemem</option>
        </select>
      </div>
      <div class="form-group">
        <label>Cliente</label>
        <select id="np-cliente"></select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Proyecto (opcional)</label>
        <select id="np-proyecto"></select>
      </div>
      <div class="form-group">
        <label>N° Presupuesto</label>
        <input type="text" id="np-numero" placeholder="P-2026-001">
      </div>
    </div>
    <div class="form-row full">
      <div class="form-group">
        <label>Descripción del trabajo</label>
        <textarea id="np-descripcion" placeholder="Describí el alcance del trabajo..."></textarea>
      </div>
    </div>

    <div style="font-size:12px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:0.8px;margin:16px 0 12px">Costos estimados</div>

    <div class="form-row three">
      <div class="form-group">
        <label>Horas estimadas</label>
        <input type="number" id="np-horas" placeholder="0" oninput="calcularPresupuesto()">
      </div>
      <div class="form-group">
        <label>Costo hora promedio</label>
        <input type="number" id="np-costo-hora" placeholder="0.00" oninput="calcularPresupuesto()">
      </div>
      <div class="form-group">
        <label>Costo mano de obra</label>
        <input type="number" id="np-costo-horas" placeholder="0.00" readonly style="color:var(--orange)">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Materiales estimados</label>
        <input type="number" id="np-materiales" placeholder="0.00" oninput="calcularPresupuesto()">
      </div>
      <div class="form-group">
        <label>Otros costos</label>
        <input type="number" id="np-otros" placeholder="0.00" oninput="calcularPresupuesto()">
      </div>
    </div>

    <div class="resumen-box" id="resumen-calculo">
      <div class="resumen-row"><span style="color:var(--muted)">Costo mano de obra</span><span id="r-mo">$0</span></div>
      <div class="resumen-row"><span style="color:var(--muted)">Costo materiales</span><span id="r-mat">$0</span></div>
      <div class="resumen-row"><span style="color:var(--muted)">Otros costos</span><span id="r-otros">$0</span></div>
      <div class="resumen-row"><span>Costo total interno</span><span id="r-costo-total" style="color:var(--orange)">$0</span></div>
    </div>

    <div style="font-size:12px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:0.8px;margin:16px 0 12px">Precio de venta</div>

    <div class="form-row three">
      <div class="form-group">
        <label>% Margen deseado</label>
        <input type="number" id="np-margen-pct" placeholder="30" oninput="calcularPrecioVenta()">
      </div>
      <div class="form-group">
        <label>Precio venta sugerido</label>
        <input type="number" id="np-precio-sugerido" readonly style="color:var(--green)">
      </div>
      <div class="form-group">
        <label>Precio venta final</label>
        <input type="number" id="np-precio-venta" placeholder="0.00" oninput="calcularMargenReal()">
      </div>
    </div>

    <div class="resumen-box">
      <div class="resumen-row"><span style="color:var(--muted)">Costo total</span><span id="r2-costo">$0</span></div>
      <div class="resumen-row"><span style="color:var(--muted)">Precio de venta</span><span id="r2-venta">$0</span></div>
      <div class="resumen-row">
        <span>Margen real</span>
        <span id="r2-margen">
          <span class="margen-badge" id="margen-badge" style="background:var(--bg3);color:var(--muted)">0%</span>
        </span>
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Estado</label>
        <select id="np-estado">
          <option value="borrador">Borrador</option>
          <option value="enviado">Enviado al cliente</option>
          <option value="aprobado">Aprobado</option>
          <option value="rechazado">Rechazado</option>
        </select>
      </div>
      <div class="form-group">
        <label>Fecha envío</label>
        <input type="date" id="np-fecha-envio">
      </div>
    </div>
    <div class="form-row full">
      <div class="form-group">
        <label>Observaciones</label>
        <textarea id="np-obs" placeholder="Condiciones, vigencia, notas..."></textarea>
      </div>
    </div>

    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="cerrarModal()">Cancelar</button>
      <button class="btn btn-ghost" onclick="guardarPresupuesto('borrador')">Guardar borrador</button>
      <button class="btn btn-primary" onclick="guardarPresupuesto()">Guardar</button>
    </div>
  </div>
</div>

<script>
let editId=null;

async function init(){
  const usuario = await ERP.initLayout('presupuestos');
  if(!usuario) return;
  await cargarDatosModal();
  await cargarPresupuestos();
}

async function cargarDatosModal(){
  const empId=document.getElementById('np-empresa').value;
  const [{data:clientes},{data:proyectos}]=await Promise.all([
    ClientesAPI.getClientesSelect(empId).then(d=>({data:d})),
    ProyectosAPI.getProyectosSelect(empId,['activo','pausado']).then(d=>({data:d})),
  ]);
  document.getElementById('np-cliente').innerHTML='<option value="">Sin cliente</option>'+(clientes||[]).map(c=>`<option value="${c.id}">${c.nombre}</option>`).join('');
  document.getElementById('np-proyecto').innerHTML='<option value="">Sin proyecto asociado</option>'+(proyectos||[]).map(p=>`<option value="${p.id}">${p.nombre}</option>`).join('');

  // Costo hora promedio de empleados activos de esa empresa
  const emps=await EmpleadosAPI.getEmpleadosConCostoHora(empId);
  if(emps&&emps.length){
    const promedio=emps.reduce((s,e)=>s+Number(e.costo_hora||0),0)/emps.length;
    document.getElementById('np-costo-hora').value=Math.round(promedio);
    calcularPresupuesto();
  }
}

function calcularPresupuesto(){
  const horas=parseFloat(document.getElementById('np-horas').value)||0;
  const costoHora=parseFloat(document.getElementById('np-costo-hora').value)||0;
  const materiales=parseFloat(document.getElementById('np-materiales').value)||0;
  const otros=parseFloat(document.getElementById('np-otros').value)||0;
  const mo=horas*costoHora;
  const total=mo+materiales+otros;
  document.getElementById('np-costo-horas').value=mo.toFixed(2);
  document.getElementById('r-mo').textContent=fmt(mo);
  document.getElementById('r-mat').textContent=fmt(materiales);
  document.getElementById('r-otros').textContent=fmt(otros);
  document.getElementById('r-costo-total').textContent=fmt(total);
  document.getElementById('r2-costo').textContent=fmt(total);
  calcularPrecioVenta();
}

function calcularPrecioVenta(){
  const mo=parseFloat(document.getElementById('np-costo-horas').value)||0;
  const mat=parseFloat(document.getElementById('np-materiales').value)||0;
  const otros=parseFloat(document.getElementById('np-otros').value)||0;
  const total=mo+mat+otros;
  const margenPct=parseFloat(document.getElementById('np-margen-pct').value)||30;
  const sugerido=total>0?total/(1-margenPct/100):0;
  document.getElementById('np-precio-sugerido').value=Math.round(sugerido);
  if(!document.getElementById('np-precio-venta').value){
    document.getElementById('np-precio-venta').value=Math.round(sugerido);
    calcularMargenReal();
  }
}

function calcularMargenReal(){
  const mo=parseFloat(document.getElementById('np-costo-horas').value)||0;
  const mat=parseFloat(document.getElementById('np-materiales').value)||0;
  const otros=parseFloat(document.getElementById('np-otros').value)||0;
  const total=mo+mat+otros;
  const venta=parseFloat(document.getElementById('np-precio-venta').value)||0;
  document.getElementById('r2-venta').textContent=fmt(venta);
  const margen=venta>0?Math.round((venta-total)/venta*100):0;
  const badge=document.getElementById('margen-badge');
  badge.textContent=margen+'%';
  badge.style.background=margen>=30?'rgba(16,185,129,0.15)':margen>=15?'rgba(245,158,11,0.15)':'rgba(239,68,68,0.15)';
  badge.style.color=margen>=30?'var(--green)':margen>=15?'var(--orange)':'var(--red)';
}

async function cargarPresupuestos(){
  document.getElementById('contenido').innerHTML='<div class="spinner-wrap"><div class="spinner"></div>Cargando...</div>';
  const emp=document.getElementById('f-empresa').value;
  const estado=document.getElementById('f-estado').value;
  const buscar=document.getElementById('f-buscar').value.toLowerCase();

  const presData=await PresupuestosAPI.getPresupuestos({}); let q={data:presData};
  if(emp) q=q.eq('empresa_id',emp);
  if(estado) q=q.eq('estado',estado);
  const {data}=await q;
  let rows=data||[];
  if(buscar) rows=rows.filter(r=>(r.descripcion||'').toLowerCase().includes(buscar)||(r.clientes?.nombre||'').toLowerCase().includes(buscar));

  const aprobados=rows.filter(r=>r.estado==='aprobado');
  const enviados=rows.filter(r=>r.estado==='enviado');
  const totalAprobado=aprobados.reduce((s,r)=>s+Number(r.precio_venta||0),0);
  const totalEnviado=enviados.reduce((s,r)=>s+Number(r.precio_venta||0),0);
  const tasaEfectividad=rows.length>0?Math.round(aprobados.length/rows.filter(r=>r.estado!=='borrador').length*100||0):0;

  document.getElementById('kpis').innerHTML=`
    <div class="kpi-card blue"><div class="kpi-label">Total presupuestos</div><div class="kpi-value">${rows.length}</div></div>
    <div class="kpi-card green"><div class="kpi-label">Aprobados</div><div class="kpi-value">${aprobados.length} — ${fmt(totalAprobado)}</div></div>
    <div class="kpi-card orange"><div class="kpi-label">En espera (enviados)</div><div class="kpi-value">${enviados.length} — ${fmt(totalEnviado)}</div></div>
    <div class="kpi-card ${tasaEfectividad>=50?'green':'red'}"><div class="kpi-label">Tasa de aprobación</div><div class="kpi-value">${tasaEfectividad}%</div></div>`;

  document.getElementById('contenido').innerHTML=`
    <div style="overflow-x:auto"><table>
      <thead><tr>
        <th>Empresa</th><th>N°</th><th>Cliente</th><th>Descripción</th>
        <th>Costo interno</th><th>Precio venta</th><th>Margen</th>
        <th>Estado</th><th>Fecha envío</th><th>Acciones</th>
      </tr></thead>
      <tbody>${rows.length?rows.map(r=>{
        const margen=r.precio_venta>0?Math.round((r.precio_venta-r.costo_total)/r.precio_venta*100):0;
        return`<tr>
          <td style="font-size:12px">${r.empresas?.nombre||'—'}</td>
          <td class="mono">${r.numero||'—'}</td>
          <td>${r.clientes?.nombre||'Sin cliente'}</td>
          <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:12px">${r.descripcion||'—'}</td>
          <td class="mono" style="color:var(--orange)">${fmt(r.costo_total)}</td>
          <td class="mono" style="color:var(--green)">${fmt(r.precio_venta)}</td>
          <td>
            <span style="font-family:'DM Mono',monospace;font-size:12px;padding:2px 8px;border-radius:4px;
              background:${margen>=30?'rgba(16,185,129,0.15)':margen>=15?'rgba(245,158,11,0.15)':'rgba(239,68,68,0.15)'};
              color:${margen>=30?'var(--green)':margen>=15?'var(--orange)':'var(--red)'}">${margen}%</span>
          </td>
          <td><span class="estado ${r.estado}">${r.estado}</span></td>
          <td class="mono" style="font-size:12px">${fmtF(r.fecha_envio)}</td>
          <td><div style="display:flex;gap:6px">
            <button class="btn btn-sm btn-ghost" onclick="editarPresupuesto('${r.id}')">Editar</button>
            ${r.estado==='aprobado'?`<button class="btn btn-sm btn-success" onclick="convertirAProyecto('${r.id}')">→ Proyecto</button>`:''}
            ${r.estado==='borrador'||r.estado==='enviado'?`<button class="btn btn-sm btn-warning" onclick="cambiarEstado('${r.id}','enviado')">Enviar</button>`:''}
            <button class="btn btn-sm btn-danger" onclick="borrar('${r.id}')">Borrar</button>
          </div></td>
        </tr>`;
      }).join(''):'<tr><td colspan="10" style="text-align:center;padding:40px;color:var(--muted)">Sin presupuestos</td></tr>'}</tbody>
    </table></div>`;
}

function abrirNuevo(){
  editId=null;
  document.getElementById('pres-titulo').textContent='Nuevo presupuesto';
  ['np-numero','np-descripcion','np-horas','np-materiales','np-otros','np-precio-venta','np-obs'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('np-estado').value='borrador';
  document.getElementById('np-margen-pct').value='30';
  document.getElementById('np-fecha-envio').value='';
  cargarDatosModal();
  document.getElementById('modal-pres').classList.add('show');
}

async function editarPresupuesto(id){
  const r=await PresupuestosAPI.getPresupuestoById(id);
  if(!r) return;
  editId=id;
  document.getElementById('pres-titulo').textContent='Editar presupuesto';
  document.getElementById('np-empresa').value=r.empresa_id;
  await cargarDatosModal();
  document.getElementById('np-cliente').value=r.cliente_id||'';
  document.getElementById('np-proyecto').value=r.proyecto_id||'';
  document.getElementById('np-numero').value=r.numero||'';
  document.getElementById('np-descripcion').value=r.descripcion||'';
  document.getElementById('np-horas').value=r.horas_estimadas||'';
  document.getElementById('np-costo-hora').value=r.horas_estimadas&&r.costo_horas?Math.round(r.costo_horas/r.horas_estimadas):'';
  document.getElementById('np-materiales').value=r.materiales_estimados||'';
  document.getElementById('np-otros').value=r.otros_costos||'';
  document.getElementById('np-precio-venta').value=r.precio_venta||'';
  document.getElementById('np-margen-pct').value=r.margen_porcentaje||'30';
  document.getElementById('np-estado').value=r.estado;
  document.getElementById('np-fecha-envio').value=r.fecha_envio||'';
  document.getElementById('np-obs').value=r.observaciones||'';
  calcularPresupuesto();
  document.getElementById('modal-pres').classList.add('show');
}

async function guardarPresupuesto(estadoOverride){
  const desc=document.getElementById('np-descripcion').value.trim();
  if(!desc){toast('Ingresá la descripción del trabajo.', 'warn');return;}
  const mo=parseFloat(document.getElementById('np-costo-horas').value)||0;
  const mat=parseFloat(document.getElementById('np-materiales').value)||0;
  const otros=parseFloat(document.getElementById('np-otros').value)||0;
  const costoTotal=mo+mat+otros;
  const precioVenta=parseFloat(document.getElementById('np-precio-venta').value)||0;
  const margen=precioVenta>0?Math.round((precioVenta-costoTotal)/precioVenta*100):0;

  const payload={
    empresa_id:document.getElementById('np-empresa').value,
    cliente_id:document.getElementById('np-cliente').value||null,
    proyecto_id:document.getElementById('np-proyecto').value||null,
    numero:document.getElementById('np-numero').value||null,
    descripcion:desc,
    horas_estimadas:parseFloat(document.getElementById('np-horas').value)||null,
    costo_horas:mo||null,
    materiales_estimados:mat||null,
    otros_costos:otros||null,
    costo_total:costoTotal||null,
    precio_venta:precioVenta||null,
    margen_porcentaje:margen||null,
    estado:estadoOverride||document.getElementById('np-estado').value,
    fecha_envio:document.getElementById('np-fecha-envio').value||null,
    observaciones:document.getElementById('np-obs').value||null,
  };
  let error;
  try{ if(editId){ await PresupuestosAPI.actualizarPresupuesto(editId,payload); } else { await PresupuestosAPI.crearPresupuesto(payload); } }catch(e){error=e;}
  if(error){toast('Error: ', 'error');return;}
  cerrarModal();
  cargarPresupuestos();
}

async function cambiarEstado(id,estado){
  await PresupuestosAPI.cambiarEstado(id,estado);
  cargarPresupuestos();
}

async function convertirAProyecto(id){
  const p=await PresupuestosAPI.getPresupuestoById(id);
  if(!p) return;
  if(!(await confirmar(`¿Crear proyecto desde el presupuesto "${p.descripcion.substring(0,50)}"?`))) return;
  try{ await ProyectosAPI.crearProyecto({
    empresa_id:p.empresa_id,
    cliente_id:p.cliente_id,
    nombre:p.descripcion.substring(0,100),
    tipo:'proyecto',
    estado:'activo',
    presupuesto_estimado:p.precio_venta,
    fecha_inicio:hoy(),
  });
  if(error){toast('Error: ', 'error');return;}
  await PresupuestosAPI.cambiarEstado(id,'aprobado');
  toast('Proyecto creado. Podés verlo en el módulo Operaciones → Proyectos.', 'success');
  cargarPresupuestos();
}

async function borrar(id){
  if(!(await confirmar('¿Borrar este presupuesto?'))) return;
  await PresupuestosAPI.eliminarPresupuesto(id);
  cargarPresupuestos();
}

function cerrarModal(){document.getElementById('modal-pres').classList.remove('show');}
// logout() → ahora en ERP.logout() (erp-sidebar.js)

init();
</script>
</body>
</html>
