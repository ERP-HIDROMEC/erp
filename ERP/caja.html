<style>
  :root{--bg:#0f1117;--bg2:#181c27;--bg3:#1e2436;--border:rgba(255,255,255,0.07);--text:#e8eaf0;--muted:#7a8099;--blue:#3b82f6;--green:#10b981;--red:#ef4444;--orange:#f59e0b;--purple:#8b5cf6;--teal:#14b8a6;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
  .sidebar{position:fixed;left:0;top:0;bottom:0;width:220px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:100;}
  .sidebar-logo{padding:24px 20px 20px;border-bottom:1px solid var(--border);}
  .sidebar-logo h1{font-size:16px;font-weight:600;}
  .sidebar-logo span{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;}
  .nav-section{padding:16px 12px 8px;font-size:10px;font-weight:500;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;}
  .nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;margin:1px 8px;border-radius:8px;font-size:13.5px;color:var(--muted);cursor:pointer;transition:all 0.15s;text-decoration:none;}
  .nav-item:hover{background:var(--bg3);color:var(--text);}
  .nav-item.active{background:rgba(59,130,246,0.15);color:var(--blue);}
  .nav-item svg{width:16px;height:16px;flex-shrink:0;}
  .nav-bottom{margin-top:auto;padding:16px 12px;border-top:1px solid var(--border);}
  .btn-logout{width:100%;padding:9px 12px;background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.2);border-radius:8px;color:var(--red);font-size:13px;font-family:'DM Sans',sans-serif;cursor:pointer;}
  .main{margin-left:220px;padding:28px 32px;}
  .page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px;}
  .page-header h2{font-size:22px;font-weight:600;}
  .tabs{display:flex;gap:4px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:4px;margin-bottom:24px;width:fit-content;flex-wrap:wrap;}
  .tab{padding:8px 16px;border-radius:7px;font-size:13px;cursor:pointer;color:var(--muted);transition:all 0.15s;border:none;background:none;font-family:'DM Sans',sans-serif;}
  .tab.active{background:var(--blue);color:#fff;}
  .tab:hover:not(.active){color:var(--text);}
  .filtros{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;align-items:center;}
  .filtros select,.filtros input{padding:8px 12px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;font-family:'DM Sans',sans-serif;outline:none;}
  .btn{padding:9px 18px;border-radius:8px;font-size:13px;font-weight:500;font-family:'DM Sans',sans-serif;cursor:pointer;border:none;transition:all 0.15s;}
  .btn-primary{background:var(--blue);color:#fff;}
  .btn-primary:hover{background:#2563eb;}
  .btn-ghost{background:var(--bg3);color:var(--text);border:1px solid var(--border);}
  .btn-ghost:hover{border-color:var(--blue);}
  .btn-danger{background:rgba(239,68,68,0.1);color:var(--red);border:1px solid rgba(239,68,68,0.2);}
  .btn-success{background:var(--green);color:#fff;}
  .btn-sm{padding:5px 12px;font-size:12px;}
  .kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px;}
  .kpi-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:18px 20px;position:relative;overflow:hidden;}
  .kpi-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;}
  .kpi-card.blue::before{background:var(--blue);}
  .kpi-card.green::before{background:var(--green);}
  .kpi-card.red::before{background:var(--red);}
  .kpi-card.orange::before{background:var(--orange);}
  .kpi-card.teal::before{background:var(--teal);}
  .kpi-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:8px;}
  .kpi-value{font-size:20px;font-weight:600;font-family:'DM Mono',monospace;}
  .panel{background:var(--bg2);border:1px solid var(--border);border-radius:12px;overflow:hidden;}
  .panel-header{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--bg3);}
  .panel-header h3{font-size:14px;font-weight:600;}
  table{width:100%;border-collapse:collapse;}
  th{padding:9px 14px;text-align:left;font-size:11px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:0.8px;border-bottom:1px solid var(--border);background:var(--bg3);}
  td{padding:10px 14px;font-size:13px;color:var(--text);border-bottom:1px solid var(--border);vertical-align:middle;}
  tr:last-child td{border-bottom:none;}
  tr:hover td{background:rgba(255,255,255,0.02);}
  .mono{font-family:'DM Mono',monospace;font-size:12px;}
  .tipo-mov{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:500;}
  .tipo-mov.ingreso{background:rgba(16,185,129,0.15);color:var(--green);}
  .tipo-mov.egreso{background:rgba(239,68,68,0.15);color:var(--red);}
  .cheque-estado{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;}
  .cheque-estado.pendiente{background:rgba(245,158,11,0.15);color:var(--orange);}
  .cheque-estado.depositado,.cheque-estado.cobrado,.cheque-estado.acreditado{background:rgba(16,185,129,0.15);color:var(--green);}
  .cheque-estado.rechazado{background:rgba(239,68,68,0.15);color:var(--red);}
  /* IMPORTAR */
  .import-zone{border:2px dashed var(--border);border-radius:12px;padding:40px;text-align:center;cursor:pointer;transition:all 0.2s;margin-bottom:20px;}
  .import-zone:hover,.import-zone.dragover{border-color:var(--blue);background:rgba(59,130,246,0.05);}
  .import-zone svg{width:40px;height:40px;color:var(--muted);margin-bottom:12px;}
  .import-zone h3{font-size:15px;font-weight:500;margin-bottom:6px;}
  .import-zone p{font-size:12px;color:var(--muted);}
  .preview-table{max-height:400px;overflow-y:auto;}
  .preview-row-ok{background:rgba(16,185,129,0.05);}
  .preview-row-dup{background:rgba(245,158,11,0.05);}
  .preview-row-dup td{color:var(--muted);}
  .badge-nuevo{background:rgba(16,185,129,0.15);color:var(--green);padding:2px 7px;border-radius:4px;font-size:10px;font-weight:600;}
  .badge-dup{background:rgba(245,158,11,0.15);color:var(--orange);padding:2px 7px;border-radius:4px;font-size:10px;font-weight:600;}
  .import-summary{background:var(--bg3);border-radius:8px;padding:14px 18px;margin-bottom:16px;display:flex;gap:24px;align-items:center;flex-wrap:wrap;}
  .import-summary span{font-size:13px;}
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:200;align-items:center;justify-content:center;}
  .modal-overlay.show{display:flex;}
  .modal{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:32px;width:100%;max-width:540px;max-height:90vh;overflow-y:auto;}
  .modal h3{font-size:18px;font-weight:600;margin-bottom:20px;}
  .form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px;}
  .form-row.full{grid-template-columns:1fr;}
  .form-group{display:flex;flex-direction:column;gap:6px;}
  label{font-size:11.5px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:0.7px;}
  input,select{padding:10px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13.5px;font-family:'DM Sans',sans-serif;outline:none;}
  input:focus,select:focus{border-color:var(--blue);}
  .modal-footer{display:flex;justify-content:flex-end;gap:10px;margin-top:24px;padding-top:20px;border-top:1px solid var(--border);}
  .spinner-wrap{display:flex;align-items:center;justify-content:center;padding:40px;color:var(--muted);}
  .spinner{width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin 0.8s linear infinite;margin-right:10px;}
  @keyframes spin{to{transform:rotate(360deg);}}
  @media(max-width:768px){.main{margin-left:0;padding:16px;}.kpi-grid{grid-template-columns:repeat(2,1fr);}  .form-row{grid-template-columns:1fr;}}
</style>

function cambiarTab(tab,btn){
  tabActual=tab;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  if(btn) btn.classList.add('active');
  if(tab==='movimientos') cargarMovimientos();
  else if(tab==='cheques') cargarCheques();
  else if(tab==='flujo') cargarFlujo();
  else mostrarImportar();
}

async function cargarTodo(){
  if(tabActual==='movimientos') await Promise.all([cargarKpis(),cargarMovimientos()]);
  else if(tabActual==='cheques') cargarCheques();
  else if(tabActual==='flujo') cargarFlujo();
}

async function cargarKpis(){
  const emp=document.getElementById('sel-empresa').value;
  const cuenta=document.getElementById('sel-cuenta').value;
  const mes=document.getElementById('sel-mes').value;
  const ini=mes+'-01';
  const fin=new Date(mes+'-01');fin.setMonth(fin.getMonth()+1);
  const finStr=fin.toISOString().split('T')[0];

  let q=db.from('caja_movimientos').select('tipo,origen,monto');
  if(emp) q=q.eq('empresa_id',emp);
  if(cuenta) q=q.eq('origen',cuenta);
  q=q.gte('fecha',ini).lt('fecha',finStr);
  const {data}=await q;
  const rows=data||[];

  const ingresos=rows.filter(r=>r.tipo==='ingreso').reduce((s,r)=>s+Number(r.monto||0),0);
  const egresos=rows.filter(r=>r.tipo==='egreso').reduce((s,r)=>s+Number(r.monto||0),0);
  const neto=ingresos-egresos;

  document.getElementById('kpis').innerHTML=`
    <div class="kpi-card green"><div class="kpi-label">Ingresos del mes</div><div class="kpi-value" style="color:var(--green)">${fmt(ingresos)}</div></div>
    <div class="kpi-card red"><div class="kpi-label">Egresos del mes</div><div class="kpi-value" style="color:var(--red)">${fmt(egresos)}</div></div>
    <div class="kpi-card ${neto>=0?'blue':'red'}"><div class="kpi-label">Resultado del mes</div><div class="kpi-value" style="color:${neto>=0?'var(--green)':'var(--red)'}">${fmt(neto)}</div></div>
    <div class="kpi-card teal"><div class="kpi-label">Movimientos</div><div class="kpi-value">${rows.length}</div></div>`;
}

function handleDrop(e, tipo){
  e.preventDefault();
  document.getElementById(`zone-${tipo}`).classList.remove('dragover');
  const file=e.dataTransfer.files[0];
  if(!file) return;
  procesarArchivo(file, tipo);
}

function leerExcel(input, tipo){
  const file=input.files[0];
  if(!file) return;
  procesarArchivo(file, tipo);
}

function procesarArchivo(file, tipo){
  const reader=new FileReader();
  reader.onload=e=>{
    const data=new Uint8Array(e.target.result);
    const wb=XLSX.read(data,{type:'array',cellDates:true});
    const ws=wb.Sheets[wb.SheetNames[0]];
    const json=XLSX.utils.sheet_to_json(ws,{header:1,defval:null,raw:false});
    if(tipo==='extracto') procesarExtracto(json);
    else procesarCheques(json);
  };
  reader.readAsArrayBuffer(file);
}

function detectarTipoCategoria(desc){
  const d=(desc||'').toUpperCase();
  if(d.includes('HABERES')||d.includes('SUELDO')) return 'sueldo';
  if(d.includes('AFIP')||d.includes('IMP.')||d.includes('IVA')||d.includes('IIBB')) return 'impuesto';
  if(d.includes('ECHEQ')||d.includes('CHEQUE')) return 'cheque';
  if(d.includes('TRF')||d.includes('TRANSFER')) return 'transferencia';
  if(d.includes('ACRED')) return 'cobro_cliente';
  return 'otro';
}

async function procesarExtracto(json){
  const cuenta=document.getElementById('import-cuenta').value;
  const empresaId=CUENTAS[cuenta];

  // Buscar fila header (buscar "Fecha")
  let headerRow=-1;
  for(let i=0;i<Math.min(json.length,5);i++){
    if(json[i]&&json[i][0]&&String(json[i][0]).includes('Fecha')){headerRow=i;break;}
  }
  if(headerRow<0){alert('No encontré el encabezado. Verificá que sea el formato correcto del banco.');return;}

  const rows=json.slice(headerRow+1).filter(r=>r&&r[0]);
  const movimientos=rows.map(r=>{
    const fecha=r[0]?new Date(r[0]):null;
    const desc=String(r[1]||'').trim();
    const debito=parseFloat(String(r[3]||'0').replace(',','.'));
    const credito=parseFloat(String(r[4]||'0').replace(',','.'));
    const comprobante=String(r[9]||'').trim();
    const leyenda=String(r[10]||'').trim();
    const descripcionFull=`${desc}${leyenda?' — '+leyenda:''}${comprobante?' ('+comprobante+')':''}`;
    const tipo=credito>0?'ingreso':'egreso';
    const monto=credito>0?credito:debito;
    if(!fecha||monto<=0) return null;
    return{
      fecha:fecha.toISOString().split('T')[0],
      descripcion:descripcionFull,
      tipo,monto,
      categoria:detectarTipoCategoria(descripcionFull),
      origen:cuenta,empresa_id:empresaId
    };
  }).filter(Boolean);

  // Verificar duplicados contra la BD
  const fechas=[...new Set(movimientos.map(m=>m.fecha))];
  let existentes=new Set();
  if(fechas.length){
    const {data}=await db.from('caja_movimientos').select('fecha,descripcion,monto')
      .eq('empresa_id',empresaId).eq('origen',cuenta)
      .gte('fecha',fechas[0]).lte('fecha',fechas[fechas.length-1]);
    (data||[]).forEach(r=>existentes.add(`${r.fecha}|${r.monto}`));
  }

  previewData=movimientos.map(m=>({...m,_dup:existentes.has(`${m.fecha}|${m.monto}`)}));
  tipoImport='extracto';
  mostrarPreview();
}

async function procesarCheques(json){
  const empresaId=document.getElementById('import-empresa-cheques').value;

  // Formato Galicia: Fila 1="Datos del cheque", Fila 2=headers, Fila 3+=datos
  // Buscar donde empiezan los datos (primer fila con número de cheque)
  let dataStart=2; // default: fila índice 2 (fila 3)
  for(let i=0;i<Math.min(json.length,5);i++){
    const v=String(json[i]&&json[i][0]||'').trim();
    if(/^\d{5,}$/.test(v)){dataStart=i;break;}
  }

  const rows=json.slice(dataStart).filter(r=>r&&r[0]&&String(r[0]).trim()&&/\d/.test(String(r[0])));
  const cheques=rows.map(r=>{
    const numero=String(r[0]||'').trim();
    const titular=String(r[1]||'').trim();
    const monto=parseFloat(String(r[6]||'0').replace(',','.'));
    const estadoRaw=String(r[7]||'').trim().toLowerCase();
    // Parsear fechas — XLSX devuelve Date o string
    const parseFecha=v=>{
      if(!v) return null;
      try{const d=new Date(v);return isNaN(d)?null:d.toISOString().split('T')[0];}catch{return null;}
    };
    const fechaPago=parseFecha(r[4]);
    const fechaEmision=parseFecha(r[5]);
    let estado='pendiente';
    if(estadoRaw.includes('acredit')||estadoRaw.includes('cobr')||estadoRaw.includes('deposit')||estadoRaw.includes('aceptado')) estado='depositado';
    if(estadoRaw.includes('rechaz')) estado='rechazado';
    if(!numero||monto<=0) return null;
    return{
      numero,titular,monto,estado,
      banco:'Galicia',
      fecha_emision:fechaEmision,
      fecha_vencimiento:fechaPago,
      tipo:'emitido',empresa_id:empresaId
    };
  }).filter(Boolean);

  // Verificar duplicados
  const nums=cheques.map(c=>c.numero);
  const {data:exist}=await db.from('cheques').select('numero').eq('empresa_id',empresaId).in('numero',nums);
  const existSet=new Set((exist||[]).map(r=>r.numero));

  previewData=cheques.map(c=>({...c,_dup:existSet.has(c.numero)}));
  tipoImport='cheques';
  mostrarPreview();
}

function mostrarPreview(){
  const nuevos=previewData.filter(r=>!r._dup);
  const dups=previewData.filter(r=>r._dup);

  let html=`

      <span style="color:var(--green)">✓ <strong>${nuevos.length}</strong> nuevos</span>
      <span style="color:var(--orange)">⚠ <strong>${dups.length}</strong> ya existen (se omiten)</span>
      ${nuevos.length?`<button class="btn btn-success" onclick="confirmarImport()">Importar ${nuevos.length} registros</button>`:'<span style="color:var(--muted)">Nada nuevo para importar</span>'}
    </div>`;

  if(tipoImport==='extracto'){
    html+=`<div class="panel"><div style="overflow-x:auto" class="preview-table"><table>
      <thead><tr><th></th><th>Fecha</th><th>Descripción</th><th>Tipo</th><th>Categoría</th><th>Monto</th></tr></thead>
      <tbody>${previewData.map(r=>`<tr class="${r._dup?'preview-row-dup':'preview-row-ok'}">
        <td>${r._dup?'<span class="badge-dup">DUP</span>':'<span class="badge-nuevo">NUEVO</span>'}</td>
        <td class="mono">${r.fecha}</td>
        <td style="max-width:280px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:12px">${r.descripcion}</td>
        <td><span class="tipo-mov ${r.tipo}">${r.tipo}</span></td>
        <td style="font-size:12px;color:var(--muted)">${r.categoria}</td>
        <td class="mono" style="color:${r.tipo==='ingreso'?'var(--green)':'var(--red)'}">${fmt(r.monto)}</td>
      </tr>`).join('')}</tbody>
    </table></div></div>`;
  } else {
    html+=`<div class="panel"><div style="overflow-x:auto" class="preview-table"><table>
      <thead><tr><th></th><th>N° Cheque</th><th>Emitido a</th><th>Monto</th><th>Vencimiento</th><th>Estado</th></tr></thead>
      <tbody>${previewData.map(r=>`<tr class="${r._dup?'preview-row-dup':'preview-row-ok'}">
        <td>${r._dup?'<span class="badge-dup">DUP</span>':'<span class="badge-nuevo">NUEVO</span>'}</td>
        <td class="mono">${r.numero}</td>
        <td style="font-size:12px">${r.titular}</td>
        <td class="mono">${fmt(r.monto)}</td>
        <td class="mono">${r.fecha_vencimiento||'—'}</td>
        <td><span class="cheque-estado ${r.estado}">${r.estado}</span></td>
      </tr>`).join('')}</tbody>
    </table></div></div>`;
  }

  document.getElementById('preview-area').innerHTML=html;
}

async function confirmarImport(){
  const nuevos=previewData.filter(r=>!r._dup).map(({_dup,...r})=>r);
  if(!nuevos.length) return;

  const btn=document.querySelector('#preview-area .btn-success');
  if(btn){btn.disabled=true;btn.textContent='Importando...';}

  let error;
  if(tipoImport==='extracto'){
    ({error}=await db.from('caja_movimientos').insert(nuevos));
  } else {
    ({error}=await db.from('cheques').insert(nuevos));
  }

  if(error){alert('Error al importar: '+error.message);if(btn){btn.disabled=false;btn.textContent='Reintentar';}return;}

  previewData=[];
  alert(`✓ ${nuevos.length} registros importados correctamente.`);
  mostrarImportar();
}

// ===== MANUAL =====
function abrirNuevoMovimiento(){
  document.getElementById('nm-desc').value='';
  document.getElementById('nm-monto').value='';
  document.getElementById('nm-fecha').value=hoy();
  document.getElementById('modal-mov').classList.add('show');
}

async function guardarMovimiento(){
  const desc=document.getElementById('nm-desc').value.trim();
  const monto=parseFloat(document.getElementById('nm-monto').value)||0;
  if(!desc||!monto){alert('Completá descripción y monto.');return;}
  const empId=document.getElementById('nm-empresa').value;
  const cuenta=document.getElementById('nm-cuenta').value;
  const {error}=await db.from('caja_movimientos').insert({
    empresa_id:empId,tipo:document.getElementById('nm-tipo').value,
    origen:cuenta,categoria:document.getElementById('nm-categoria').value,
    descripcion:desc,monto,fecha:document.getElementById('nm-fecha').value,
  });
  if(error){alert('Error: '+error.message);return;}
  cerrarModal('modal-mov');
  cargarTodo();
}

async function borrarMovimiento(id){
  if(!confirm('¿Borrar este movimiento?')) return;
  await db.from('caja_movimientos').delete().eq('id',id);
  cargarMovimientos();
}

function abrirNuevoCheque(){
  document.getElementById('modal-cheque').classList.add('show');
}

async function guardarCheque(){
  const numero=document.getElementById('nc-numero').value.trim();
  const monto=parseFloat(document.getElementById('nc-monto').value)||0;
  if(!numero||!monto){alert('Completá número y monto.');return;}
  const {error}=await db.from('cheques').insert({
    empresa_id:document.getElementById('nc-empresa').value,
    tipo:document.getElementById('nc-tipo').value,
    numero,banco:document.getElementById('nc-banco').value||null,
    titular:document.getElementById('nc-titular').value||null,
    monto,estado:'pendiente',
    fecha_emision:document.getElementById('nc-emision').value||null,
    fecha_vencimiento:document.getElementById('nc-vencimiento').value||null,
  });
  if(error){alert('Error: '+error.message);return;}
  cerrarModal('modal-cheque');
  cargarCheques();
}

async function actualizarCheque(id,estado){
  await db.from('cheques').update({estado}).eq('id',id);
  cargarCheques();
}

async function borrarCheque(id){
  if(!confirm('¿Borrar este cheque?')) return;
  await db.from('cheques').delete().eq('id',id);
  cargarCheques();
}

function cerrarModal(id){document.getElementById(id).classList.remove('show');}
async function logout(){await db.auth.signOut();window.location.href='login.html';}

init();
