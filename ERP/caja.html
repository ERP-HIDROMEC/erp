<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hidromec ERP — Caja</title>
<link rel="stylesheet" href="erp-layout.css">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
<script src="erp-utils.js"></script>
<script src="erp-sidebar.js"></script>
<script src="empresas.api.js"></script>
<script src="caja.api.js"></script>
<script src="egresos.api.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
  .kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px;}
  .kpi-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:18px 20px;position:relative;overflow:hidden;}
  .kpi-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;}
  .kpi-card.blue::before{background:var(--blue);}
  .kpi-card.green::before{background:var(--green);}
  .kpi-card.red::before{background:var(--red);}
  .kpi-card.orange::before{background:var(--orange);}
  .kpi-card.teal::before{background:var(--teal);}
  .kpi-value{font-size:20px;font-weight:600;font-family:'DM Mono',monospace;}
  tr:hover .tipo-mov{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:500;}
  .tipo-mov.ingreso{background:rgba(16,185,129,0.15);color:var(--green);}
  .tipo-mov.egreso{background:rgba(239,68,68,0.15);color:var(--red);}
  .cheque-estado{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;}
  .cheque-estado.pendiente{background:rgba(245,158,11,0.15);color:var(--orange);}
  .cheque-estado.depositado,.cheque-estado.cobrado,.cheque-estado.acreditado{background:rgba(16,185,129,0.15);color:var(--green);}
  .cheque-estado.rechazado{background:rgba(239,68,68,0.15);color:var(--red);}
  /* IMPORTAR */
  .import-zone{border:2px dashed var(--border);border-radius:12px;padding:40px;text-align:center;cursor:pointer;transition:all 0.2s;margin-bottom:20px;}
  .import-zone:hover,.import-zone.dragover{border-color:var(--blue);background:rgba(59,130,246,0.05);}
  .import-zone svg{width:40px;height:40px;color:var(--muted);margin-bottom:12px;}
  .import-zone h3{font-size:15px;font-weight:500;margin-bottom:6px;}
  .import-zone p{font-size:12px;color:var(--muted);}
  .preview-row-ok{background:rgba(16,185,129,0.05);}
  .preview-row-dup{background:rgba(245,158,11,0.05);}
  .preview-row-dup .badge-nuevo{background:rgba(16,185,129,0.15);color:var(--green);padding:2px 7px;border-radius:4px;font-size:10px;font-weight:600;}
  .badge-dup{background:rgba(245,158,11,0.15);color:var(--orange);padding:2px 7px;border-radius:4px;font-size:10px;font-weight:600;}
  .import-summary{background:var(--bg3);border-radius:8px;padding:14px 18px;margin-bottom:16px;display:flex;gap:24px;align-items:center;flex-wrap:wrap;}
  .import-summary span{font-size:13px;}
  input,select{padding:10px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13.5px;font-family:'DM Sans',sans-serif;outline:none;}
  input:focus,select:focus{border-color:var(--blue);}
  @media(max-width:768px){.main{margin-left:0;padding:16px;}.kpi-grid{grid-template-columns:repeat(2,1fr);}  }
</style>
</head>
<body>
<div id="overlay" class="overlay" onclick="ERP.closeSidebar()"></div>
<div id="sidebar-root"></div>

<main class="main">
  <div class="page-header">
    <h2>Caja y bancos</h2>
    <div style="display:flex;gap:8px">
      <button class="btn btn-ghost" onclick="cambiarTab('importar',document.querySelectorAll('.tab')[3])">↑ Importar Excel</button>
      <button class="btn btn-ghost" onclick="abrirNuevoCheque()">+ Cheque</button>
      <button class="btn btn-primary" onclick="abrirNuevoMovimiento()">+ Movimiento</button>
    </div>
  </div>

  <div style="display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;align-items:center">
    <select id="sel-empresa" onchange="cargarTodo()" style="padding:8px 12px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;font-family:'DM Sans',sans-serif;outline:none;">
      <option value="">Todas las empresas</option>
      <option value="a1000000-0000-0000-0000-000000000001">Hidromec</option>
      <option value="a2000000-0000-0000-0000-000000000002">Placemem</option>
    </select>

      <option value="">Todas las cuentas</option>
      <option value="9707255">Banco Galicia 9707255 (Hidromec)</option>
      <option value="94653984">Banco Galicia 94653984 (Hidromec)</option>
      <option value="12567256">Banco Galicia 12567256 (Placemem)</option>
      <option value="94583986">Banco Galicia 94583986 (Placemem)</option>
    </select>
    <input type="month" id="sel-mes" onchange="cargarTodo()" style="padding:8px 12px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;font-family:'DM Sans',sans-serif;outline:none;">
    <select id="sel-estado-cheque" onchange="if(tabActual==='cheques')cargarCheques()" style="padding:8px 12px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;font-family:'DM Sans',sans-serif;outline:none;display:none">
      <option value="">Todos los estados</option>
      <option value="pendiente">Pendiente</option>
      <option value="depositado">Pagado / Depositado</option>
      <option value="vencido">Vencido</option>
      <option value="rechazado">Rechazado</option>
      <option value="anulado">Anulado</option>
    </select>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="cambiarTab('movimientos',this)">Movimientos</button>
    <button class="tab" onclick="cambiarTab('cheques',this)">Cheques</button>
    <button class="tab" onclick="cambiarTab('flujo',this)">Flujo proyectado</button>
    <button class="tab" onclick="cambiarTab('ordenes',this)">💳 Órdenes de pago <span id="badge-ordenes" style="display:none;background:var(--red);color:#fff;border-radius:20px;padding:1px 7px;font-size:11px;margin-left:4px"></span></button>
    <button class="tab" onclick="cambiarTab('historial-op',this)">📋 Historial pagos</button>
    <button class="tab" onclick="cambiarTab('fci',this)">📈 FCI</button>
    <button class="tab" onclick="cambiarTab('importar',this)">↑ Importar banco</button>
  </div>

  <div class="kpi-grid" id="kpis"></div>
  <div id="contenido"><div class="spinner-wrap"><div class="spinner"></div>Cargando...</div></div>
</main>

<script>
// Mapeo cuentas → empresa
const CUENTAS={
  '9707255':'a1000000-0000-0000-0000-000000000001',
  '94653984':'a1000000-0000-0000-0000-000000000001',
  '12567256':'a2000000-0000-0000-0000-000000000002',
  '94583986':'a2000000-0000-0000-0000-000000000002',
};
const CUENTA_NOMBRES={
  '9707255':'Galicia 9707255',
  '94653984':'Galicia 94653984',
  '12567256':'Galicia 12567256',
  '94583986':'Galicia 94583986',
};

let tabActual='movimientos';
let previewData=[];
let tipoImport='';

async function init(){
  const usuario = await ERP.initLayout('caja');
  if(!usuario) return;
  document.getElementById('sel-mes').value=new Date().toISOString().substring(0,7);
  document.getElementById('nf-fecha').value=hoy();
  document.getElementById('nm-fecha').value=hoy();
  document.getElementById('nc-emision').value=hoy();
  cargarTodo();
  actualizarBadgeOrdenes();
}

function cambiarTab(tab,btn){
  tabActual=tab;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  if(btn) btn.classList.add('active');
  const selEstado=document.getElementById('sel-estado-cheque');
  if(selEstado) selEstado.style.display=tab==='cheques'?'':'none';
  if(tab==='movimientos') cargarMovimientos();
  else if(tab==='cheques') cargarCheques();
  else if(tab==='flujo') cargarFlujo();
  else if(tab==='ordenes') cargarOrdenes();
  else if(tab==='historial-op') cargarHistorialOP();
  else if(tab==='fci') cargarFCI();
  else mostrarImportar();
}

async function cargarTodo(){
  if(tabActual==='movimientos') await Promise.all([cargarKpis(),cargarMovimientos()]);
  else if(tabActual==='cheques') cargarCheques();
  else if(tabActual==='flujo') cargarFlujo();
  else if(tabActual==='ordenes') cargarOrdenes();
  else if(tabActual==='fci') cargarFCI();
}

async function cargarKpis(){
  const emp=document.getElementById('sel-empresa').value;
  const cuenta=document.getElementById('sel-cuenta').value;
  const mes=document.getElementById('sel-mes').value;
  const ini=mes+'-01';
  const fin=new Date(mes+'-01');fin.setMonth(fin.getMonth()+1);
  const finStr=fin.toISOString().split('T')[0];

  const empIdKpi=document.getElementById('sel-empresa').value||null;
  const movResumen=await CajaAPI.getResumenCaja(empIdKpi);
  let data=(movResumen.movimientos||[]);
  if(emp) data=data.filter(r=>r.empresa_id===emp);
  if(cuenta) data=data.filter(r=>r.origen===cuenta);
  data=data.filter(r=>r.fecha>=ini&&r.fecha<finStr);
  const rows=data||[];

  const ingresos=rows.filter(r=>r.tipo==='ingreso').reduce((s,r)=>s+Number(r.monto||0),0);
  const egresos=rows.filter(r=>r.tipo==='egreso').reduce((s,r)=>s+Number(r.monto||0),0);
  const neto=ingresos-egresos;

  // FCI saldo total acumulado
  let fciRows=(movResumen.fci||[]);
  if(emp) fciRows=fciRows.filter(r=>r.empresa_id===emp);
  const fciSaldo=fciRows.reduce((s,r)=>s+(r.tipo==='deposito'?Number(r.monto||0):-Number(r.monto||0)),0);
  const totalDisponible=neto+fciSaldo;

  document.getElementById('kpis').innerHTML=`
    <div class="kpi-card green"><div class="kpi-label">Ingresos del mes</div><div class="kpi-value" style="color:var(--green)">${fmt(ingresos)}</div></div>
    <div class="kpi-card red"><div class="kpi-label">Egresos del mes</div><div class="kpi-value" style="color:var(--red)">${fmt(egresos)}</div></div>
    <div class="kpi-card ${neto>=0?'blue':'red'}"><div class="kpi-label">Resultado operativo</div><div class="kpi-value" style="color:${neto>=0?'var(--green)':'var(--red)'}">${fmt(neto)}</div></div>
    <div class="kpi-card teal"><div class="kpi-label">FCI (saldo invertido)</div><div class="kpi-value" style="color:#14b8a6">${fmt(fciSaldo)}</div></div>
    <div class="kpi-card blue"><div class="kpi-label">Total disponible (op. + FCI)</div><div class="kpi-value" style="color:${totalDisponible>=0?'var(--green)':'var(--red)'}">${fmt(totalDisponible)}</div></div>`;
}

async function cargarMovimientos(){
  document.getElementById('contenido').innerHTML='<div class="spinner-wrap"><div class="spinner"></div>Cargando...</div>';
  const emp=document.getElementById('sel-empresa').value;
  const cuenta=document.getElementById('sel-cuenta').value;
  const mes=document.getElementById('sel-mes').value;
  const ini=mes+'-01';
  const fin=new Date(mes+'-01');fin.setMonth(fin.getMonth()+1);
  const finStr=fin.toISOString().split('T')[0];

  const filtros={fechaDesde:ini,fechaHasta:finStr};
  if(emp) filtros.empresaId=emp;
  if(cuenta) filtros.tipo=cuenta;
  const movData=await CajaAPI.getMovimientos(filtros);
  let data=movData;
  const rows=data||[];

  document.getElementById('contenido').innerHTML=`
    <div class="panel">
      <div class="panel-header">
        <h3>${rows.length} movimientos</h3>
      </div>
      <div style="overflow-x:auto"><table>
        <thead><tr><th>Fecha</th><th>Empresa</th><th>Cuenta</th><th>Descripción</th><th>Categoría</th><th>Tipo</th><th>Monto</th><th></th></tr></thead>
        <tbody>${rows.length?rows.map(r=>`<tr>
          <td class="mono">${fmtF(r.fecha)}</td>
          <td style="font-size:12px">${r.empresas?.nombre||'—'}</td>
          <td style="font-size:12px;color:var(--muted)">${CUENTA_NOMBRES[r.origen]||r.origen}</td>
          <td style="max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${r.descripcion||'—'}</td>
          <td style="font-size:12px;color:var(--muted)">${r.categoria||'—'}</td>
          <td><span class="tipo-mov ${r.tipo}">${r.tipo}</span></td>
          <td class="mono" style="color:${r.tipo==='ingreso'?'var(--green)':'var(--red)'}">${r.tipo==='egreso'?'-':''}${fmt(r.monto)}</td>
          <td><button class="btn btn-sm btn-danger" onclick="borrarMovimiento('${r.id}')">×</button></td>
        </tr>`).join(''):'<tr><td colspan="8" style="text-align:center;padding:32px;color:var(--muted)">Sin movimientos</td></tr>'}</tbody>
      </table></div>
    </div>`;
}

async function cargarCheques(){
  document.getElementById('kpis').innerHTML='';
  document.getElementById('contenido').innerHTML='<div class="spinner-wrap"><div class="spinner"></div>Cargando...</div>';
  const emp=document.getElementById('sel-empresa').value;
  const estadoCheque=document.getElementById('sel-estado-cheque')?.value||'';
  let chqData=await EgresosAPI.getCheques({});
  if(emp) chqData=chqData.filter(r=>r.empresa_id===emp);
  if(estadoCheque) chqData=chqData.filter(r=>r.estado===estadoCheque);
  const data=chqData;
  const rows=data||[];
  const hoyStr=hoy();

  // Auto-vencer cheques pendientes con fecha de cobro vencida

    await Promise.all(aVencer.map(r=>EgresosAPI.actualizarEstadoCheque(r.id,'vencido')));

  }

  const pendientes=rows.filter(r=>r.estado==='pendiente');

          <td class="mono" style="color:${r.estado==='vencido'?'var(--red)':'var(--text)'}">${fmtF(r.fecha_vencimiento)}${r.estado==='vencido'?' ⚠':''}</td>

function handleDrop(e, tipo){
  e.preventDefault();
  document.getElementById(`zone-${tipo}`).classList.remove('dragover');
  const file=e.dataTransfer.files[0];
  if(!file) return;
  procesarArchivo(file, tipo);
}

function leerExcel(input, tipo){
  const file=input.files[0];
  if(!file) return;
  procesarArchivo(file, tipo);
}

function procesarArchivo(file, tipo){
  const reader=new FileReader();
  reader.onload=e=>{
    const data=new Uint8Array(e.target.result);
    const wb=XLSX.read(data,{type:'array',cellDates:true});
    const ws=wb.Sheets[wb.SheetNames[0]];
    const json=XLSX.utils.sheet_to_json(ws,{header:1,defval:null,raw:true});
    if(tipo==='extracto') procesarExtracto(json);
    else procesarCheques(json);
  };
  reader.readAsArrayBuffer(file);
}

function detectarTipoCategoria(desc){
  const d=(desc||'').toUpperCase();
  if(d.includes('HABERES')||d.includes('SUELDO')) return 'sueldo';
  if(d.includes('AFIP')||d.includes('IMP.')||d.includes('IVA')||d.includes('IIBB')) return 'impuesto';
  if(d.includes('ECHEQ')||d.includes('CHEQUE')) return 'cheque';
  if(d.includes('TRF')||d.includes('TRANSFER')) return 'transferencia';
  if(d.includes('ACRED')) return 'cobro_cliente';
  return 'otro';
}

async function procesarExtracto(json){
  const cuenta=document.getElementById('import-cuenta').value;
  const empresaId=CUENTAS[cuenta];

  // Buscar fila header (buscar "Fecha")
  let headerRow=-1;
  for(let i=0;i<Math.min(json.length,5);i++){
    if(json[i]&&json[i][0]&&String(json[i][0]).includes('Fecha')){headerRow=i;break;}
  }
  if(headerRow<0){toast('No encontré el encabezado. Verificá que sea el formato correcto del banco.', 'warn');return;}

  const rows=json.slice(headerRow+1).filter(r=>r&&r[0]);
  const movimientos=rows.map(r=>{
    const fecha=r[0]?new Date(r[0]):null;
    const desc=String(r[1]||'').trim();
    const debito=parseFloat(String(r[3]||'0').replace(',','.'));
    const credito=parseFloat(String(r[4]||'0').replace(',','.'));
    const comprobante=String(r[9]||'').trim();
    const leyenda=String(r[10]||'').trim();
    const descripcionFull=`${desc}${leyenda?' — '+leyenda:''}${comprobante?' ('+comprobante+')':''}`;
    const tipo=credito>0?'ingreso':'egreso';
    const monto=credito>0?credito:debito;
    if(!fecha||monto<=0) return null;
    return{
      fecha:fecha.toISOString().split('T')[0],
      descripcion:descripcionFull,
      tipo,monto,
      categoria:detectarTipoCategoria(descripcionFull),
      origen:cuenta,empresa_id:empresaId
    };
  }).filter(Boolean);

  // Verificar duplicados contra la BD
  const fechas=[...new Set(movimientos.map(m=>m.fecha))];
  let existentes=new Set();
  if(fechas.length && empresaId){
    const fechMin=fechas.sort()[0];
    const fechMax=fechas.sort().slice(-1)[0];
    const data=await CajaAPI.getMovimientosParaExportar(empresaId,fechMin,fechMax);
    (data||[]).forEach(r=>existentes.add(`${r.fecha}|${r.monto}`));
  }

  previewData=movimientos.map(m=>({...m,_dup:existentes.has(`${m.fecha}|${m.monto}`)}));
  tipoImport='extracto';
  mostrarPreview();
}

async function procesarCheques(json){
  const empresaId=document.getElementById('import-empresa-cheques').value;

  // Formato Galicia: Fila 1="Datos del cheque", Fila 2=headers, Fila 3+=datos
  // Buscar donde empiezan los datos (primer fila con número de cheque)
  let dataStart=2; // default: fila índice 2 (fila 3)
  for(let i=0;i<Math.min(json.length,5);i++){
    const v=String(json[i]&&json[i][0]||'').trim();
    if(/^\d{5,}$/.test(v)){dataStart=i;break;}
  }

  const rows=json.slice(dataStart).filter(r=>r&&r[0]&&String(r[0]).trim()&&/^\d{5,}$/.test(String(r[0]).trim()));
  const cheques=rows.map(r=>{
    const numero=String(r[0]||'').trim();
    const titular=String(r[1]||'').trim();
    // Con raw:true el importe viene como número directo
    const monto=typeof r[6]==='number'?r[6]:parseFloat(String(r[6]||'0').replace(',','.'));
    const estadoRaw=String(r[7]||'').trim().toLowerCase();
    // Fechas con raw:true vienen como número serial de Excel
    const parseFechaExcel=v=>{
      if(!v) return null;
      if(typeof v==='number'){
        // Número serial Excel → fecha
        const d=new Date(Math.round((v-25569)*86400*1000));
        return isNaN(d)?null:d.toISOString().split('T')[0];
      }
      try{const d=new Date(v);return isNaN(d)?null:d.toISOString().split('T')[0];}catch{return null;}
    };
    const fechaPago=parseFechaExcel(r[4]);
    const fechaEmision=parseFechaExcel(r[5]);
    let estado='pendiente';
    if(estadoRaw.includes('pagado')||estadoRaw.includes('acredit')||estadoRaw.includes('cobr')||estadoRaw.includes('deposit')) estado='depositado';
    if(estadoRaw.includes('rechaz')||estadoRaw.includes('repudi')) estado='rechazado';
    if(estadoRaw.includes('anulado')||estadoRaw.includes('anulad')) estado='anulado';
    if(estadoRaw.includes('vencido')) estado='vencido';
    if(!numero||!monto||isNaN(monto)||monto<=0) return null;
    return{
      numero,titular,monto,estado,
      banco:'Galicia',
      fecha_emision:fechaEmision,
      fecha_vencimiento:fechaPago,
      tipo:'emitido',empresa_id:empresaId
    };
  }).filter(Boolean);

  // Verificar duplicados
  const nums=cheques.map(c=>c.numero);
  const exist=await EgresosAPI.getChequesExistentes(empresaId,nums);
  const existSet=new Set((exist||[]).map(r=>r.numero));

  previewData=cheques.map(c=>({...c,_dup:existSet.has(c.numero)}));
  tipoImport='cheques';
  mostrarPreview();
}

  if(!nuevos.length) return;

  const btn=document.querySelector('#preview-area .btn-success');

  let error;
  if(tipoImport==='extracto'){
    try{ await CajaAPI.registrarMovimientos(nuevos); }catch(e){error=e;}
  } else {
    try{ await EgresosAPI.crearCheques(nuevos); }catch(e){error=e;}

  previewData=[];

async function confirmarOrdenPago(){
  const fecha=document.getElementById('op-fecha').value;
  const obs=document.getElementById('op-obs').value;
  if(!fecha){toast('Ingresá la fecha de pago.','warn');return;}
  if(!lineasPago.length){toast('Agregá al menos una línea de pago.','warn');return;}

  // Validaciones por tipo de pago
  for(const p of lineasPago){
    if(!p.monto||Number(p.monto)<=0){toast('Todos los pagos deben tener un monto mayor a cero.','warn');return;}
    if(p.tipo==='cheque'&&!p.numero){toast('El cheque requiere número.','warn');return;}
    if(p.tipo==='cheque'&&!p.banco){toast('El cheque requiere banco.','warn');return;}
    if(p.tipo==='transferencia'&&!p.numero){toast('La transferencia requiere número/referencia.','warn');return;}
  }

  const totalPagos=lineasPago.reduce((s,p)=>s+Number(p.monto||0),0);
  const metodoPrincipal=lineasPago[0]?.tipo||'transferencia';

  const empId2=document.getElementById('sel-empresa')?.value||'';
  const count2=await EgresosAPI.contarEgresosConOP(empId2);
  const nroOrden='OP-'+String((count2||0)+1).padStart(4,'0')+'-'+new Date().getFullYear();

  const u=await getUsuario();

  // 1. Cargar egreso con joins completos (proveedor + empresa para PDF)
  let egreso=null;
  try{
    const {data:_eg,error:_ege}=await db.from('egresos')
      .select('*,proveedores(nombre,cuit),empresas(nombre,cuit)')
      .eq('id',ordenId).single();
    if(!_ege) egreso=_eg;
  }catch(e){ console.warn('Error cargando egreso:',e); }

  // 2. Validar que el total coincida con el monto del egreso
  if(egreso){
    const egresoMonto=Number(egreso.monto||0);
    if(Math.abs(totalPagos-egresoMonto)>1){
      toast(`El total cargado (${fmt(totalPagos)}) no coincide con el egreso (${fmt(egresoMonto)})`, 'warn');
      return;
    }
  }

  // 3. Pagar egreso + registrar movimiento en caja (operación atómica)
  const payloadEgreso={
    pagado:true,
    fecha_pago_real:fecha,
    metodo_pago:metodoPrincipal,
    orden_pago_nro:nroOrden,
    orden_pago_at:new Date().toISOString(),
    observaciones:obs||null,
  };
  const movimientoCaja={
    empresa_id:egreso?.empresa_id||empId2,
    tipo:'egreso',
    origen:'banco',
    categoria:'pago_proveedor',
    descripcion:`Pago ${nroOrden} - ${egreso?.descripcion||'Egreso'}${egreso?.proveedores?.nombre?' — '+egreso.proveedores.nombre:''}`,
    monto:totalPagos,
    fecha:fecha,
  };

  let errOp=null;
  try{
    await CajaAPI.pagarEgresoConMovimiento(ordenId,payloadEgreso,movimientoCaja);
  }catch(e){errOp=e;}
  if(errOp){toast('Error al confirmar pago: '+errOp.message,'error');return;}

  // 4. Guardar líneas de pago en egresos_pagos_detalle
  for(const p of lineasPago){
    try{
      await db.from('egresos_pagos_detalle').insert({
        egreso_id:ordenId,
        tipo_pago:p.tipo,
        numero:p.numero||null,
        fecha:p.tipo==='cheque'?p.fecha||null:fecha,
        monto:Number(p.monto)||0,
        banco:p.banco||null,
        referencia:p.referencia||null,
      });
    }catch(ep){ console.warn('Error guardando línea de pago:',ep); }
  }

  cerrarModal('modal-orden');
  actualizarBadgeOrdenes();
  // Generar PDF — el guard interno avisa si eg es null o jsPDF no cargó
  try{
    generarPDFOrden(egreso,nroOrden,fecha,metodoPrincipal,u?.email||'',[...lineasPago]);
  }catch(ePDF){
    console.error('Error generando PDF:',ePDF);
    toast('Pago confirmado. Error al generar PDF: '+ePDF.message,'warn');
  }
  cargarOrdenes();
}

function generarPDFOrden(eg,nro,fecha,metodo,operador,pagos=[]){
  // Guard: jsPDF debe estar cargado
  if(!window.jspdf||!window.jspdf.jsPDF){
    toast('Error: librería PDF no cargada. Recargá la página.','error');
    console.error('jsPDF not loaded - window.jspdf:',window.jspdf);
    return;
  }
  // Guard: eg puede ser null si el egreso no se cargó
  if(!eg){
    toast('Error: no se pudieron cargar los datos del egreso.','error');
    console.error('generarPDFOrden: eg is null');
    return;
  }

  doc.text('TIPO',L+18,yD+15);
  doc.text('NÚMERO / REF',L+50,yD+15);
  doc.text('BANCO',midX+10,yD+15);
  doc.text('FECHA COBRO',midX+50,yD+15);
  doc.text('MONTO',R-10,yD+15,{align:'right'});
  doc.setDrawColor(200,200,200);
  doc.line(L+1,yD+17,R-1,yD+17);

  // Filas de pagos
  let yRow=yD+18;
  const pagosRender=pagos.length?pagos:[{tipo:metodo,numero:'',banco:'',fecha:'',monto:eg?.monto||0}];
  pagosRender.forEach((p,i)=>{
    const bg=i%2===0?[252,252,252]:[248,248,255];
    doc.setFillColor(...bg);doc.rect(L+1,yRow,W-2,10,'F');
    doc.setFont('helvetica','normal');doc.setFontSize(9);doc.setTextColor(0,0,0);
    doc.text(String(i+1),L+5,yRow+7);
    const tipoLabel=p.tipo==='cheque'?'Cheque':p.tipo==='transferencia'?'Transf.':'Efectivo';
    doc.text(tipoLabel,L+18,yRow+7);
    doc.text(String(p.numero||'—').substring(0,20),L+50,yRow+7);
    doc.text(String(p.banco||'—').substring(0,18),midX+10,yRow+7);
    const fechaCobro=p.fecha?new Date(p.fecha+'T12:00:00').toLocaleDateString('es-AR'):'—';
    doc.text(fechaCobro,midX+50,yRow+7);
    doc.setFont('helvetica','bold');
    doc.text(fmtM(p.monto),R-10,yRow+7,{align:'right'});
    yRow+=10;
  });

  // Concepto del egreso
  yRow+=4;
  doc.setFontSize(8);doc.setFont('helvetica','bold');doc.setTextColor(80,80,80);
  doc.text('CONCEPTO:',L+5,yRow+6);
  doc.setFont('helvetica','normal');doc.setTextColor(0,0,0);
  const desc=String(eg?.descripcion||'');
  const descLines=doc.splitTextToSize(desc,150);
  doc.text(descLines,L+36,yRow+6);
  yRow+=10;

  // Si hay observaciones
  if(eg?.observaciones){
    doc.setFont('helvetica','italic');doc.setFontSize(8);doc.setTextColor(80,80,80);
    doc.text('Obs: '+eg.observaciones,L+5,yRow+6);
    yRow+=8;
  }

  // ── TOTAL DESTACADO
  const yTotal=yD+155;
  doc.setFillColor(30,36,54);
  doc.rect(L+1,yTotal,W-2,16,'F');
  doc.setFontSize(11);doc.setFont('helvetica','bold');doc.setTextColor(255,255,255);
  doc.text('MONTO TOTAL PAGADO:',L+8,yTotal+11);
  doc.setFontSize(14);
  doc.text(fmtM(eg.monto),R-8,yTotal+11,{align:'right'});

  // ── FIRMA (igual al remito)
  const yF=yTotal+20;
  doc.setDrawColor(0,0,0);doc.setLineWidth(0.4);
  doc.line(L+1,yF,R-1,yF);
  doc.setFontSize(8.5);doc.setFont('helvetica','italic');doc.setTextColor(60,60,60);
  doc.text('Conforme recibido',L+5,yF+7);
  doc.setFont('helvetica','normal');doc.setTextColor(0,0,0);
  doc.line(L+5,yF+18,L+85,yF+18);
  doc.line(L+100,yF+18,R-5,yF+18);
  doc.setFontSize(8);
  doc.text('FIRMA',L+40,yF+23,{align:'center'});
  doc.text('ACLARACIÓN',L+140,yF+23,{align:'center'});

  // ── PIE (igual al remito — fondo gris con nro de orden)
  const yP=yF+26;
  doc.setFillColor(240,240,240);
  doc.rect(L+1,yP,W-2,20,'F');
  doc.setLineWidth(0.4);doc.line(L+1,yP,R-1,yP);
  doc.setFontSize(9);doc.setFont('helvetica','bold');doc.setTextColor(0,0,0);
  doc.text('N° ORDEN:',L+5,yP+7);
  doc.setFontSize(11);doc.setFont('courier','bold');
  doc.text(nro,L+28,yP+7);
  doc.setFontSize(9);doc.setFont('helvetica','bold');
  doc.text('Fecha emisión:',L+5,yP+14);
  doc.setFontSize(10);doc.setFont('courier','normal');
  doc.text(new Date().toLocaleDateString('es-AR'),L+38,yP+14);
  doc.setFontSize(8);doc.setFont('helvetica','normal');doc.setTextColor(100,100,100);
  doc.text('Sistema ERP — Hidromec SRL / Placemem SRL',R-5,yP+14,{align:'right'});
  doc.setLineWidth(0.3);doc.setDrawColor(0,0,0);
  doc.line(L+1,yP+20,R-1,yP+20);

  doc.save('OrdenPago_'+nro+'.pdf');
}


// ═══════════════ FCI — FONDO DE INVERSION ═══════════════════
async function cargarFCI(){
  document.getElementById('kpis').innerHTML='';
  document.getElementById('contenido').innerHTML='<div class="spinner-wrap"><div class="spinner"></div>Cargando...</div>';
  const emp=document.getElementById('sel-empresa').value;

  let fciData=await CajaAPI.getFCI({});
  if(emp) fciData=fciData.filter(r=>r.empresa_id===emp);
  const data=fciData;
  const rows=data||[];

  const depositos=rows.filter(r=>r.tipo==='deposito').reduce((s,r)=>s+Number(r.monto||0),0);
  const rescates=rows.filter(r=>r.tipo==='rescate').reduce((s,r)=>s+Number(r.monto||0),0);
  const saldo=depositos-rescates;

  // Saldo por fondo
  const porFondo={};
  rows.forEach(r=>{
    if(!porFondo[r.fondo]) porFondo[r.fondo]={dep:0,res:0};
    if(r.tipo==='deposito') porFondo[r.fondo].dep+=Number(r.monto||0);
    else porFondo[r.fondo].res+=Number(r.monto||0);
  });

  document.getElementById('kpis').innerHTML=`
    <div class="kpi-card green"><div class="kpi-label">Total depositado</div><div class="kpi-value" style="font-size:16px">${fmt(depositos)}</div></div>
    <div class="kpi-card orange"><div class="kpi-label">Total rescatado</div><div class="kpi-value" style="font-size:16px">${fmt(rescates)}</div></div>
    <div class="kpi-card blue"><div class="kpi-label">Saldo invertido actual</div><div class="kpi-value" style="color:var(--blue);font-size:16px">${fmt(saldo)}</div></div>
    <div class="kpi-card teal"><div class="kpi-label">Movimientos</div><div class="kpi-value">${rows.length}</div></div>`;

  const fondoCards=Object.entries(porFondo).map(([fondo,v])=>{
    const s=v.dep-v.res;
    return`<div style="background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:16px 18px;min-width:200px">
      <div style="font-size:12px;color:var(--muted);margin-bottom:4px">${fondo||'Sin nombre'}</div>
      <div style="font-size:20px;font-weight:600;font-family:'DM Mono',monospace;color:${s>0?'var(--green)':'var(--muted)'}">${fmt(s)}</div>
      <div style="font-size:11px;color:var(--muted);margin-top:4px">Depositos: ${fmt(v.dep)} / Rescates: ${fmt(v.res)}</div>
    </div>`;
  }).join('');

  document.getElementById('contenido').innerHTML=`
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
      <h3 style="font-size:14px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.8px">Saldo por fondo</h3>
      <button class="btn btn-primary btn-sm" onclick="document.getElementById('modal-fci').classList.add('show')">+ Movimiento FCI</button>
    </div>
    ${fondoCards?`<div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:24px">${fondoCards}</div>`:''}
    <div class="panel">
      <div class="panel-header"><h3>${rows.length} movimientos</h3></div>
      <div style="overflow-x:auto"><table>
        <thead><tr><th>Empresa</th><th>Fecha</th><th>Tipo</th><th>Fondo / Entidad</th><th>Monto</th><th>Observaciones</th><th></th></tr></thead>
        <tbody>${rows.length?rows.map(r=>`<tr>
          <td style="font-size:12px">${r.empresas?.nombre||'—'}</td>
          <td class="mono">${fmtF(r.fecha)}</td>
          <td>
            <span style="font-size:11px;padding:3px 10px;border-radius:20px;font-weight:500;background:${r.tipo==='deposito'?'rgba(16,185,129,0.15)':'rgba(245,158,11,0.15)'};color:${r.tipo==='deposito'?'var(--green)':'var(--orange)'}">
              ${r.tipo==='deposito'?'Deposito':'Rescate'}
            </span>
          </td>
          <td style="font-weight:500">${r.fondo||'—'}</td>
          <td class="mono" style="color:${r.tipo==='deposito'?'var(--green)':'var(--orange)'}">
            ${r.tipo==='deposito'?'+':'-'}${fmt(r.monto)}
          </td>
          <td style="font-size:12px;color:var(--muted)">${r.observaciones||'—'}</td>
          <td><button class="btn btn-sm btn-danger" onclick="borrarFCI('${r.id}')">x</button></td>
        </tr>`).join(''):'<tr><td colspan="7" style="text-align:center;padding:40px;color:var(--muted)">Sin movimientos FCI registrados</td></tr>'}</tbody>
      </table></div>
    </div>`;
}

async function guardarFCI(){
  const monto=parseFloat(document.getElementById('nf-monto').value)||0;
  const fondo=document.getElementById('nf-fondo').value.trim();
  if(!monto||!fondo){toast('Completa fondo y monto.', 'warn');return;}
  let error;
  try{ await CajaAPI.registrarFCI({
    empresa_id:document.getElementById('nf-empresa').value,
    tipo:document.getElementById('nf-tipo').value,
    fondo,
    fecha:document.getElementById('nf-fecha').value,
    monto,
    observaciones:document.getElementById('nf-obs').value||null,
  });
  }catch(e){error=e;}
  if(error){toast('Error: '+(error?.message||String(error)), 'error');return;}
  cerrarModal('modal-fci');
  cargarFCI();
  cargarKpis();
}

async function borrarFCI(id){
  if(!(await confirmar('Borrar este movimiento FCI?'))) return;
  await CajaAPI.eliminarFCI(id);
  cargarFCI();
  cargarKpis();
}

function cerrarModal(id){document.getElementById(id).classList.remove('show');}
// logout() → ahora en ERP.logout() (erp-sidebar.js)

init();
</script>
