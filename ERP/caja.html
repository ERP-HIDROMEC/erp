<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hidromec ERP — Caja</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{--bg:#0f1117;--bg2:#181c27;--bg3:#1e2436;--border:rgba(255,255,255,0.07);--text:#e8eaf0;--muted:#7a8099;--blue:#3b82f6;--green:#10b981;--red:#ef4444;--orange:#f59e0b;--purple:#8b5cf6;--teal:#14b8a6;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
  .sidebar{position:fixed;left:0;top:0;bottom:0;width:220px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:100;}
  .sidebar-logo{padding:24px 20px 20px;border-bottom:1px solid var(--border);}
  .sidebar-logo h1{font-size:16px;font-weight:600;}
  .sidebar-logo span{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;}
  .nav-section{padding:16px 12px 8px;font-size:10px;font-weight:500;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;}
  .nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;margin:1px 8px;border-radius:8px;font-size:13.5px;color:var(--muted);cursor:pointer;transition:all 0.15s;text-decoration:none;}
  .nav-item:hover{background:var(--bg3);color:var(--text);}
  .nav-item.active{background:rgba(59,130,246,0.15);color:var(--blue);}
  .nav-item svg{width:16px;height:16px;flex-shrink:0;}
  .nav-bottom{margin-top:auto;padding:16px 12px;border-top:1px solid var(--border);}
  .btn-logout{width:100%;padding:9px 12px;background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.2);border-radius:8px;color:var(--red);font-size:13px;font-family:'DM Sans',sans-serif;cursor:pointer;}
  .main{margin-left:220px;padding:28px 32px;}
  .page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px;}
  .page-header h2{font-size:22px;font-weight:600;}
  .tabs{display:flex;gap:4px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:4px;margin-bottom:24px;width:fit-content;}
  .tab{padding:8px 20px;border-radius:7px;font-size:13.5px;cursor:pointer;color:var(--muted);transition:all 0.15s;border:none;background:none;font-family:'DM Sans',sans-serif;}
  .tab.active{background:var(--blue);color:#fff;}
  .tab:hover:not(.active){color:var(--text);}
  .filtros{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;align-items:center;}
  .filtros select,.filtros input{padding:8px 12px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;font-family:'DM Sans',sans-serif;outline:none;}
  .filtros select:focus,.filtros input:focus{border-color:var(--blue);}
  .btn{padding:9px 18px;border-radius:8px;font-size:13px;font-weight:500;font-family:'DM Sans',sans-serif;cursor:pointer;border:none;transition:all 0.15s;}
  .btn-primary{background:var(--blue);color:#fff;}
  .btn-primary:hover{background:#2563eb;}
  .btn-ghost{background:var(--bg3);color:var(--text);border:1px solid var(--border);}
  .btn-ghost:hover{border-color:var(--blue);}
  .btn-danger{background:rgba(239,68,68,0.1);color:var(--red);border:1px solid rgba(239,68,68,0.2);}
  .btn-sm{padding:5px 12px;font-size:12px;}
  .kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px;}
  .kpi-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:18px 20px;position:relative;overflow:hidden;}
  .kpi-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;}
  .kpi-card.blue::before{background:var(--blue);}
  .kpi-card.green::before{background:var(--green);}
  .kpi-card.red::before{background:var(--red);}
  .kpi-card.orange::before{background:var(--orange);}
  .kpi-card.purple::before{background:var(--purple);}
  .kpi-card.teal::before{background:var(--teal);}
  .kpi-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:8px;}
  .kpi-value{font-size:20px;font-weight:600;font-family:'DM Mono',monospace;}
  .kpi-value.pos{color:var(--green);}
  .kpi-value.neg{color:var(--red);}
  .kpi-sub{font-size:11px;color:var(--muted);margin-top:4px;}
  .panel{background:var(--bg2);border:1px solid var(--border);border-radius:12px;overflow:hidden;}
  table{width:100%;border-collapse:collapse;}
  th{padding:10px 16px;text-align:left;font-size:11px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:0.8px;border-bottom:1px solid var(--border);background:var(--bg3);}
  td{padding:11px 16px;font-size:13px;border-bottom:1px solid var(--border);vertical-align:middle;}
  tr:last-child td{border-bottom:none;}
  tr:hover td{background:rgba(255,255,255,0.02);}
  .mono{font-family:'DM Mono',monospace;font-size:12px;}
  .ingreso td:nth-child(5){color:var(--green);}
  .egreso td:nth-child(5){color:var(--red);}
  .tipo-mov{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:500;}
  .tipo-mov.ingreso{background:rgba(16,185,129,0.15);color:var(--green);}
  .tipo-mov.egreso{background:rgba(239,68,68,0.15);color:var(--red);}
  .cheque-estado{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;}
  .cheque-estado.pendiente{background:rgba(245,158,11,0.15);color:var(--orange);}
  .cheque-estado.depositado,.cheque-estado.cobrado{background:rgba(16,185,129,0.15);color:var(--green);}
  .cheque-estado.rechazado{background:rgba(239,68,68,0.15);color:var(--red);}
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:200;align-items:center;justify-content:center;}
  .modal-overlay.show{display:flex;}
  .modal{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:32px;width:100%;max-width:540px;max-height:90vh;overflow-y:auto;}
  .modal h3{font-size:18px;font-weight:600;margin-bottom:24px;}
  .form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px;}
  .form-row.full{grid-template-columns:1fr;}
  .form-group{display:flex;flex-direction:column;gap:6px;}
  label{font-size:11.5px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:0.7px;}
  input,select,textarea{padding:10px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13.5px;font-family:'DM Sans',sans-serif;outline:none;transition:border-color 0.15s;}
  input:focus,select:focus,textarea:focus{border-color:var(--blue);}
  .modal-footer{display:flex;justify-content:flex-end;gap:10px;margin-top:24px;padding-top:20px;border-top:1px solid var(--border);}
  .saldo-bar{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap;}
  .saldo-item{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px 20px;flex:1;min-width:160px;}
  .saldo-item-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:6px;}
  .saldo-item-value{font-size:18px;font-weight:600;font-family:'DM Mono',monospace;}
  .empty{padding:40px;text-align:center;color:var(--muted);font-size:13px;}
  .spinner-wrap{display:flex;align-items:center;justify-content:center;padding:40px;color:var(--muted);}
  .spinner{width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin 0.8s linear infinite;margin-right:10px;}
  @keyframes spin{to{transform:rotate(360deg);}}
  @media(max-width:768px){.main{margin-left:0;padding:16px;}.kpi-grid{grid-template-columns:repeat(2,1fr);}.form-row{grid-template-columns:1fr;}}
</style>
</head>

<script>
const SUPA_URL='https://avgkhbqtanvfsqxncmzm.supabase.co';
const SUPA_KEY='sb_publishable_Q5W5JwdhUOWnOZv_QaGWQg_xHVhSEls';
const db=supabase.createClient(SUPA_URL,SUPA_KEY);
const fmt=v=>new Intl.NumberFormat('es-AR',{style:'currency',currency:'ARS',maximumFractionDigits:0}).format(v||0);
const fmtF=d=>d?new Date(d+'T12:00:00').toLocaleDateString('es-AR'):'—';
const hoy=()=>new Date().toISOString().split('T')[0];
let tabActual='movimientos';

async function init(){
  const {data:{session}}=await db.auth.getSession();
  if(!session){window.location.href='login.html';return;}
  document.getElementById('sel-mes').value=new Date().toISOString().substring(0,7);
  document.getElementById('nm-fecha').value=hoy();
  document.getElementById('nc-emision').value=hoy();
  document.getElementById('nc-vencimiento').value=hoy();
  await cargarTodo();
}

function cambiarTab(tab,btn){
  tabActual=tab;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  if(tab==='movimientos') cargarMovimientos();
  else if(tab==='cheques') cargarCheques();
  else cargarFlujo();
}

async function cargarTodo(){
  await Promise.all([cargarSaldos(),cargarMovimientos()]);
}

async function cargarSaldos(){
  const emp=document.getElementById('sel-empresa').value;
  const mes=document.getElementById('sel-mes').value;
  const ini=mes+'-01';
  const fin=new Date(mes+'-01');fin.setMonth(fin.getMonth()+1);
  const finStr=fin.toISOString().split('T')[0];

  let q=db.from('caja_movimientos').select('tipo,origen,monto');
  if(emp) q=q.eq('empresa_id',emp);
  q=q.gte('fecha',ini).lt('fecha',finStr);
  const {data}=await q;
  const rows=data||[];

  const ingresos=rows.filter(r=>r.tipo==='ingreso').reduce((s,r)=>s+Number(r.monto||0),0);
  const egresos=rows.filter(r=>r.tipo==='egreso').reduce((s,r)=>s+Number(r.monto||0),0);
  const saldo=ingresos-egresos;
  const caja=rows.filter(r=>r.origen==='caja'&&r.tipo==='ingreso').reduce((s,r)=>s+Number(r.monto||0),0)
             -rows.filter(r=>r.origen==='caja'&&r.tipo==='egreso').reduce((s,r)=>s+Number(r.monto||0),0);
  const banco=rows.filter(r=>r.origen==='banco'&&r.tipo==='ingreso').reduce((s,r)=>s+Number(r.monto||0),0)
              -rows.filter(r=>r.origen==='banco'&&r.tipo==='egreso').reduce((s,r)=>s+Number(r.monto||0),0);

  document.getElementById('saldos').innerHTML=`
    <div class="kpi-card green"><div class="kpi-label">Ingresos del mes</div><div class="kpi-value pos">${fmt(ingresos)}</div></div>
    <div class="kpi-card red"><div class="kpi-label">Egresos del mes</div><div class="kpi-value neg">${fmt(egresos)}</div></div>
    <div class="kpi-card ${saldo>=0?'blue':'red'}"><div class="kpi-label">Resultado del mes</div><div class="kpi-value ${saldo>=0?'pos':'neg'}">${fmt(saldo)}</div></div>
    <div class="kpi-card teal"><div class="kpi-label">Caja / Banco</div><div class="kpi-value" style="font-size:14px">${fmt(caja)} / ${fmt(banco)}</div><div class="kpi-sub">Solo este mes</div></div>`;
}

async function cargarMovimientos(){
  document.getElementById('contenido').innerHTML='<div class="spinner-wrap"><div class="spinner"></div>Cargando...</div>';
  const emp=document.getElementById('sel-empresa').value;
  const mes=document.getElementById('sel-mes').value;
  const ini=mes+'-01';
  const fin=new Date(mes+'-01');fin.setMonth(fin.getMonth()+1);
  const finStr=fin.toISOString().split('T')[0];

  let q=db.from('caja_movimientos').select('*,empresas(nombre)').order('fecha',{ascending:false});
  if(emp) q=q.eq('empresa_id',emp);
  q=q.gte('fecha',ini).lt('fecha',finStr);
  const {data}=await q;
  const rows=data||[];

  document.getElementById('contenido').innerHTML=`
    <div style="padding:10px 20px;border-bottom:1px solid var(--border)">
      <span style="font-size:12px;color:var(--muted)">${rows.length} movimientos</span>
    </div>
    <div style="overflow-x:auto"><table>
      <thead><tr><th>Empresa</th><th>Fecha</th><th>Tipo</th><th>Cuenta</th><th>Categoría</th><th>Descripción</th><th>Monto</th><th>Acciones</th></tr></thead>
      <tbody>${rows.length?rows.map(r=>`<tr class="${r.tipo}">
        <td style="font-size:12px">${r.empresas?.nombre||'—'}</td>
        <td class="mono">${fmtF(r.fecha)}</td>
        <td><span class="tipo-mov ${r.tipo}">${r.tipo}</span></td>
        <td style="font-size:12px;color:var(--muted)">${r.origen}</td>
        <td style="font-size:12px;color:var(--muted)">${r.categoria}</td>
        <td>${r.descripcion}</td>
        <td class="mono" style="color:${r.tipo==='ingreso'?'var(--green)':'var(--red)'}">${r.tipo==='egreso'?'-':''}${fmt(r.monto)}</td>
        <td><button class="btn btn-sm btn-danger" onclick="borrarMovimiento('${r.id}')">Borrar</button></td>
      </tr>`).join(''):'<tr><td colspan="8" style="text-align:center;padding:40px;color:var(--muted)">Sin movimientos este mes</td></tr>'}</tbody>
    </table></div>`;
}

async function cargarCheques(){
  document.getElementById('contenido').innerHTML='<div class="spinner-wrap"><div class="spinner"></div>Cargando...</div>';
  const emp=document.getElementById('sel-empresa').value;
  let q=db.from('cheques').select('*,empresas(nombre)').order('fecha_vencimiento');
  if(emp) q=q.eq('empresa_id',emp);
  const {data}=await q;
  const rows=data||[];
  const hoyStr=hoy();

  document.getElementById('contenido').innerHTML=`
    <div style="overflow-x:auto"><table>
      <thead><tr><th>Empresa</th><th>Tipo</th><th>N° Cheque</th><th>Banco</th><th>Titular</th><th>Monto</th><th>Emisión</th><th>Vencimiento</th><th>Estado</th><th>Acciones</th></tr></thead>
      <tbody>${rows.length?rows.map(r=>{
        const vence=r.fecha_vencimiento<hoyStr&&r.estado==='pendiente';
        return`<tr>
          <td style="font-size:12px">${r.empresas?.nombre||'—'}</td>
          <td><span style="font-size:11px;padding:2px 8px;border-radius:4px;background:${r.tipo==='recibido'?'rgba(16,185,129,0.15)':'rgba(239,68,68,0.15)'};color:${r.tipo==='recibido'?'var(--green)':'var(--red)'}">${r.tipo}</span></td>
          <td class="mono">${r.numero}</td>
          <td style="font-size:12px">${r.banco||'—'}</td>
          <td>${r.titular||'—'}</td>
          <td class="mono">${fmt(r.monto)}</td>
          <td class="mono">${fmtF(r.fecha_emision)}</td>
          <td class="mono" style="color:${vence?'var(--red)':''}">${fmtF(r.fecha_vencimiento)}</td>
          <td><span class="cheque-estado ${r.estado}">${r.estado}${vence?' ⚠':''}}</span></td>
          <td><div style="display:flex;gap:6px">
            ${r.estado==='pendiente'?`<button class="btn btn-sm btn-ghost" onclick="actualizarEstadoCheque('${r.id}','${r.tipo==='recibido'?'cobrado':'depositado'}')">✓ ${r.tipo==='recibido'?'Cobrar':'Depositar'}</button>`:''}
            <button class="btn btn-sm btn-danger" onclick="borrarCheque('${r.id}')">Borrar</button>
          </div></td>
        </tr>`;
      }).join(''):'<tr><td colspan="10" style="text-align:center;padding:40px;color:var(--muted)">Sin cheques</td></tr>'}</tbody>
    </table></div>`;
}

async function cargarFlujo(){
  document.getElementById('contenido').innerHTML='<div class="spinner-wrap"><div class="spinner"></div>Calculando flujo...</div>';
  const emp=document.getElementById('sel-empresa').value;

  // Facturas por cobrar en los próximos 60 días
  const hoyStr=hoy();
  const en60=new Date();en60.setDate(en60.getDate()+60);
  const en60Str=en60.toISOString().split('T')[0];

  let qF=db.from('facturas_emitidas').select('monto_total,fecha_cobro_estimada,clientes(nombre),empresas(nombre)').not('estado','in','("cobrada","anulada")').gte('fecha_cobro_estimada',hoyStr).lte('fecha_cobro_estimada',en60Str).order('fecha_cobro_estimada');
  if(emp) qF=qF.eq('empresa_id',emp);

  let qE=db.from('egresos').select('monto,fecha_egreso,descripcion,empresas(nombre)').eq('pagado',false).gte('fecha_egreso',hoyStr).lte('fecha_egreso',en60Str).order('fecha_egreso');
  if(emp) qE=qE.eq('empresa_id',emp);

  const [{data:porCobrar},{data:porPagar}]=await Promise.all([qF,qE]);

  const totalCobrar=(porCobrar||[]).reduce((s,r)=>s+Number(r.monto_total||0),0);
  const totalPagar=(porPagar||[]).reduce((s,r)=>s+Number(r.monto||0),0);
  const flujoNeto=totalCobrar-totalPagar;

  document.getElementById('contenido').innerHTML=`
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:0;border-bottom:1px solid var(--border)">
      <div style="padding:16px 20px;border-right:1px solid var(--border)">
        <div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:4px">Por cobrar (próx. 60 días)</div>
        <div style="font-size:22px;font-weight:600;font-family:'DM Mono',monospace;color:var(--green)">${fmt(totalCobrar)}</div>
      </div>
      <div style="padding:16px 20px">
        <div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:4px">Por pagar (próx. 60 días)</div>
        <div style="font-size:22px;font-weight:600;font-family:'DM Mono',monospace;color:var(--red)">${fmt(totalPagar)}</div>
      </div>
    </div>
    <div style="padding:12px 20px;border-bottom:1px solid var(--border);background:${flujoNeto>=0?'rgba(16,185,129,0.05)':'rgba(239,68,68,0.05)'}">
      <span style="font-size:13px;color:var(--muted)">Flujo neto proyectado: </span>
      <span style="font-size:16px;font-weight:600;font-family:'DM Mono',monospace;color:${flujoNeto>=0?'var(--green)':'var(--red)'}">${fmt(flujoNeto)}</span>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:0">
      <div style="border-right:1px solid var(--border)">
        <div style="padding:10px 16px;font-size:11px;font-weight:500;color:var(--muted);text-transform:uppercase;background:var(--bg3);border-bottom:1px solid var(--border)">Próximos cobros</div>
        ${(porCobrar||[]).length?`<table><tbody>${(porCobrar||[]).map(r=>`<tr>
          <td style="padding:10px 16px;font-size:12px">${fmtF(r.fecha_cobro_estimada)}</td>
          <td style="padding:10px 16px;font-size:12px">${r.clientes?.nombre||'—'}</td>
          <td style="padding:10px 16px;font-size:12px;font-family:'DM Mono',monospace;color:var(--green)">${fmt(r.monto_total)}</td>
        </tr>`).join('')}</tbody></table>`:'<div class="empty">Sin cobros proyectados</div>'}
      </div>
      <div>
        <div style="padding:10px 16px;font-size:11px;font-weight:500;color:var(--muted);text-transform:uppercase;background:var(--bg3);border-bottom:1px solid var(--border)">Próximos pagos</div>
        ${(porPagar||[]).length?`<table><tbody>${(porPagar||[]).map(r=>`<tr>
          <td style="padding:10px 16px;font-size:12px">${fmtF(r.fecha_egreso)}</td>
          <td style="padding:10px 16px;font-size:12px">${r.descripcion||'—'}</td>
          <td style="padding:10px 16px;font-size:12px;font-family:'DM Mono',monospace;color:var(--red)">${fmt(r.monto)}</td>
        </tr>`).join('')}</tbody></table>`:'<div class="empty">Sin pagos pendientes</div>'}
      </div>
    </div>`;
}

function abrirNuevoMovimiento(){
  document.getElementById('mov-titulo').textContent='Nuevo movimiento';
  document.getElementById('nm-descripcion').value='';
  document.getElementById('nm-monto').value='';
  document.getElementById('nm-fecha').value=hoy();
  document.getElementById('modal-mov').classList.add('show');
}

async function guardarMovimiento(){
  const desc=document.getElementById('nm-descripcion').value.trim();
  const monto=parseFloat(document.getElementById('nm-monto').value)||0;
  if(!desc||!monto){alert('Completá descripción y monto.');return;}
  const {error}=await db.from('caja_movimientos').insert({
    empresa_id:document.getElementById('nm-empresa').value,
    tipo:document.getElementById('nm-tipo').value,
    origen:document.getElementById('nm-origen').value,
    categoria:document.getElementById('nm-categoria').value,
    descripcion:desc,monto,
    fecha:document.getElementById('nm-fecha').value,
  });
  if(error){alert('Error: '+error.message);return;}
  cerrarModal('modal-mov');
  cargarTodo();
}

async function borrarMovimiento(id){
  if(!confirm('¿Borrar este movimiento?')) return;
  await db.from('caja_movimientos').delete().eq('id',id);
  cargarMovimientos();
}

function abrirNuevoCheque(){
  document.getElementById('modal-cheque').classList.add('show');
}

async function guardarCheque(){
  const numero=document.getElementById('nc-numero').value.trim();
  const monto=parseFloat(document.getElementById('nc-monto').value)||0;
  if(!numero||!monto){alert('Completá número y monto.');return;}
  const {error}=await db.from('cheques').insert({
    empresa_id:document.getElementById('nc-empresa').value,
    tipo:document.getElementById('nc-tipo').value,
    numero,banco:document.getElementById('nc-banco').value||null,
    titular:document.getElementById('nc-titular').value||null,
    monto,
    fecha_emision:document.getElementById('nc-emision').value,
    fecha_vencimiento:document.getElementById('nc-vencimiento').value,
    estado:'pendiente',
    observaciones:document.getElementById('nc-obs').value||null,
  });
  if(error){alert('Error: '+error.message);return;}
  cerrarModal('modal-cheque');
  cargarCheques();
}

async function actualizarEstadoCheque(id,estado){
  await db.from('cheques').update({estado}).eq('id',id);
  cargarCheques();
}

async function borrarCheque(id){
  if(!confirm('¿Borrar este cheque?')) return;
  await db.from('cheques').delete().eq('id',id);
  cargarCheques();
}

function cerrarModal(id){document.getElementById(id).classList.remove('show');}
async function logout(){await db.auth.signOut();window.location.href='login.html';}

init();
</script>
</body>
