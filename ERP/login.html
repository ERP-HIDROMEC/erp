<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hidromec ERP — Ingresar</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: #0f1117;
    color: #e8eaf0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .bg-grid {
    position: fixed; inset: 0;
    background-image: linear-gradient(rgba(59,130,246,0.03) 1px, transparent 1px),
                      linear-gradient(90deg, rgba(59,130,246,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }
  .card {
    background: #181c27;
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 16px;
    padding: 40px;
    width: 100%;
    max-width: 400px;
    position: relative;
    z-index: 1;
  }
  .logo {
    text-align: center;
    margin-bottom: 32px;
  }
  .logo-icon {
    width: 52px; height: 52px;
    background: rgba(59,130,246,0.15);
    border: 1px solid rgba(59,130,246,0.3);
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 16px;
  }
  .logo-icon svg { width: 26px; height: 26px; color: #3b82f6; }
  .logo h1 { font-size: 20px; font-weight: 600; }
  .logo p { font-size: 13px; color: #7a8099; margin-top: 4px; }

  .form-group { margin-bottom: 18px; }
  label {
    display: block;
    font-size: 12px; font-weight: 500;
    color: #7a8099;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 8px;
  }
  input {
    width: 100%;
    padding: 11px 14px;
    background: #1e2436;
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 8px;
    color: #e8eaf0;
    font-size: 14px;
    font-family: 'DM Sans', sans-serif;
    outline: none;
    transition: border-color 0.15s;
  }
  input:focus { border-color: #3b82f6; }
  input::placeholder { color: #7a8099; }

  .btn {
    width: 100%;
    padding: 12px;
    background: #3b82f6;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 500;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    transition: background 0.15s;
    margin-top: 8px;
  }
  .btn:hover { background: #2563eb; }
  .btn:disabled { background: #374151; cursor: not-allowed; }

  .error {
    background: rgba(239,68,68,0.1);
    border: 1px solid rgba(239,68,68,0.2);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 13px;
    color: #ef4444;
    margin-bottom: 16px;
    display: none;
  }
  .footer {
    text-align: center;
    margin-top: 24px;
    font-size: 12px;
    color: #7a8099;
  }
</style>
</head>
<body>
<div class="bg-grid"></div>

<div class="card">
  <div class="logo">
    <div class="logo-icon">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-2 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/>
      </svg>
    </div>
    <h1>Hidromec ERP</h1>
    <p>Ingresá con tu cuenta</p>
  </div>

  <div class="error" id="error-msg"></div>

  <div class="form-group">
    <label>Email</label>
    <input type="email" id="email" placeholder="tu@email.com" autocomplete="email"/>
  </div>
  <div class="form-group">
    <label>Contraseña</label>
    <input type="password" id="password" placeholder="••••••••" autocomplete="current-password"/>
  </div>

  <button class="btn" id="btn-login" onclick="login()">Ingresar</button>

  <div class="footer">Hidromec SRL &amp; Placemem SRL — Sistema interno</div>
</div>

<script>
const SUPABASE_URL = 'https://avgkhbqtanvfsqxncmzm.supabase.co';
const SUPABASE_KEY = 'sb_publishable_Q5W5JwdhUOWnOZv_QaGWQg_xHVhSEls';
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

// Si ya tiene sesión activa, redirigir directo
db.auth.getSession().then(({ data }) => {
  if (data.session) window.location.href = 'index.html';
});

// Enter para login
document.getElementById('password').addEventListener('keydown', e => {
  if (e.key === 'Enter') login();
});

async function login() {
  const email = document.getElementById('email').value.trim();
  const pass  = document.getElementById('password').value;
  const btn   = document.getElementById('btn-login');
  const err   = document.getElementById('error-msg');

  if (!email || !pass) {
    showError('Completá email y contraseña.');
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Ingresando...';
  err.style.display = 'none';

  const { data, error } = await db.auth.signInWithPassword({ email, password: pass });

  if (error) {
    showError('Email o contraseña incorrectos.');
    btn.disabled = false;
    btn.textContent = 'Ingresar';
    return;
  }

  // Verificar que el usuario existe en la tabla usuarios
  const { data: usuario } = await db
    .from('usuarios')
    .select('rol, activo, nombre')
    .eq('id', data.user.id)
    .single();

  if (!usuario || !usuario.activo) {
    await db.auth.signOut();
    showError('Tu usuario no tiene acceso al sistema. Contactá al administrador.');
    btn.disabled = false;
    btn.textContent = 'Ingresar';
    return;
  }

  window.location.href = 'index.html';
}

function showError(msg) {
  const el = document.getElementById('error-msg');
  el.textContent = msg;
  el.style.display = 'block';
}
</script>
</body>
</html>
