<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hidromec ERP — Clientes</title>
<link rel="stylesheet" href="erp-layout.css">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="erp-utils.js"></script>
<script src="erp-sidebar.js"></script>
<script src="empresas.api.js"></script>
<script src="clientes.api.js"></script>
<style>
  .tab:hover{color:var(--text);}
  .kpis{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap;}
  .kpi-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px 18px;min-width:150px;flex:1;}
  .kpi-card.blue{border-top:3px solid var(--blue);}
  .kpi-card.green{border-top:3px solid var(--green);}
  .kpi-card.orange{border-top:3px solid var(--orange);}
  .kpi-card.red{border-top:3px solid var(--red);}
  .kpi-card.teal{border-top:3px solid var(--teal);}
  .kpi-value{font-size:22px;font-weight:600;font-family:'DM Mono',monospace;}
  tr:hover .form-group.full{flex:0 0 100%;}
  .form-group .form-group input,.form-group select,.form-group .form-group .form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--blue);}
  .badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;}
  .badge-activo{background:rgba(16,185,129,0.15);color:var(--green);}
  .badge-inactivo{background:rgba(239,68,68,0.15);color:var(--red);}
  .detalle-card{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:12px 16px;margin-bottom:8px;}
  .detalle-.detalle-value{font-size:14px;color:var(--text);}
</style>
</head>
<body>
<div id="overlay" class="overlay" onclick="ERP.closeSidebar()"></div>
<div id="sidebar-root"></div>

<main class="main">
  <div class="page-header">
    <h2>Clientes</h2>
    <button class="btn btn-primary" id="btn-nuevo" onclick="abrirNuevo()">+ Nuevo cliente</button>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="cambiarTab('lista',this)">Lista de clientes</button>
    <button class="tab" onclick="cambiarTab('detalle',this)" id="tab-detalle" style="display:none">Ver cliente</button>
  </div>

  <div class="filtros">
    <select id="f-empresa" onchange="cargarClientes()">
      <option value="">Todas las empresas</option>
      <option value="a1000000-0000-0000-0000-000000000001">Hidromec</option>
      <option value="a2000000-0000-0000-0000-000000000002">Placemem</option>
    </select>
    <select id="f-activo" onchange="cargarClientes()">
      <option value="">Todos</option>
      <option value="true">Activos</option>
      <option value="false">Inactivos</option>
    </select>
    <input type="text" id="f-buscar" placeholder="Buscar por nombre, CUIT..." oninput="cargarClientes()" style="width:240px">
  </div>

  <div id="kpis" class="kpis"></div>
  <div id="contenido"></div>
</main>

<!-- MODAL CLIENTE -->
<div class="modal-overlay" id="modal-cliente">
  <div class="modal">
    <h3 id="cli-titulo">Nuevo cliente</h3>
    <div class="form-row">
      <div class="form-group">
        <label>Empresa (Hidromec/Placemem)</label>
        <select id="nc-empresa">
          <option value="a1000000-0000-0000-0000-000000000001">Hidromec</option>
          <option value="a2000000-0000-0000-0000-000000000002">Placemem</option>
        </select>
      </div>
      <div class="form-group">
        <label>Razón social / Nombre *</label>
        <input type="text" id="nc-nombre" placeholder="Ej: Ternium Argentina S.A.">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>CUIT</label>
        <input type="text" id="nc-cuit" placeholder="30-12345678-9">
      </div>
      <div class="form-group">
        <label>Condición IVA</label>
        <select id="nc-iva">
          <option value="responsable_inscripto">Responsable Inscripto</option>
          <option value="monotributo">Monotributo</option>
          <option value="exento">Exento</option>
          <option value="consumidor_final">Consumidor Final</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Email de facturación</label>
        <input type="email" id="nc-email" placeholder="facturacion@empresa.com">
      </div>
      <div class="form-group">
        <label>Teléfono</label>
        <input type="text" id="nc-telefono" placeholder="+54 11 1234-5678">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Contacto principal</label>
        <input type="text" id="nc-contacto" placeholder="Nombre del contacto habitual">
      </div>
      <div class="form-group">
        <label>Email contacto</label>
        <input type="email" id="nc-email-contacto" placeholder="contacto@empresa.com">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group full">
        <label>Dirección</label>
        <input type="text" id="nc-direccion" placeholder="Calle, número, ciudad, provincia">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Localidad</label>
        <input type="text" id="nc-localidad" placeholder="Ej: Zárate">
      </div>
      <div class="form-group">
        <label>Provincia</label>
        <input type="text" id="nc-provincia" placeholder="Ej: Buenos Aires">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group full">
        <label>Observaciones</label>
        <textarea id="nc-obs" placeholder="Notas internas, condiciones comerciales, contactos adicionales..."></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="cerrarModal('modal-cliente')">Cancelar</button>
      <button class="btn btn-primary" onclick="guardarCliente()">Guardar</button>
    </div>
  </div>
</div>


<!-- MODAL AGREGAR DOCUMENTO CLIENTE -->
<div class="modal-overlay" id="modal-doc-cliente">
  <div class="modal" style="max-width:480px">
    <h3 id="mdc-titulo">Agregar documento requerido</h3>
    <div style="background:rgba(59,130,246,0.08);border:1px solid rgba(59,130,246,0.15);border-radius:8px;padding:10px 14px;font-size:12px;color:var(--muted);margin-bottom:16px">
      Cargá el documento una vez y después solo renovás la fecha cuando venza.
    </div>
    <div class="form-row">
      <div class="form-group full">
        <label>Nombre del documento *</label>
        <input type="text" id="mdc-nombre" placeholder="Ej: ART empresa, Programa de seguridad, VTV Camion ABC123...">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Tipo</label>
        <select id="mdc-tipo">
          <optgroup label="Empresa">
            <option value="art_empresa">ART empresa</option>
            <option value="habilitacion">Habilitacion empresa</option>
            <option value="programa_seguridad">Programa de seguridad</option>
            <option value="no_repeticion">No repeticion siniestros</option>
            <option value="seguro_rc">Seguro responsabilidad civil</option>
            <option value="cert_fiscal">Certificado fiscal</option>
          </optgroup>
          <optgroup label="Personal">
            <option value="preocupacional">Preocupacional</option>
            <option value="art_empleado">ART empleado</option>
            <option value="capacitacion">Capacitacion</option>
            <option value="induccion">Induccion cliente</option>
          </optgroup>
          <optgroup label="Vehiculo/Equipo">
            <option value="vtv">VTV / RTO</option>
            <option value="seguro_vehiculo">Seguro vehiculo</option>
            <option value="habilitacion_equipo">Habilitacion equipo</option>
          </optgroup>
          <optgroup label="Otro">
            <option value="otro">Otro</option>
          </optgroup>
        </select>
      </div>
      <div class="form-group">
        <label>Fecha de vencimiento *</label>
        <input type="date" id="mdc-vencimiento">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group full">
        <label>Notas (opcional)</label>
        <input type="text" id="mdc-notas" placeholder="Ej: Solo aplica a obra Planta 2, renovar cada 6 meses...">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="cerrarModal('modal-doc-cliente')">Cancelar</button>
      <button class="btn btn-primary" onclick="guardarDocCliente()">Guardar</button>
    </div>
  </div>
</div>

<!-- MODAL RENOVAR DOCUMENTO -->
<div class="modal-overlay" id="modal-renovar-doc">
  <div class="modal" style="max-width:380px">
    <h3>Renovar documento</h3>
    <div id="renovar-doc-nombre" style="font-size:15px;font-weight:500;color:var(--text);margin-bottom:16px;padding:12px;background:var(--bg3);border-radius:8px"></div>
    <div class="form-group">
      <label>Nueva fecha de vencimiento *</label>
      <input type="date" id="renovar-fecha" style="width:100%">
    </div>
    <div class="form-group" style="margin-top:12px">
      <label>Notas (opcional)</label>
      <input type="text" id="renovar-notas" placeholder="Observaciones sobre esta renovacion...">
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="cerrarModal('modal-renovar-doc')">Cancelar</button>
      <button class="btn btn-primary" onclick="confirmarRenovar()">Confirmar renovacion</button>
    </div>
  </div>
</div>

<script>
let tabActual = 'lista';
let clienteSelId = null;
let clienteEditId = null;

async function init(){
  const usuario = await ERP.initLayout('clientes');
  if(!usuario) return;
  cargarClientes();
}

function cambiarTab(tab, btn){
  tabActual = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  if(btn) btn.classList.add('active');
  document.getElementById('btn-nuevo').style.display = tab === 'detalle' ? 'none' : '';
  if(tab === 'lista') cargarClientes();
  else if(tab === 'detalle' && clienteSelId) cargarDetalle(clienteSelId);
}

async function cargarClientes(){
  document.getElementById('kpis').innerHTML = '';
  document.getElementById('contenido').innerHTML = '<div class="spinner-wrap"><div class="spinner"></div>Cargando...</div>';
  const emp = document.getElementById('f-empresa').value;
  const activo = document.getElementById('f-activo').value;
  const buscar = document.getElementById('f-buscar').value.toLowerCase();

  const filtros = {};
  if(emp) filtros.empresaId = emp;
  if(activo !== '') filtros.soloActivos = activo === 'true';
  let rows = await ClientesAPI.getClientes(filtros);
  if(buscar) rows = rows.filter(r =>
    (r.nombre||'').toLowerCase().includes(buscar) ||
    (r.cuit||'').includes(buscar) ||
    (r.localidad||'').toLowerCase().includes(buscar)
  );

  const activos = rows.filter(r => r.activo !== false).length;
  const inactivos = rows.filter(r => r.activo === false).length;

  document.getElementById('kpis').innerHTML = `
    <div class="kpi-card blue"><div class="kpi-label">Total clientes</div><div class="kpi-value">${rows.length}</div></div>
    <div class="kpi-card green"><div class="kpi-label">Activos</div><div class="kpi-value">${activos}</div></div>
    <div class="kpi-card red"><div class="kpi-label">Inactivos</div><div class="kpi-value">${inactivos}</div></div>`;

  document.getElementById('contenido').innerHTML = `
    <div class="panel">
      <div style="overflow-x:auto"><table>
        <thead><tr>
          <th>Empresa</th><th>Razón social</th><th>CUIT</th><th>Condición IVA</th>
          <th>Contacto</th><th>Email</th><th>Localidad</th><th>Estado</th><th>Acciones</th>
        </tr></thead>
        <tbody>${rows.length ? rows.map(r => `<tr>
          <td style="font-size:12px">${r.empresas?.nombre||'—'}</td>
          <td style="font-weight:500;cursor:pointer;color:var(--blue)" onclick="verDetalle('${r.id}')">${r.nombre}</td>
          <td class="mono" style="font-size:12px">${r.cuit||'—'}</td>
          <td style="font-size:12px;color:var(--muted)">${formatIVA(r.condicion_iva||r.iva||'')}</td>
          <td style="font-size:12px">${r.contacto||'—'}</td>
          <td style="font-size:12px;color:var(--muted)">${r.email||r.email_facturacion||'—'}</td>
          <td style="font-size:12px">${r.localidad||'—'}</td>
          <td><span class="badge ${r.activo===false?'badge-inactivo':'badge-activo'}">${r.activo===false?'Inactivo':'Activo'}</span></td>
          <td><div style="display:flex;gap:6px">
            <button class="btn btn-sm btn-ghost" onclick="verDetalle('${r.id}')">Ver</button>
            <button class="btn btn-sm btn-ghost" onclick="editarCliente('${r.id}')">Editar</button>
            <button class="btn btn-sm btn-danger" onclick="toggleActivo('${r.id}',${r.activo!==false})">${r.activo===false?'Activar':'Dar de baja'}</button>
          </div></td>
        </tr>`).join('') : '<tr><td colspan="9" style="text-align:center;padding:40px;color:var(--muted)">Sin clientes. Creá el primero con el botón +</td></tr>'}</tbody>
      </table></div>
    </div>`;
}

function formatIVA(v){
  const m = {responsable_inscripto:'Resp. Inscripto',monotributo:'Monotributo',exento:'Exento',consumidor_final:'Cons. Final'};
  return m[v] || v || '—';
}

async function verDetalle(id){
  clienteSelId = id;
  document.getElementById('tab-detalle').style.display = '';
  const tab = document.getElementById('tab-detalle');
  tab.style.display = '';
  cambiarTab('detalle', tab);
}

async function cargarDetalle(id){
  document.getElementById('contenido').innerHTML = '<div class="spinner-wrap"><div class="spinner"></div>Cargando...</div>';
  const cli=await ClientesAPI.getClienteById(id);
  if(!cli){document.getElementById('contenido').innerHTML='<div style="padding:40px;text-align:center;color:var(--muted)">Cliente no encontrado</div>';return;}

  // Load stats in parallel
  const [
    {data:facturas, error: fe},
    {data:remitos},
    {data:contratos},
    {data:proyectos}
  ] = await Promise.all([
    ClientesAPI.getClienteDetalle(id).then(d=>({data:d.facturas})),
    ClientesAPI.getClienteDetalle(id).then(d=>({data:d.remitos})),
    ClientesAPI.getClienteDetalle(id).then(d=>({data:d.contratos})),
    ClientesAPI.getClienteDetalle(id).then(d=>({data:d.proyectos})),
  ]);

  const totalFac = (facturas||[]).filter(f=>f.estado!=='anulada').reduce((s,f)=>s+Number(f.monto_total||0),0);
  const totalCont = (contratos||[]).reduce((s,c)=>s+Number(c.monto_total||0),0);

  document.getElementById('contenido').innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <button class="btn btn-ghost btn-sm" onclick="cambiarTab('lista',document.querySelector('.tab'))">← Volver a la lista</button>
      <button class="btn btn-ghost btn-sm" onclick="editarCliente('${id}')">Editar cliente</button>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px">
      <div class="panel">
        <div class="panel-header"><h3>Datos del cliente</h3></div>
        <div style="padding:16px;display:grid;grid-template-columns:1fr 1fr;gap:12px">
          ${campo('Razón social', cli.nombre)}
          ${campo('CUIT', cli.cuit)}
          ${campo('Condición IVA', formatIVA(cli.condicion_iva||cli.iva))}
          ${campo('Empresa', cli.empresas?.nombre)}
          ${campo('Email facturación', cli.email||cli.email_facturacion)}
          ${campo('Teléfono', cli.telefono)}
          ${campo('Contacto principal', cli.contacto)}
          ${campo('Email contacto', cli.email_contacto)}
          ${campo('Dirección', cli.direccion, true)}
          ${campo('Localidad', cli.localidad)}
          ${campo('Provincia', cli.provincia)}
        </div>
        ${cli.observaciones?`<div style="padding:0 16px 16px"><div class="detalle-label">Observaciones</div><div style="font-size:13px;color:var(--muted)">${cli.observaciones}</div></div>`:''}
      </div>
      <div>
        <div class="kpis" style="flex-direction:column">
          <div class="kpi-card blue"><div class="kpi-label">Facturado total (ultimas 5)</div><div class="kpi-value" style="font-size:18px">${fmt(totalFac)}</div></div>
          <div class="kpi-card green"><div class="kpi-label">Contratos</div><div class="kpi-value">${(contratos||[]).length}</div></div>
          <div class="kpi-card orange"><div class="kpi-label">Proyectos activos</div><div class="kpi-value">${(proyectos||[]).filter(p=>p.estado==='activo').length}</div></div>
          <div class="kpi-card teal"><div class="kpi-label">Remitos emitidos</div><div class="kpi-value">${(remitos||[]).length}</div></div>
        </div>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
      ${tablaHistorial('Últimas facturas', facturas||[], [
        {k:'numero_factura',l:'N° Factura'},{k:'fecha_emision',l:'Fecha',fmt:'fecha'},{k:'monto_total',l:'Monto',fmt:'moneda'},{k:'estado',l:'Estado'}
      ], 'facturas.html')}
      ${tablaHistorial('Últimos remitos', remitos||[], [
        {k:'numero_formateado',l:'N° Remito'},{k:'fecha',l:'Fecha',fmt:'fecha'},{k:'total_valorizado',l:'Valorizado',fmt:'moneda'},{k:'estado',l:'Estado'}
      ], 'remitos.html')}
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:16px">
      ${tablaHistorial('Contratos', contratos||[], [
        {k:'numero_contrato',l:'N° Contrato'},{k:'monto_total',l:'Monto',fmt:'moneda'},{k:'estado',l:'Estado'}
      ], 'contratos.html')}
      ${tablaHistorial('Proyectos', proyectos||[], [
        {k:'nombre',l:'Proyecto'},{k:'estado',l:'Estado'},{k:'fecha_inicio',l:'Inicio',fmt:'fecha'}
      ], 'proyectos.html')}
    </div>
    <div style="margin-top:16px" id="seccion-docs-cliente"></div>`;
  cargarDocsCliente(id);
}

function campo(label, value, full=false){
  if(!value) return '';
  return `<div${full?' style="grid-column:span 2"':''}>
    <div class="detalle-label">${label}</div>
    <div class="detalle-value">${value}</div>
  </div>`;
}

function tablaHistorial(titulo, rows, cols, link){
  if(!rows.length) return `<div class="panel"><div class="panel-header"><h3>${titulo}</h3></div><div style="padding:24px;text-align:center;color:var(--muted);font-size:13px">Sin registros</div></div>`;
  return `<div class="panel">
    <div class="panel-header">
      <h3>${titulo}</h3>
      <a href="${link}" class="btn btn-ghost btn-sm">Ver todos</a>
    </div>
    <table><thead><tr>${cols.map(c=>`<th>${c.l}</th>`).join('')}</tr></thead>
    <tbody>${rows.map(r=>`<tr>${cols.map(c=>{
      let v = r[c.k];
      if(c.fmt==='moneda') v = v ? fmt(v) : '—';
      else if(c.fmt==='fecha') v = v ? fmtF(v) : '—';
      else v = v || '—';
      return `<td style="font-size:12px">${v}</td>`;
    }).join('')}</tr>`).join('')}</tbody></table>
  </div>`;
}

function abrirNuevo(){
  clienteEditId = null;
  document.getElementById('cli-titulo').textContent = 'Nuevo cliente';
  ['nc-nombre','nc-cuit','nc-email','nc-telefono','nc-contacto','nc-email-contacto','nc-direccion','nc-localidad','nc-provincia','nc-obs'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('nc-iva').value = 'responsable_inscripto';
  document.getElementById('modal-cliente').classList.add('show');
}

async function editarCliente(id){
  const r=await ClientesAPI.getClienteById(id);
  if(!r) return;
  clienteEditId = id;
  document.getElementById('cli-titulo').textContent = 'Editar cliente';
  document.getElementById('nc-empresa').value = r.empresa_id || 'a1000000-0000-0000-0000-000000000001';
  document.getElementById('nc-nombre').value = r.nombre || '';
  document.getElementById('nc-cuit').value = r.cuit || '';
  document.getElementById('nc-iva').value = r.condicion_iva || r.iva || 'responsable_inscripto';
  document.getElementById('nc-email').value = r.email || r.email_facturacion || '';
  document.getElementById('nc-telefono').value = r.telefono || '';
  document.getElementById('nc-contacto').value = r.contacto || '';
  document.getElementById('nc-email-contacto').value = r.email_contacto || '';
  document.getElementById('nc-direccion').value = r.direccion || '';
  document.getElementById('nc-localidad').value = r.localidad || '';
  document.getElementById('nc-provincia').value = r.provincia || '';
  document.getElementById('nc-obs').value = r.observaciones || '';
  document.getElementById('modal-cliente').classList.add('show');
}

async function guardarCliente(){
  const nombre = document.getElementById('nc-nombre').value.trim();
  if(!nombre){ toast('El nombre es obligatorio.', 'warn'); return; }
  const payload = {
    empresa_id: document.getElementById('nc-empresa').value,
    nombre,
    cuit: document.getElementById('nc-cuit').value.trim() || null,
    condicion_iva: document.getElementById('nc-iva').value,
    email: document.getElementById('nc-email').value.trim() || null,
    email_facturacion: document.getElementById('nc-email').value.trim() || null,
    telefono: document.getElementById('nc-telefono').value.trim() || null,
    contacto: document.getElementById('nc-contacto').value.trim() || null,
    email_contacto: document.getElementById('nc-email-contacto').value.trim() || null,
    direccion: document.getElementById('nc-direccion').value.trim() || null,
    localidad: document.getElementById('nc-localidad').value.trim() || null,
    provincia: document.getElementById('nc-provincia').value.trim() || null,
    observaciones: document.getElementById('nc-obs').value || null,
    activo: true,
  };
  let error;
  try{ if(clienteEditId){ await ClientesAPI.actualizarCliente(clienteEditId,payload); } else { await ClientesAPI.crearCliente(payload); } }catch(e){error=e;}
  if(error){ toast('Error: ', 'error'); return; }
  cerrarModal('modal-cliente');
  cargarClientes();
}

async function toggleActivo(id, estaActivo){
  const msg = estaActivo ? '¿Dar de baja este cliente?' : '¿Reactivar este cliente?';
  if(!(await confirmar(msg))) return;
  await ClientesAPI.toggleActivoCliente(id,estaActivo);
  cargarClientes();
}


// ══════════════════════════════════════════════════════════════
// DOCUMENTACION REQUERIDA POR CLIENTE
// ══════════════════════════════════════════════════════════════
let docRenovarId = null;

const TIPO_DOC_L = {
  art_empresa:'ART empresa', habilitacion:'Habilitacion empresa',
  programa_seguridad:'Programa seguridad', no_repeticion:'No repeticion',
  seguro_rc:'Seguro RC', cert_fiscal:'Cert. fiscal',
  preocupacional:'Preocupacional', art_empleado:'ART empleado',
  capacitacion:'Capacitacion', induccion:'Induccion cliente',
  vtv:'VTV / RTO', seguro_vehiculo:'Seguro vehiculo',
  habilitacion_equipo:'Hab. equipo', otro:'Otro'
};

async function cargarDocsCliente(clienteId){
  const wrap = document.getElementById('seccion-docs-cliente');
  if(!wrap) return;
  wrap.innerHTML = '<div class="spinner-wrap" style="padding:20px"><div class="spinner"></div></div>';

  const hoyStr = new Date().toISOString().split('T')[0];
  const en30 = new Date(); en30.setDate(en30.getDate()+30);
  const en30Str = en30.toISOString().split('T')[0];

  const data=await ClientesAPI.getDocsCliente(clienteSelId);
  const docs = data || [];

  const vencidos = docs.filter(d=>d.fecha_vencimiento&&d.fecha_vencimiento<hoyStr).length;
  const porVencer = docs.filter(d=>d.fecha_vencimiento&&d.fecha_vencimiento>=hoyStr&&d.fecha_vencimiento<=en30Str).length;

  const tarjetas = docs.map(d=>{
    const v = d.fecha_vencimiento;
    const esV = v && v < hoyStr;
    const esP = v && v >= hoyStr && v <= en30Str;
    const dias = v ? Math.ceil((new Date(v+'T12:00:00')-new Date())/(1000*60*60*24)) : null;

    const color = esV?'var(--red)':esP?'var(--orange)':'var(--green)';
    const bgColor = esV?'rgba(239,68,68,0.06)':esP?'rgba(245,158,11,0.06)':'rgba(16,185,129,0.06)';
    const borderColor = esV?'rgba(239,68,68,0.25)':esP?'rgba(245,158,11,0.25)':'rgba(16,185,129,0.2)';

    const estadoLabel = esV?'Vencido':esP?'Por vencer':'Vigente';
    const fechaLabel = v ? new Date(v+'T12:00:00').toLocaleDateString('es-AR') : 'Sin fecha';
    const diasLabel = esV?`Vencio hace ${Math.abs(dias)}d`:esP?`Vence en ${dias}d`:`Vence ${fechaLabel}`;

    return `<div style="background:${bgColor};border:1px solid ${borderColor};border-radius:10px;padding:14px 16px;display:flex;align-items:center;gap:12px">
      <div style="width:10px;height:10px;border-radius:50%;background:${color};flex-shrink:0"></div>
      <div style="flex:1;min-width:0">
        <div style="font-size:13px;font-weight:500;color:var(--text);margin-bottom:2px">${d.nombre}</div>
        <div style="font-size:12px;color:var(--muted)">${diasLabel}${d.notas?` · ${d.notas}`:''}</div>
      </div>
      <span style="font-size:11px;padding:2px 10px;border-radius:20px;font-weight:500;white-space:nowrap;background:${esV?'rgba(239,68,68,0.12)':esP?'rgba(245,158,11,0.12)':'rgba(16,185,129,0.12)'};color:${color}">${estadoLabel}</span>
      <button class="btn btn-sm btn-ghost" onclick="abrirRenovar('${d.id}','${d.nombre.replace(/'/g,"\\'")}','${v||''}')">Renovar</button>
      <button onclick="borrarDocCliente('${d.id}')" style="padding:4px 8px;background:transparent;border:none;color:var(--muted);cursor:pointer;font-size:16px;line-height:1">×</button>
    </div>`;
  }).join('');

  wrap.innerHTML = `
    <div class="panel">
      <div class="panel-header">
        <div>
          <h3>Documentacion requerida por el cliente</h3>
          ${vencidos>0||porVencer>0?`<div style="font-size:12px;margin-top:3px;color:${vencidos>0?'var(--red)':'var(--orange)'}">
            ${vencidos>0?`${vencidos} vencido${vencidos>1?'s':''}`:''} ${vencidos>0&&porVencer>0?'·':''} ${porVencer>0?`${porVencer} por vencer`:''}
          </div>`:''}
        </div>
        <button class="btn btn-ghost btn-sm" onclick="abrirAgregarDoc('${clienteId}')">+ Agregar documento</button>
      </div>
      ${docs.length?`
        <div style="padding:16px;display:grid;grid-template-columns:1fr 1fr;gap:8px">
          ${tarjetas}
        </div>`:`
        <div style="padding:32px;text-align:center">
          <div style="font-size:13px;color:var(--muted);margin-bottom:12px">Todavia no hay documentos configurados para este cliente.</div>
          <button class="btn btn-ghost btn-sm" onclick="abrirAgregarDoc('${clienteId}')">+ Agregar primer documento</button>
        </div>`}
    </div>`;
}

let _docClienteId = null;

function abrirAgregarDoc(clienteId){
  _docClienteId = clienteId;
  document.getElementById('mdc-titulo').textContent = 'Agregar documento requerido';
  document.getElementById('mdc-nombre').value = '';
  document.getElementById('mdc-tipo').value = 'art_empresa';
  document.getElementById('mdc-vencimiento').value = '';
  document.getElementById('mdc-notas').value = '';
  document.getElementById('modal-doc-cliente').classList.add('show');
}

async function guardarDocCliente(){
  const nombre = document.getElementById('mdc-nombre').value.trim();
  const venc = document.getElementById('mdc-vencimiento').value;
  if(!nombre){ toast('El nombre es obligatorio.', 'warn'); return; }
  if(!venc){ toast('La fecha de vencimiento es obligatoria.', 'warn'); return; }
  let error;
  try{ await ClientesAPI.crearDocCliente({
    cliente_id: _docClienteId,
    nombre,
    tipo: document.getElementById('mdc-tipo').value,
    fecha_vencimiento: venc,
    notas: document.getElementById('mdc-notas').value || null,
  });
  }catch(e){error=e;}
  if(error){ toast('Error: ', 'error'); return; }
  cerrarModal('modal-doc-cliente');
  cargarDocsCliente(_docClienteId);
}

function abrirRenovar(id, nombre, fechaActual){
  docRenovarId = id;
  document.getElementById('renovar-doc-nombre').textContent = nombre;
  // Sugerir +1 año de la fecha actual
  const base = fechaActual ? new Date(fechaActual+'T12:00:00') : new Date();
  base.setFullYear(base.getFullYear()+1);
  document.getElementById('renovar-fecha').value = base.toISOString().split('T')[0];
  document.getElementById('renovar-notas').value = '';
  document.getElementById('modal-renovar-doc').classList.add('show');
}

async function confirmarRenovar(){
  const fecha = document.getElementById('renovar-fecha').value;
  if(!fecha){ toast('Ingresa la nueva fecha.', 'warn'); return; }
  const notas = document.getElementById('renovar-notas').value || null;
  let error;
  try{ await ClientesAPI.actualizarDocCliente(docRenovarId,{
    fecha_vencimiento: fecha,
    notas: notas,
    updated_at: new Date().toISOString(),
  }); }catch(e){error=e;}
  if(error){ toast('Error: ', 'error'); return; }
  cerrarModal('modal-renovar-doc');
  cargarDocsCliente(clienteSelId);
}

async function borrarDocCliente(id){
  if(!(await confirmar('Borrar este documento de la lista?'))) return;
  await ClientesAPI.eliminarDocCliente(id);
  cargarDocsCliente(clienteSelId);
}

function cerrarModal(id){ document.getElementById(id).classList.remove('show'); }
// logout() → ahora en ERP.logout() (erp-sidebar.js)

init();
</script>
