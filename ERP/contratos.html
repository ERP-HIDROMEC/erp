<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hidromec ERP — Contratos</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{--bg:#0f1117;--bg2:#181c27;--bg3:#1e2436;--border:rgba(255,255,255,0.07);--text:#e8eaf0;--muted:#7a8099;--blue:#3b82f6;--green:#10b981;--red:#ef4444;--orange:#f59e0b;--purple:#8b5cf6;--teal:#14b8a6;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
  .sidebar{position:fixed;left:0;top:0;bottom:0;width:220px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:100;}
  .sidebar-logo{padding:24px 20px 20px;border-bottom:1px solid var(--border);}
  .sidebar-logo h1{font-size:16px;font-weight:600;}
  .sidebar-logo span{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;}
  .nav-section{padding:16px 12px 8px;font-size:10px;font-weight:500;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;}
  .nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;margin:1px 8px;border-radius:8px;font-size:13.5px;color:var(--muted);cursor:pointer;transition:all 0.15s;text-decoration:none;}
  .nav-item:hover{background:var(--bg3);color:var(--text);}
  .nav-item.active{background:rgba(59,130,246,0.15);color:var(--blue);}
  .nav-item svg{width:16px;height:16px;flex-shrink:0;}
  .nav-bottom{margin-top:auto;padding:16px 12px;border-top:1px solid var(--border);}
  .btn-logout{width:100%;padding:9px 12px;background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.2);border-radius:8px;color:var(--red);font-size:13px;font-family:'DM Sans',sans-serif;cursor:pointer;}
  .main{margin-left:220px;padding:28px 32px;}
  .page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px;}
  .page-header h2{font-size:22px;font-weight:600;}
  .tabs{display:flex;gap:4px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:4px;margin-bottom:24px;width:fit-content;}
  .tab{padding:8px 18px;border-radius:7px;font-size:13px;cursor:pointer;color:var(--muted);transition:all 0.15s;border:none;background:none;font-family:'DM Sans',sans-serif;}
  .tab.active{background:var(--blue);color:#fff;}
  .tab:hover:not(.active){color:var(--text);}
  .filtros{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;align-items:center;}
  .filtros select,.filtros input{padding:8px 12px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;font-family:'DM Sans',sans-serif;outline:none;}
  .btn{padding:9px 18px;border-radius:8px;font-size:13px;font-weight:500;font-family:'DM Sans',sans-serif;cursor:pointer;border:none;transition:all 0.15s;}
  .btn-primary{background:var(--blue);color:#fff;}
  .btn-primary:hover{background:#2563eb;}
  .btn-ghost{background:var(--bg3);color:var(--text);border:1px solid var(--border);}
  .btn-ghost:hover{border-color:var(--blue);}
  .btn-danger{background:rgba(239,68,68,0.1);color:var(--red);border:1px solid rgba(239,68,68,0.2);}
  .btn-success{background:var(--green);color:#fff;}
  .btn-sm{padding:5px 12px;font-size:12px;}
  .layout{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
  .panel{background:var(--bg2);border:1px solid var(--border);border-radius:12px;overflow:hidden;}
  .panel-header{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--bg3);}
  .panel-header h3{font-size:14px;font-weight:600;}
  table{width:100%;border-collapse:collapse;}
  th{padding:9px 14px;text-align:left;font-size:11px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:0.8px;border-bottom:1px solid var(--border);background:var(--bg3);}
  td{padding:10px 14px;font-size:13px;color:var(--text);border-bottom:1px solid var(--border);vertical-align:middle;}
  tr:last-child td{border-bottom:none;}
  tr:hover td{background:rgba(255,255,255,0.02);}
  tr.selected td{background:rgba(59,130,246,0.08);}
  .mono{font-family:'DM Mono',monospace;font-size:12px;}
  .estado{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:500;}
  .estado.activo{background:rgba(16,185,129,0.15);color:var(--green);}
  .estado.vencido{background:rgba(239,68,68,0.15);color:var(--red);}
  .estado.cancelado{background:rgba(122,128,153,0.15);color:var(--muted);}
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:200;align-items:center;justify-content:center;}
  .modal-overlay.show{display:flex;}
  .modal{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:32px;width:100%;max-width:580px;max-height:90vh;overflow-y:auto;}
  .modal h3{font-size:18px;font-weight:600;margin-bottom:20px;}
  .form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px;}
  .form-row.full{grid-template-columns:1fr;}
  .form-row.three{grid-template-columns:1fr 1fr 1fr;}
  .form-group{display:flex;flex-direction:column;gap:6px;}
  label{font-size:11.5px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:0.7px;}
  input,select,textarea{padding:10px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13.5px;font-family:'DM Sans',sans-serif;outline:none;transition:border-color 0.15s;}
  input:focus,select:focus{border-color:var(--blue);}
  .modal-footer{display:flex;justify-content:flex-end;gap:10px;margin-top:24px;padding-top:20px;border-top:1px solid var(--border);}
  .precio-badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;background:rgba(245,158,11,0.1);color:var(--orange);font-family:'DM Mono',monospace;}
  .empty{padding:32px;text-align:center;color:var(--muted);font-size:13px;}
  .spinner-wrap{display:flex;align-items:center;justify-content:center;padding:32px;color:var(--muted);}
  .spinner{width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin 0.8s linear infinite;margin-right:10px;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .contrato-selected{background:rgba(59,130,246,0.06);border:1px solid rgba(59,130,246,0.2);border-radius:8px;padding:12px 16px;margin-bottom:16px;font-size:13px;}
  .kpi-row{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:20px;}
  .kpi-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:16px 20px;position:relative;overflow:hidden;}
  .kpi-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;}
  .kpi-card.blue::before{background:var(--blue);}
  .kpi-card.green::before{background:var(--green);}
  .kpi-card.orange::before{background:var(--orange);}
  .kpi-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:6px;}
  .kpi-value{font-size:20px;font-weight:600;font-family:'DM Mono',monospace;}
  .historial-badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;background:rgba(139,92,246,0.1);color:var(--purple);}
  @media(max-width:1024px){.layout{grid-template-columns:1fr;}}
  @media(max-width:768px){.main{margin-left:0;padding:16px;}.kpi-row{grid-template-columns:1fr 1fr;}.form-row,.form-row.three{grid-template-columns:1fr;}}
</style>
</head>

<main class="main">
  <div class="page-header">
    <h2>Contratos</h2>
    <button class="btn btn-primary" onclick="abrirNuevoContrato()">+ Nuevo contrato</button>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="cambiarTab('contratos',this)">Contratos</button>
    <button class="tab" onclick="cambiarTab('precios',this)">Lista de precios</button>
    <button class="tab" onclick="cambiarTab('historial',this)">Historial de precios</button>
  </div>

  <div class="filtros">
    <select id="f-empresa" onchange="recargar()">
      <option value="">Todas las empresas</option>
      <option value="a1000000-0000-0000-0000-000000000001">Hidromec</option>
      <option value="a2000000-0000-0000-0000-000000000002">Placemem</option>
    </select>
    <select id="f-estado" onchange="recargar()">
      <option value="">Todos los estados</option>

      <option value="cancelado">Cancelado</option>

  <div id="contenido"><div class="spinner-wrap"><div class="spinner"></div>Cargando...</div></div>
</main>

<script>
const SUPA_URL='https://avgkhbqtanvfsqxncmzm.supabase.co';
const SUPA_KEY='sb_publishable_Q5W5JwdhUOWnOZv_QaGWQg_xHVhSEls';
const db=supabase.createClient(SUPA_URL,SUPA_KEY);
const fmt=v=>new Intl.NumberFormat('es-AR',{style:'currency',currency:'ARS',maximumFractionDigits:0}).format(v||0);
const fmtF=d=>d?new Date(d+'T12:00:00').toLocaleDateString('es-AR'):'—';
const hoy=()=>new Date().toISOString().split('T')[0];
let tabActual='contratos';
let contratoSelId=null;
let contratoSelNombre=null;
let contratoEditId=null;
let itemEditId=null;

async function init(){
  const {data:{session}}=await db.auth.getSession();
  if(!session){window.location.href='login.html';return;}
  await cargarClientesModal();
  await cargarContratos();
}

function cambiarTab(tab,btn){
  tabActual=tab;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  recargar();
}

function recargar(){
  if(tabActual==='contratos') cargarContratos();
  else if(tabActual==='precios') cargarPrecios();
  else cargarHistorial();
}

// ===== CONTRATOS =====
async function cargarContratos(){
  document.getElementById('contenido').innerHTML='<div class="spinner-wrap"><div class="spinner"></div>Cargando...</div>';
  const emp=document.getElementById('f-empresa').value;
  const estado=document.getElementById('f-estado').value;
  const buscar=document.getElementById('f-buscar').value.toLowerCase();

  let q=db.from('contratos').select('*,clientes(nombre),empresas(nombre)').order('created_at',{ascending:false});
  if(emp) q=q.eq('empresa_id',emp);
  if(estado) q=q.eq('estado',estado);
  const {data}=await q;
  let rows=data||[];
  if(buscar) rows=rows.filter(r=>(r.numero_contrato||'').toLowerCase().includes(buscar)||(r.clientes?.nombre||'').toLowerCase().includes(buscar));

  const activos=rows.filter(r=>r.estado==='activo').length;

  document.getElementById('kpis').innerHTML=`
    <div class="kpi-card blue"><div class="kpi-label">Total contratos</div><div class="kpi-value">${rows.length}</div></div>
    <div class="kpi-card green"><div class="kpi-label">Activos</div><div class="kpi-value">${activos}</div></div>
    <div class="kpi-card orange"><div class="kpi-label">Clientes</div><div class="kpi-value">${new Set(rows.map(r=>r.cliente_id)).size}</div></div>`;

  document.getElementById('contenido').innerHTML=`
    <div class="panel">
      <div style="overflow-x:auto"><table>
        <thead><tr><th>Empresa</th><th>N° Contrato</th><th>Cliente</th><th>Descripción</th><th>Inicio</th><th>Fin</th><th>Estado</th><th>Acciones</th></tr></thead>
        <tbody>${rows.length?rows.map(r=>`<tr id="row-${r.id}" style="cursor:pointer" onclick="seleccionarContrato('${r.id}','${(r.numero_contrato||'').replace(/'/g,"\\'")}')">
          <td style="font-size:12px">${r.empresas?.nombre||'—'}</td>
          <td class="mono" style="font-weight:600">${r.numero_contrato}</td>
          <td>${r.clientes?.nombre||'—'}</td>
          <td style="font-size:12px;color:var(--muted)">${r.descripcion||'—'}</td>
          <td class="mono">${fmtF(r.fecha_inicio)}</td>
          <td class="mono">${fmtF(r.fecha_fin)}</td>
          <td><span class="estado ${r.estado}">${r.estado}</span></td>
          <td onclick="event.stopPropagation()"><div style="display:flex;gap:6px">
            <button class="btn btn-sm btn-ghost" onclick="editarContrato('${r.id}')">Editar</button>
            <button class="btn btn-sm btn-primary" onclick="seleccionarYVerPrecios('${r.id}','${(r.numero_contrato||'').replace(/'/g,"\\'")}')">Ver precios</button>
          </div></td>
        </tr>`).join(''):'<tr><td colspan="8" class="empty">Sin contratos</td></tr>'}</tbody>
      </table></div>
    </div>`;
}

function seleccionarContrato(id, nombre){
  contratoSelId=id;
  contratoSelNombre=nombre;
  document.querySelectorAll('tr[id^="row-"]').forEach(r=>r.classList.remove('selected'));
  const row=document.getElementById('row-'+id);
  if(row) row.classList.add('selected');
  document.getElementById('contrato-activo').style.display='block';
  document.getElementById('contrato-activo-nombre').textContent=nombre;
}

function seleccionarYVerPrecios(id, nombre){
  seleccionarContrato(id, nombre);
  cambiarTab('precios', document.querySelector('.tab:nth-child(2)'));
}

function deseleccionarContrato(){
  contratoSelId=null;
  contratoSelNombre=null;
  document.getElementById('contrato-activo').style.display='none';
  document.querySelectorAll('tr[id^="row-"]').forEach(r=>r.classList.remove('selected'));
}

async function cargarClientesModal(){
  const empId=document.getElementById('nc-empresa').value;
  const {data}=await db.from('clientes').select('id,nombre').eq('empresa_id',empId).eq('activo',true).order('nombre');
  document.getElementById('nc-cliente').innerHTML=(data||[]).map(c=>`<option value="${c.id}">${c.nombre}</option>`).join('');
}

function abrirNuevoContrato(){
  contratoEditId=null;
  document.getElementById('cont-titulo').textContent='Nuevo contrato';
  ['nc-numero','nc-desc','nc-inicio','nc-fin'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('nc-estado').value='activo';
  cargarClientesModal();
  document.getElementById('modal-contrato').classList.add('show');
}

async function editarContrato(id){
  const {data:r}=await db.from('contratos').select('*').eq('id',id).single();
  if(!r) return;
  contratoEditId=id;
  document.getElementById('cont-titulo').textContent='Editar contrato';
  document.getElementById('nc-empresa').value=r.empresa_id;
  await cargarClientesModal();
  document.getElementById('nc-cliente').value=r.cliente_id||'';
  document.getElementById('nc-numero').value=r.numero_contrato||'';
  document.getElementById('nc-desc').value=r.descripcion||'';
  document.getElementById('nc-estado').value=r.estado;
  document.getElementById('nc-inicio').value=r.fecha_inicio||'';
  document.getElementById('nc-fin').value=r.fecha_fin||'';
  document.getElementById('modal-contrato').classList.add('show');
}

async function guardarContrato(){
  const numero=document.getElementById('nc-numero').value.trim();
  const cliente=document.getElementById('nc-cliente').value;
  if(!numero||!cliente){alert('Completá número y cliente.');return;}
  const payload={
    empresa_id:document.getElementById('nc-empresa').value,
    cliente_id:cliente,
    numero_contrato:numero,
    descripcion:document.getElementById('nc-desc').value||null,
    estado:document.getElementById('nc-estado').value,
    fecha_inicio:document.getElementById('nc-inicio').value||null,
    fecha_fin:document.getElementById('nc-fin').value||null,
  };
  let error;
  if(contratoEditId){({error}=await db.from('contratos').update(payload).eq('id',contratoEditId));}
  else{({error}=await db.from('contratos').insert(payload));}
  if(error){alert('Error: '+error.message);return;}
  cerrarModal('modal-contrato');
  cargarContratos();
}

// ===== LISTA DE PRECIOS =====
async function cargarPrecios(){
  document.getElementById('contenido').innerHTML='<div class="spinner-wrap"><div class="spinner"></div>Cargando...</div>';
  const buscar=document.getElementById('f-buscar').value.toLowerCase();

  if(!contratoSelId){
    // Mostrar todos los contratos para seleccionar
    const emp=document.getElementById('f-empresa').value;
    let q=db.from('contratos').select('*,clientes(nombre)').eq('estado','activo').order('numero_contrato');
    if(emp) q=q.eq('empresa_id',emp);
    const {data:contratos}=await q;
    document.getElementById('kpis').innerHTML='';
    document.getElementById('contenido').innerHTML=`
      <div style="padding:20px;color:var(--muted);font-size:13px;margin-bottom:16px">Seleccioná un contrato para ver su lista de precios:</div>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px">
        ${(contratos||[]).map(c=>`
          <div onclick="seleccionarYVerPrecios('${c.id}','${(c.numero_contrato||'').replace(/'/g,"\\'")}' )"
            style="background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:16px;cursor:pointer;transition:all 0.15s"
            onmouseover="this.style.borderColor='var(--blue)'" onmouseout="this.style.borderColor='var(--border)'">
            <div style="font-size:13px;font-weight:600;font-family:'DM Mono',monospace">${c.numero_contrato}</div>
            <div style="font-size:12px;color:var(--muted);margin-top:4px">${c.clientes?.nombre||'—'}</div>
          </div>`).join('')}
      </div>`;
    return;
  }

  // Cargar items del contrato seleccionado
  let q=db.from('contrato_items').select('*').eq('contrato_id',contratoSelId).eq('activo',true).order('descripcion');
  const {data:items}=await q;
  let rows=items||[];
  if(buscar) rows=rows.filter(r=>(r.descripcion||'').toLowerCase().includes(buscar));

  document.getElementById('kpis').innerHTML=`
    <div class="kpi-card blue"><div class="kpi-label">Items en contrato</div><div class="kpi-value">${rows.length}</div></div>
    <div class="kpi-card orange"><div class="kpi-label">Precio promedio</div><div class="kpi-value" style="font-size:16px">${rows.length?fmt(rows.reduce((s,r)=>s+Number(r.precio_unitario||0),0)/rows.length):'—'}</div></div>
    <div class="kpi-card green"><div class="kpi-label">Último precio más alto</div><div class="kpi-value" style="font-size:16px">${rows.length?fmt(Math.max(...rows.map(r=>Number(r.precio_unitario||0)))):'—'}</div></div>`;

  document.getElementById('contenido').innerHTML=`
    <div class="panel">
      <div class="panel-header">
        <h3>Lista de precios — ${contratoSelNombre}</h3>
        <button class="btn btn-primary btn-sm" onclick="abrirNuevoItem()">+ Nuevo ítem</button>
      </div>
      <div style="overflow-x:auto"><table>
        <thead><tr><th>Descripción / Código</th><th>Unidad</th><th>Precio unitario</th><th>Acciones</th></tr></thead>
        <tbody>${rows.length?rows.map(r=>`<tr>
          <td style="font-weight:500">${r.descripcion}</td>
          <td><span style="font-size:11px;padding:2px 8px;border-radius:4px;background:var(--bg3);color:var(--muted)">${r.unidad||'HRA'}</span></td>
          <td><span class="precio-badge">${fmt(r.precio_unitario)}</span></td>
          <td><div style="display:flex;gap:6px">
            <button class="btn btn-sm btn-ghost" onclick="editarItem('${r.id}','${r.descripcion.replace(/'/g,"\\'")}','${r.unidad||'HRA'}',${r.precio_unitario})">Editar precio</button>
            <button class="btn btn-sm btn-danger" onclick="borrarItem('${r.id}')">Borrar</button>
          </div></td>
        </tr>`).join(''):'<tr><td colspan="4" class="empty">Sin ítems. Agregá uno con el botón +</td></tr>'}</tbody>
      </table></div>
    </div>`;
}

function abrirNuevoItem(){
  if(!contratoSelId){alert('Seleccioná un contrato primero.');return;}
  itemEditId=null;
  document.getElementById('item-titulo').textContent='Nuevo ítem';
  document.getElementById('item-contrato-info').textContent='Contrato: '+contratoSelNombre;
  ['ni-desc','ni-precio','ni-motivo'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('ni-um').value='HRA';
  document.getElementById('modal-item').classList.add('show');
}

function editarItem(id, desc, um, precio){
  itemEditId=id;
  document.getElementById('item-titulo').textContent='Actualizar precio';
  document.getElementById('item-contrato-info').textContent='Contrato: '+contratoSelNombre;
  document.getElementById('ni-desc').value=desc;
  document.getElementById('ni-um').value=um;
  document.getElementById('ni-precio').value=precio;
  document.getElementById('ni-motivo').value='';
  document.getElementById('modal-item').classList.add('show');
}

async function guardarItem(){
  const desc=document.getElementById('ni-desc').value.trim();
  const precio=parseFloat(document.getElementById('ni-precio').value)||0;
  if(!desc||!precio){alert('Completá descripción y precio.');return;}
  
  if(itemEditId){
    // Guardar historial del precio anterior
    const {data:actual}=await db.from('contrato_items').select('precio_unitario').eq('id',itemEditId).single();
    if(actual && actual.precio_unitario !== precio){
      await db.from('contrato_precios_historial').insert({
        contrato_item_id: itemEditId,
        precio_anterior: actual.precio_unitario,
        precio_nuevo: precio,
        fecha_cambio: hoy(),
        motivo: document.getElementById('ni-motivo').value||null,
      });
    }
    await db.from('contrato_items').update({
      descripcion:desc,
      unidad:document.getElementById('ni-um').value,
      precio_unitario:precio,
    }).eq('id',itemEditId);
  } else {
    await db.from('contrato_items').insert({
      contrato_id:contratoSelId,
      descripcion:desc,
      unidad:document.getElementById('ni-um').value,
      precio_unitario:precio,
      activo:true,
    });
  }
  cerrarModal('modal-item');
  cargarPrecios();
}

async function borrarItem(id){
  if(!confirm('¿Borrar este ítem?')) return;
  await db.from('contrato_items').update({activo:false}).eq('id',id);
  cargarPrecios();
}

// ===== HISTORIAL DE PRECIOS =====
async function cargarHistorial(){
  document.getElementById('kpis').innerHTML='';
  document.getElementById('contenido').innerHTML='<div class="spinner-wrap"><div class="spinner"></div>Cargando...</div>';

  let q=db.from('contrato_precios_historial')
    .select('*,contrato_items(descripcion,contratos(numero_contrato))')
    .order('created_at',{ascending:false}).limit(200);
  const {data}=await q;
  const rows=data||[];

  document.getElementById('contenido').innerHTML=`
    <div class="panel">
      <div class="panel-header"><h3>Historial de cambios de precios</h3></div>
      <div style="overflow-x:auto"><table>
        <thead><tr><th>Fecha</th><th>Contrato</th><th>Ítem</th><th>Precio anterior</th><th>Precio nuevo</th><th>Variación</th><th>Motivo</th></tr></thead>
        <tbody>${rows.length?rows.map(r=>{
          const ant=Number(r.precio_anterior||0);
          const nvo=Number(r.precio_nuevo||0);
          const var_pct=ant>0?Math.round((nvo-ant)/ant*100):0;
          return`<tr>
            <td class="mono">${fmtF(r.fecha_cambio)}</td>
            <td class="mono" style="font-size:12px">${r.contrato_items?.contratos?.numero_contrato||'—'}</td>
            <td>${r.contrato_items?.descripcion||'—'}</td>
            <td class="mono" style="color:var(--muted)">${fmt(ant)}</td>
            <td class="mono" style="color:var(--green)">${fmt(nvo)}</td>
            <td><span style="font-size:12px;padding:2px 8px;border-radius:4px;background:${var_pct>=0?'rgba(16,185,129,0.1)':'rgba(239,68,68,0.1)'};color:${var_pct>=0?'var(--green)':'var(--red)'}">${var_pct>=0?'+':''}${var_pct}%</span></td>
            <td style="font-size:12px;color:var(--muted)">${r.motivo||'—'}</td>
          </tr>`;
        }).join(''):'<tr><td colspan="7" class="empty">Sin cambios de precios registrados</td></tr>'}</tbody>
      </table></div>
    </div>`;
}

function cerrarModal(id){document.getElementById(id).classList.remove('show');}
async function logout(){await db.auth.signOut();window.location.href='login.html';}

init();
</script>
