<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hidromec ERP — Compras</title>
<link rel="stylesheet" href="erp-layout.css">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="erp-utils.js"></script>
<script src="erp-sidebar.js"></script>
<script src="empresas.api.js"></script>
<script src="egresos.api.js"></script>
<script src="proyectos.api.js"></script>
<style>
  tr:last-child tr:hover .tag{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:500;}
  .tag.pagado{background:rgba(16,185,129,0.15);color:var(--green);}
  .tag.pendiente{background:rgba(245,158,11,0.15);color:var(--orange);}
  .tag.vencido{background:rgba(239,68,68,0.15);color:var(--red);}
  .form-row.three{grid-template-columns:1fr 1fr 1fr;}
  .kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px;}
  .kpi-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:16px 20px;}
  .kpi-card::before{content:'';display:block;height:3px;border-radius:3px;margin-bottom:12px;}
  .kpi-card.red::before{background:var(--red);}
  .kpi-card.orange::before{background:var(--orange);}
  .kpi-card.green::before{background:var(--green);}
  .kpi-card.blue::before{background:var(--blue);}
  .kpi-.kpi-value{font-size:20px;font-weight:600;font-family:'DM Mono',monospace;}
  .tipo-badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;background:var(--bg3);color:var(--muted);}
  .sin-factura{background:rgba(139,92,246,0.1);color:var(--purple);}
  .tag.liberado{background:rgba(59,130,246,0.15);color:var(--blue);}
  .tag.en-pago{background:rgba(139,92,246,0.15);color:var(--purple);}
  @media(max-width:768px){.main{margin-left:0;padding:16px;}.kpi-row{grid-template-columns:repeat(2,1fr);}.form-row.three{grid-template-columns:1fr;}}
</style>
</head>
<body>
<div id="overlay" class="overlay" onclick="ERP.closeSidebar()"></div>
<div id="sidebar-root"></div>

<main class="main">
  <div class="page-header">
    <h2>Compras y gastos</h2>
    <button class="btn btn-primary" onclick="abrirNuevo()">+ Nuevo egreso</button>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="cambiarTab('egresos',this)">Todos los egresos</button>
    <button class="tab" onclick="cambiarTab('pendientes',this)">Pendientes de pago</button>
    <button class="tab" id="tab-liberar" onclick="cambiarTab('liberar',this)">
      Liberar para pago <span id="badge-liberar" style="display:none;background:var(--red);color:#fff;border-radius:20px;padding:1px 7px;font-size:11px;margin-left:4px"></span>
    </button>
    <button class="tab" onclick="cambiarTab('proveedores',this)">Proveedores</button>
    <button class="tab" onclick="cambiarTab('importar',this)">↑ Importar AFIP</button>
  </div>

  <div class="filtros" id="filtros-egresos">
    <select id="f-empresa" onchange="cargarEgresos()">
      <option value="">Todas las empresas</option>
      <option value="a1000000-0000-0000-0000-000000000001">Hidromec</option>
      <option value="a2000000-0000-0000-0000-000000000002">Placemem</option>
    </select>
    <select id="f-tipo" onchange="cargarEgresos()">
      <option value="">Todos los tipos</option>
      <option value="materiales">Materiales</option>
      <option value="servicios">Servicios</option>
      <option value="alquiler_equipo">Alquiler equipo</option>
      <option value="costo_fijo">Costo fijo</option>
      <option value="impuesto">Impuesto</option>
      <option value="sueldo">Sueldo</option>
      <option value="otro">Otro</option>
    </select>
    <select id="f-pagado" onchange="cargarEgresos()">
      <option value="">Todos</option>
      <option value="false">Sin pagar</option>
      <option value="true">Pagados</option>
    </select>
    <input type="month" id="f-mes" onchange="cargarEgresos()">
    <input type="text" id="f-buscar" placeholder="Buscar proveedor o descripción..." oninput="cargarEgresos()" style="min-width:220px">
  </div>

  <div class="filtros" id="filtros-liberar" style="display:none">
    <select id="fl-empresa" onchange="cargarParaLiberar()">
      <option value="">Todas las empresas</option>
      <option value="a1000000-0000-0000-0000-000000000001">Hidromec</option>
      <option value="a2000000-0000-0000-0000-000000000002">Placemem</option>
    </select>
    <select id="fl-proveedor" onchange="cargarParaLiberar()">
      <option value="">Todos los proveedores</option>
    </select>
    <select id="fl-estado" onchange="cargarParaLiberar()">
      <option value="pendiente">Sin liberar</option>
      <option value="liberado">Liberados</option>
      <option value="todos">Todos</option>
    </select>
  </div>

  <div class="filtros" id="filtros-proveedores" style="display:none">
    <select id="fp-empresa" onchange="cargarProveedores()">
      <option value="">Todas las empresas</option>
      <option value="a1000000-0000-0000-0000-000000000001">Hidromec</option>
      <option value="a2000000-0000-0000-0000-000000000002">Placemem</option>
    </select>
    <input type="text" id="fp-buscar" placeholder="Buscar proveedor..." oninput="cargarProveedores()" style="min-width:220px">
    <button class="btn btn-ghost" onclick="abrirNuevoProveedor()">+ Nuevo proveedor</button>
  </div>
  <div class="filtros" id="filtros-importar" style="display:none">
    <select id="fi-empresa">
      <option value="a1000000-0000-0000-0000-000000000001">Hidromec</option>
      <option value="a2000000-0000-0000-0000-000000000002">Placemem</option>
    </select>
  </div>

  <div class="kpi-row" id="kpis-compras"></div>

  <div class="panel">
    <div id="contenido"><div class="spinner-wrap"><div class="spinner"></div>Cargando...</div></div>
  </div>
</main>

<!-- MODAL EGRESO -->
<div class="modal-overlay" id="modal-egreso">
  <div class="modal">
    <h3 id="modal-titulo">Nuevo egreso</h3>
    <div class="form-row">
      <div class="form-group">
        <label>Empresa</label>
        <select id="ne-empresa" onchange="cargarProveedoresPorEmpresa()">
          <option value="a1000000-0000-0000-0000-000000000001">Hidromec</option>
          <option value="a2000000-0000-0000-0000-000000000002">Placemem</option>
        </select>
      </div>
      <div class="form-group">
        <label>Tipo de gasto</label>
        <select id="ne-tipo">
          <option value="materiales">Materiales</option>
          <option value="servicios">Servicios</option>
          <option value="alquiler_equipo">Alquiler de equipo</option>
          <option value="costo_fijo">Costo fijo</option>
          <option value="impuesto">Impuesto / tasa</option>
          <option value="sueldo">Sueldo</option>
          <option value="otro">Otro gasto</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Proveedor (opcional)</label>
        <select id="ne-proveedor">
          <option value="">Sin proveedor / gasto directo</option>
        </select>
      </div>
      <div class="form-group">
        <label>Proyecto (opcional)</label>
        <select id="ne-proyecto">
          <option value="">Gasto general</option>
        </select>
      </div>
    </div>
    <div class="form-row full">
      <div class="form-group">
        <label>Descripción</label>
        <input type="text" id="ne-descripcion" placeholder="Ej: Compra de caños galvanizados, Alquiler andamio, Viáticos...">
      </div>
    </div>
    <div class="form-row three">
      <div class="form-group">
        <label>Monto</label>
        <input type="number" id="ne-monto" placeholder="0.00">
      </div>
      <div class="form-group">
        <label>Fecha</label>
        <input type="date" id="ne-fecha">
      </div>
      <div class="form-group">
        <label>N° Factura (opcional)</label>
        <input type="text" id="ne-numero" placeholder="Sin factura si no tiene">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>¿Ya está pagado?</label>
        <select id="ne-pagado" onchange="togglePago()">
          <option value="false">No — pendiente de pago</option>
          <option value="true">Sí — ya pagado</option>
        </select>
      </div>
      <div class="form-group" id="grupo-metodo-pago" style="display:none">
        <label>Método de pago</label>
        <select id="ne-metodo">
          <option value="transferencia">Transferencia</option>
          <option value="cheque">Cheque diferido</option>
          <option value="efectivo">Efectivo</option>
          <option value="otro">Otro</option>
        </select>
      </div>
    </div>
    <div class="form-row" id="grupo-cheque" style="display:none">
      <div class="form-group">
        <label>Fecha vencimiento cheque</label>
        <input type="date" id="ne-vencimiento-cheque">
      </div>
    </div>
    <div class="form-row full">
      <div class="form-group">
        <label>Observaciones</label>
        <textarea id="ne-obs" placeholder="Opcional..."></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="cerrarModal('modal-egreso')">Cancelar</button>
      <button class="btn btn-primary" onclick="guardarEgreso()">Guardar</button>
    </div>
  </div>
</div>

<!-- MODAL PROVEEDOR -->
<div class="modal-overlay" id="modal-proveedor">
  <div class="modal">
    <h3>Nuevo proveedor</h3>
    <div class="form-row">
      <div class="form-group">
        <label>Empresa</label>
        <select id="np-empresa">
          <option value="a1000000-0000-0000-0000-000000000001">Hidromec</option>
          <option value="a2000000-0000-0000-0000-000000000002">Placemem</option>
        </select>
      </div>
      <div class="form-group">
        <label>Nombre / Razón social</label>
        <input type="text" id="np-nombre" placeholder="Nombre del proveedor">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>CUIT</label>
        <input type="text" id="np-cuit" placeholder="30-12345678-9">
      </div>
      <div class="form-group">
        <label>Rubro</label>
        <input type="text" id="np-rubro" placeholder="Ej: Ferretería, Transporte...">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Teléfono</label>
        <input type="text" id="np-telefono" placeholder="Opcional">
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="text" id="np-email" placeholder="Opcional">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="cerrarModal('modal-proveedor')">Cancelar</button>
      <button class="btn btn-primary" onclick="guardarProveedor()">Guardar proveedor</button>
    </div>
  </div>
</div>

<!-- MODAL REGISTRAR PAGO -->
<div class="modal-overlay" id="modal-pago">
  <div class="modal">
    <h3>Registrar pago</h3>
    <p id="pago-info" style="font-size:13px;color:var(--muted);margin-bottom:20px"></p>
    <div class="form-row">
      <div class="form-group">
        <label>Fecha de pago</label>
        <input type="date" id="mp-fecha">
      </div>
      <div class="form-group">
        <label>Método de pago</label>
        <select id="mp-metodo">
          <option value="transferencia">Transferencia</option>
          <option value="cheque">Cheque</option>
          <option value="efectivo">Efectivo</option>
          <option value="otro">Otro</option>
        </select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="cerrarModal('modal-pago')">Cancelar</button>
      <button class="btn btn-success" onclick="confirmarPago()">Confirmar pago</button>
    </div>
  </div>
</div>

<!-- MODAL LIBERAR PARA PAGO -->
<div class="modal-overlay" id="modal-liberar">
  <div class="modal" style="max-width:460px">
    <h3>📤 Liberar para pago</h3>
    <p id="lib-info" style="font-size:13px;color:var(--muted);margin-bottom:20px;padding:12px;background:var(--bg3);border-radius:8px"></p>
    <div class="form-row">
      <div class="form-group">
        <label>Fecha vencimiento de pago</label>
        <input type="date" id="lib-fecha">
      </div>
    </div>
    <div class="form-row full">
      <div class="form-group">
        <label>Observaciones para caja (opcional)</label>
        <textarea id="lib-obs" placeholder="Ej: Pagar con transferencia, cuenta Banco Galicia..."></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="cerrarModal('modal-liberar')">Cancelar</button>
      <button class="btn btn-primary" onclick="confirmarLiberar()">✓ Liberar para pago</button>
    </div>
  </div>
</div>

<!-- MODAL OP MÚLTIPLE -->
<div class="modal-overlay" id="modal-op-multiple">
  <div class="modal" style="max-width:700px">
    <h3>💳 Orden de pago múltiple</h3>
    <div id="op-multi-lista" style="max-height:300px;overflow-y:auto;margin-bottom:16px;border:1px solid var(--border);border-radius:8px"></div>
    <div style="background:var(--bg3);border-radius:8px;padding:12px 16px;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center">
      <span style="font-size:13px;color:var(--muted)">Total a pagar:</span>
      <span id="op-multi-total" style="font-size:18px;font-weight:600;font-family:'DM Mono',monospace;color:var(--red)"></span>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Fecha de pago</label>
        <input type="date" id="opm-fecha">
      </div>
      <div class="form-group">
        <label>Método de pago</label>
        <select id="opm-metodo" onchange="toggleChequesMultiples()">
          <option value="transferencia">Transferencia</option>
          <option value="cheques">Cheques (varios)</option>
          <option value="efectivo">Efectivo</option>
          <option value="otro">Otro</option>
        </select>
      </div>
    </div>
    <!-- Sección cheques múltiples -->
    <div id="seccion-cheques-multi" style="display:none">
      <div style="font-size:12px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:0.7px;margin-bottom:8px">Cheques incluidos en el pago</div>
      <div id="lista-cheques-multi"></div>
      <button class="btn btn-ghost btn-sm" onclick="agregarChequeMulti()" style="margin-top:8px">+ Agregar cheque</button>
    </div>
    <div class="form-row full" style="margin-top:12px">
      <div class="form-group">
        <label>Observaciones (opcional)</label>
        <textarea id="opm-obs" placeholder="Referencia, banco, aclaraciones..."></textarea>
      </div>
    </div>
    <div style="background:rgba(59,130,246,0.08);border:1px solid rgba(59,130,246,0.2);border-radius:8px;padding:10px 14px;font-size:12px;color:var(--muted);margin-bottom:8px">
      📧 Se generará una OP en PDF y se enviará por email a la cuenta de cuentas por pagar.
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="cerrarModal('modal-op-multiple')">Cancelar</button>
      <button class="btn btn-success" onclick="confirmarOPMultiple()">✓ Confirmar y enviar OP</button>
    </div>
  </div>
</div>

<script>

let tabActual='egresos';
let egresoEditId=null;
let pagoEgresoId=null;

// ══ SELECCIÓN MÚLTIPLE PARA OP ══════════════════════════════
let seleccionadosOP=new Set();

function toggleSeleccionOP(id, monto){
  if(seleccionadosOP.has(id)) seleccionadosOP.delete(id);
  else seleccionadosOP.add(id);
  // actualizar checkbox visual
  const cb=document.getElementById('cb-op-'+id);
  if(cb) cb.checked=seleccionadosOP.has(id);
  actualizarBotonOP();
}

function actualizarBotonOP(){
  const btn=document.getElementById('btn-pagar-seleccion');
  if(!btn) return;
  const n=seleccionadosOP.size;
  btn.style.display=n>0?'':'none';
  btn.textContent=`💳 Pagar ${n} seleccionados`;
}

async function abrirOPMultiple(){
  if(seleccionadosOP.size===0){toast('Seleccioná al menos un egreso.', 'warn');return;}
  const ids=[...seleccionadosOP];
  const data=await EgresosAPI.getEgresos({ids});
  const rows=data||[];
  const total=rows.reduce((s,r)=>s+Number(r.monto||0),0);

  document.getElementById('op-multi-lista').innerHTML=`
    <table style="width:100%;border-collapse:collapse">
      <thead><tr>
        <th style="padding:8px 12px;font-size:11px;color:var(--muted);text-align:left;border-bottom:1px solid var(--border)">Proveedor</th>
        <th style="padding:8px 12px;font-size:11px;color:var(--muted);text-align:left;border-bottom:1px solid var(--border)">Descripción</th>
        <th style="padding:8px 12px;font-size:11px;color:var(--muted);text-align:right;border-bottom:1px solid var(--border)">Monto</th>
      </tr></thead>
      <tbody>${rows.map(r=>`<tr>
        <td style="padding:8px 12px;font-size:13px">${r.proveedores?.nombre||'Sin proveedor'}</td>
        <td style="padding:8px 12px;font-size:12px;color:var(--muted)">${r.descripcion||'-'}</td>
        <td style="padding:8px 12px;font-family:'DM Mono',monospace;font-size:13px;text-align:right;color:var(--red)">${fmt(r.monto)}</td>
      </tr>`).join('')}</tbody>
    </table>`;

  document.getElementById('op-multi-total').textContent=fmt(total);
  document.getElementById('opm-fecha').value=hoy();
  document.getElementById('opm-metodo').value='transferencia';
  document.getElementById('opm-obs').value='';
  document.getElementById('seccion-cheques-multi').style.display='none';
  document.getElementById('lista-cheques-multi').innerHTML='';
  document.getElementById('modal-op-multiple').classList.add('show');
}

function toggleChequesMultiples(){
  const metodo=document.getElementById('opm-metodo').value;
  const sec=document.getElementById('seccion-cheques-multi');
  sec.style.display=metodo==='cheques'?'block':'none';
  if(metodo==='cheques'&&document.getElementById('lista-cheques-multi').children.length===0){
    agregarChequeMulti();
  }
}

let _chequeIdx=0;
function agregarChequeMulti(){
  const idx=_chequeIdx++;
  const div=document.createElement('div');
  div.id=`cheque-multi-${idx}`;
  div.style.cssText='display:grid;grid-template-columns:2fr 1fr 1fr auto;gap:8px;margin-bottom:8px;align-items:end';
  div.innerHTML=`
    <div><label style="font-size:10px;color:var(--muted);text-transform:uppercase;display:block;margin-bottom:4px">N° Cheque</label>
      <input type="text" placeholder="00000001" style="width:100%;padding:8px 10px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:13px;font-family:'DM Mono',monospace;outline:none" id="chq-nro-${idx}"></div>
    <div><label style="font-size:10px;color:var(--muted);text-transform:uppercase;display:block;margin-bottom:4px">Monto</label>
      <input type="number" placeholder="0.00" style="width:100%;padding:8px 10px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:13px;outline:none" id="chq-monto-${idx}"></div>
    <div><label style="font-size:10px;color:var(--muted);text-transform:uppercase;display:block;margin-bottom:4px">Fecha cobro</label>
      <input type="date" style="width:100%;padding:8px 10px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:13px;outline:none" id="chq-fecha-${idx}"></div>
    <button onclick="this.parentElement.remove()" style="padding:8px 10px;background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.2);border-radius:6px;color:var(--red);cursor:pointer;font-size:14px">×</button>`;
  document.getElementById('lista-cheques-multi').appendChild(div);
}

async function confirmarOPMultiple(){
  const fecha=document.getElementById('opm-fecha').value;
  const metodo=document.getElementById('opm-metodo').value;
  const obs=document.getElementById('opm-obs').value;
  if(!fecha){toast('Ingresá la fecha de pago.', 'warn');return;}

  const ids=[...seleccionadosOP];
  const egresos=await EgresosAPI.getEgresos({ids});
  const rows=egresos||[];
  if(!rows.length){toast('Error al cargar los egresos.', 'error');return;}

  const count=await EgresosAPI.contarEgresosConOP();
  const nroOrden='OP-'+String((count||0)+1).padStart(4,'0')+'-'+new Date().getFullYear();
  const total=rows.reduce((s,r)=>s+Number(r.monto||0),0);

  // Recopilar cheques si aplica
  let chequesData=[];
  if(metodo==='cheques'){
    const lista=document.getElementById('lista-cheques-multi').children;
    for(let i=0;i<lista.length;i++){
      const el=lista[i];
      const nro=el.querySelector('[id^="chq-nro"]')?.value?.trim();
      const monto=parseFloat(el.querySelector('[id^="chq-monto"]')?.value)||0;
      const fvenc=el.querySelector('[id^="chq-fecha"]')?.value;
      if(nro&&monto) chequesData.push({nro,monto,fvenc});
    }
  }

  const obsFinal=[obs,metodo==='cheques'&&chequesData.length?`Cheques: ${chequesData.map(c=>`#${c.nro} $${c.monto} al ${c.fvenc||'-'}`).join(', ')}`:null].filter(Boolean).join(' | ');

  const u=await getUsuario();

  // Actualizar todos los egresos
  for(const r of rows){
    try{
      await EgresosAPI.pagarEgreso(r.id,{
        pagado:true,fecha_pago_real:fecha,

        observaciones:obsFinal||null,
      });
    }catch(e){ console.warn('Error pagando egreso:',e); }
  }


  // Registrar cheques en tabla cheques si aplica
  if(chequesData.length){
    const empId=rows[0]?.empresas?.id||rows[0]?.empresa_id;
    for(const ch of chequesData){
      try{ await EgresosAPI.crearCheque({
        empresa_id:document.getElementById('f-empresa')?.value||'',tipo:'emitido',numero:ch.nro,
        banco:'',titular:rows[0]?.proveedores?.nombre||'',
        monto:ch.monto,estado:'pendiente',
        fecha_emision:fecha,fecha_vencimiento:ch.fvenc||null,
      }); }catch(e){ console.warn('Error creando cheque:',e); }
    }

  }

  cerrarModal('modal-op-multiple');
  seleccionadosOP.clear();
  actualizarBadgeLiberar();

  // Generar y enviar PDF
  const empresaNombre=rows[0]?.empresas?.nombre||'';
  const mailDest=empresaNombre.toLowerCase().includes('placemem')

    :'cuentasporpagar@hidromecsrl.com';

  const pdfBlob=generarPDFOrdenMultiple(rows,nroOrden,fecha,metodo,obsFinal,u?.email||'',chequesData);
  await enviarOPporMail(pdfBlob,nroOrden,total,mailDest,rows,empresaNombre);

  if(tabActual==='liberar') cargarParaLiberar();
  else cargarEgresos();
}

async function enviarOPporMail(pdfBlob,nroOrden,total,mailDest,rows,empresa){
  // ══════════════════════════════════════════════════════════
  // EMAILJS - Completar con tus credenciales de emailjs.com
  // Pasos: emailjs.com → Add Service (Google Workspace) → Create Template
  // ══════════════════════════════════════════════════════════
  const EMAILJS_PUBLIC_KEY  = 'REEMPLAZAR_CON_TU_PUBLIC_KEY';   // Account → API Keys
  const EMAILJS_SERVICE_ID  = 'REEMPLAZAR_CON_TU_SERVICE_ID';   // Email Services → Service ID
  const EMAILJS_TEMPLATE_ID = 'REEMPLAZAR_CON_TU_TEMPLATE_ID';  // Email Templates → Template ID

  // Template en EmailJS debe tener estas variables:
  //   {{to_email}}    → destinatario
  //   {{subject}}     → asunto
  //   {{empresa}}     → nombre empresa
  //   {{nro_orden}}   → número de OP
  //   {{total}}       → monto total
  //   {{detalle}}     → detalle de facturas
  //   {{operador}}    → quien generó la OP

  let emailError=null; try{
    // Convertir PDF blob a base64
    const reader=new FileReader();
    reader.readAsDataURL(pdfBlob);
    await new Promise(res=>reader.onload=res);
    // Guardar PDF también localmente
    const pdfUrl=reader.result;

    const detalle=rows.map(r=>`- ${r.proveedores?.nombre||'Sin proveedor'}: ${fmt(r.monto)} - ${r.descripcion||''} (Fac: ${r.numero_factura||'s/n'})`).join('\n');
    const u=await getUsuario();

    const templateParams={
      to_email:  mailDest,
      subject:   `Orden de Pago ${nroOrden} - ${empresa}`,
      empresa:   empresa,
      nro_orden: nroOrden,
      total:     fmt(total),
      detalle:   detalle,
      operador:  u?.email||'ERP',
      fecha:     new Date().toLocaleDateString('es-AR'),
    };

    // Cargar EmailJS si no está cargado
    if(typeof emailjs==='undefined'){
      await new Promise((res,rej)=>{
        const s=document.createElement('script');
        s.src='https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js';
        s.onload=res; s.onerror=rej;
        document.head.appendChild(s);
      });
    }

    emailjs.init({publicKey: EMAILJS_PUBLIC_KEY});
    await emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, templateParams);

    // También descargar el PDF localmente
    const a=document.createElement('a');
    a.href=pdfUrl; a.download=nroOrden+'.pdf'; a.click();

    toast(`✓ Orden de Pago ${nroOrden} generada.\nPDF descargado y email enviado a ${mailDest}`, 'success');

  }catch(err){
    console.error('Error EmailJS:',err);
    // Fallback: descargar PDF y mostrar instrucciones
    const url=URL.createObjectURL(pdfBlob);
    const a=document.createElement('a');a.href=url;a.download=nroOrden+'.pdf';a.click();

    if(err.message&&err.message.includes('REEMPLAZAR')){
      toast(`⚠ EmailJS no configurado todavía.\n\nEl PDF se descargó automáticamente.\n\nPara activar el envío automático:\n1. Crear cuenta en emailjs.com\n2. Conectar tu cuenta Google Workspace\n3. Crear template con las variables {{to_email}}, {{subject}}, {{detalle}}, {{total}}\n4. Reemplazar los 3 IDs en compras.html`, 'warn');
    } else {
      toast(`✓ PDF descargado.\nError al enviar email: ${err.text||err.message}\nDestino: ${mailDest}`, 'success');
    }
  }
}


function generarPDFOrdenMultiple(rows,nro,fecha,metodo,obs,operador,cheques){
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF({format:'a4',unit:'mm'});
  const fmtM=v=>new Intl.NumberFormat('es-AR',{style:'currency',currency:'ARS',maximumFractionDigits:0}).format(v||0);
  const fmtD=d=>d?new Date(d+'T12:00:00').toLocaleDateString('es-AR'):'-';
  const L=10,R=200,W=190,midX=105,T=8;
  const total=rows.reduce((s,r)=>s+Number(r.monto||0),0);
  const empresa=rows[0]?.empresas?.nombre||'Hidromec S.R.L.';

  doc.setDrawColor(0,0,0);doc.setLineWidth(0.8);doc.rect(L,T,W,275);
  doc.setLineWidth(0.3);doc.rect(L+1,T+1,W-2,273);
  doc.setFillColor(245,245,245);doc.rect(L+1,T+1,W-2,40,'F');

  doc.setFontSize(16);doc.setFont('helvetica','bold');doc.setTextColor(0,0,0);
  doc.text(empresa,L+5,T+14);
  doc.setFontSize(8);doc.setFont('helvetica','normal');doc.setTextColor(80,80,80);
  doc.text('Colectora Oeste 1525 - Zárate, Bs.As. | Tel: 03487-456419',L+5,T+22);

  doc.setDrawColor(180,180,180);doc.setLineWidth(0.3);doc.line(midX-10,T+1,midX-10,T+41);

  doc.setFontSize(18);doc.setFont('helvetica','bold');doc.setTextColor(0,0,0);
  doc.text('ORDEN DE PAGO',midX+15,T+13,{align:'center'});
  doc.setFontSize(11);doc.setFont('helvetica','normal');
  doc.text(nro,midX+15,T+22,{align:'center'});
  doc.text('Fecha: '+fmtD(fecha),midX+15,T+30,{align:'center'});
  doc.text('Método: '+metodo.toUpperCase(),midX+15,T+37,{align:'center'});

  doc.setLineWidth(0.5);doc.setDrawColor(0,0,0);doc.line(L+1,T+41,R-1,T+41);

  // Detalle de facturas
  let y=T+48;
  doc.setFillColor(230,230,230);doc.rect(L+1,y-6,W-2,8,'F');
  doc.setFontSize(10);doc.setFont('helvetica','bold');
  doc.text('DETALLE DE COMPROBANTES',midX,y,{align:'center'});
  doc.setLineWidth(0.3);doc.line(L+1,y+2,R-1,y+2);
  y+=8;

  doc.setFontSize(8);doc.setFont('helvetica','bold');doc.setTextColor(100,100,100);
  doc.text('PROVEEDOR',L+5,y+5);
  doc.text('DESCRIPCIÓN',L+60,y+5);
  doc.text('N° FACTURA',L+130,y+5);
  doc.text('MONTO',R-8,y+5,{align:'right'});
  doc.setDrawColor(200,200,200);doc.line(L+1,y+7,R-1,y+7);
  y+=9;

  doc.setFont('helvetica','normal');doc.setTextColor(0,0,0);
  rows.forEach((r,i)=>{
    if(i%2===0){doc.setFillColor(252,252,252);doc.rect(L+1,y-4,W-2,9,'F');}
    doc.setFontSize(9);
    const prov=r.proveedores?.nombre||'Sin proveedor';
    doc.text(doc.splitTextToSize(prov,50)[0],L+5,y+2);
    doc.text(doc.splitTextToSize(r.descripcion||'-',60)[0],L+60,y+2);
    doc.text(r.numero_factura||'-',L+130,y+2);
    doc.setFont('helvetica','bold');
    doc.text(fmtM(r.monto),R-8,y+2,{align:'right'});
    doc.setFont('helvetica','normal');
    y+=9;
  });

  doc.setLineWidth(0.4);doc.line(L+1,y,R-1,y);y+=2;

  // Total
  doc.setFillColor(30,36,54);doc.rect(L+1,y,W-2,12,'F');
  doc.setFontSize(11);doc.setFont('helvetica','bold');doc.setTextColor(255,255,255);
  doc.text('TOTAL:',L+5,y+8);
  doc.setFontSize(14);doc.text(fmtM(total),R-8,y+8,{align:'right'});
  y+=16;

  // Cheques si aplica
  if(cheques&&cheques.length){
    doc.setTextColor(0,0,0);
    doc.setFillColor(245,245,245);doc.rect(L+1,y,W-2,8,'F');
    doc.setFontSize(10);doc.setFont('helvetica','bold');
    doc.text('CHEQUES EMITIDOS',midX,y+6,{align:'center'});
    doc.setLineWidth(0.3);doc.line(L+1,y+8,R-1,y+8);
    y+=10;
    doc.setFontSize(8);doc.setFont('helvetica','bold');doc.setTextColor(100,100,100);
    doc.text('N° CHEQUE',L+5,y+4);doc.text('MONTO',L+80,y+4);doc.text('FECHA COBRO',L+130,y+4);
    doc.line(L+1,y+6,R-1,y+6);y+=8;
    doc.setFont('helvetica','normal');doc.setTextColor(0,0,0);
    cheques.forEach(ch=>{
      doc.setFontSize(9);
      doc.text(ch.nro||'-',L+5,y+2);
      doc.text(fmtM(ch.monto),L+80,y+2);
      doc.text(fmtD(ch.fvenc),L+130,y+2);
      y+=8;
    });
    y+=4;
  }

  // Observaciones
  if(obs){
    doc.setTextColor(0,0,0);
    doc.setFontSize(8);doc.setFont('helvetica','italic');doc.setTextColor(80,80,80);
    const obsLines=doc.splitTextToSize('Obs: '+obs,W-12);
    doc.text(obsLines,L+5,y+6);
    y+=obsLines.length*5+8;
  }

  // Firma
  const yF=Math.max(y+10,T+220);
  doc.setDrawColor(0,0,0);doc.setLineWidth(0.3);
  doc.line(L+5,yF,L+80,yF);doc.line(L+110,yF,R-5,yF);
  doc.setFontSize(8);doc.setFont('helvetica','normal');doc.setTextColor(80,80,80);
  doc.text('FIRMA EMISOR',L+35,yF+5,{align:'center'});
  doc.text('FIRMA RECEPTOR / CONFORME',L+147,yF+5,{align:'center'});

  const yP=yF+12;
  doc.setFillColor(240,240,240);doc.rect(L+1,yP,W-2,16,'F');
  doc.setLineWidth(0.3);doc.line(L+1,yP,R-1,yP);
  doc.setFontSize(8);doc.setFont('helvetica','bold');doc.setTextColor(0,0,0);
  doc.text('N° ORDEN: '+nro,L+5,yP+6);
  doc.text('Operador: '+operador,L+5,yP+12);
  doc.setFont('helvetica','normal');doc.setTextColor(100,100,100);
  doc.text('Sistema ERP - Hidromec SRL / Placemem SRL',R-5,yP+12,{align:'right'});

  return doc.output('blob');
}

function cambiarTab(tab,btn){
  tabActual=tab;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('filtros-egresos').style.display=(tab==='egresos'||tab==='pendientes')?'flex':'none';
  document.getElementById('filtros-liberar').style.display=tab==='liberar'?'flex':'none';
  document.getElementById('filtros-proveedores').style.display=tab==='proveedores'?'flex':'none';
  document.getElementById('filtros-importar').style.display=tab==='importar'?'flex':'none';
  if(tab==='egresos') cargarEgresos();
  else if(tab==='pendientes') cargarPendientes();
  else if(tab==='liberar') cargarParaLiberar();
  else if(tab==='importar') mostrarImportarAFIP();
  else cargarProveedores();

async function cargarEgresos(){
  document.getElementById('contenido').innerHTML='<div class="spinner-wrap"><div class="spinner"></div>Cargando...</div>';
  const emp=document.getElementById('f-empresa').value;
  const tipo=document.getElementById('f-tipo').value;
  const pagado=document.getElementById('f-pagado').value;
  const mes=document.getElementById('f-mes').value;
  const buscar=document.getElementById('f-buscar').value.toLowerCase();

  let egData=await EgresosAPI.getEgresos({});
  if(emp) egData=egData.filter(r=>r.empresa_id===emp);
  if(tipo) egData=egData.filter(r=>r.tipo===tipo);
  if(pagado!=='') egData=egData.filter(r=>r.pagado===(pagado==='true'));
  if(mes){const mI=mes+'-01';const mF=new Date(mes+'-01');mF.setMonth(mF.getMonth()+1);const mFin=mF.toISOString().split('T')[0];egData=egData.filter(r=>r.fecha_egreso>=mI&&r.fecha_egreso<mFin);}
  const data=egData;

          <td class="mono">${fmtF(r.fecha_egreso)}</td>

async function editarEgreso(id){

async function guardarEgreso(){
  const desc=document.getElementById('ne-descripcion').value.trim();
  const monto=parseFloat(document.getElementById('ne-monto').value)||0;
  if(!desc||!monto){toast('Completá descripción y monto.', 'warn');return;}
  const pagado=document.getElementById('ne-pagado').value==='true';
  const payload={
    empresa_id:document.getElementById('ne-empresa').value,
    proveedor_id:document.getElementById('ne-proveedor').value||null,
    proyecto_id:document.getElementById('ne-proyecto').value||null,
    tipo:document.getElementById('ne-tipo').value,
    descripcion:desc,monto,
    fecha_egreso:document.getElementById('ne-fecha').value,
    numero_factura:document.getElementById('ne-numero').value||null,
    pagado,
    metodo_pago:pagado?document.getElementById('ne-metodo').value:null,
    fecha_pago_real:pagado?hoy():null,
    observaciones:document.getElementById('ne-obs').value||null,
  };
  let error;
  try{ if(egresoEditId){ await EgresosAPI.actualizarEgreso(egresoEditId,payload); } else { await EgresosAPI.crearEgreso(payload); } }catch(e){error=e;}
  if(error){toast('Error: ', 'error');return;}
  cerrarModal('modal-egreso');
  cargarEgresos();
}

}

  const emp=document.getElementById('fl-empresa').value;
  const prov=document.getElementById('fl-proveedor').value;
  const estado=document.getElementById('fl-estado').value;

  let egOpData=await EgresosAPI.getEgresos({pagado:false});
  if(emp) egOpData=egOpData.filter(r=>r.empresa_id===emp);

  if(estado==='liberado') egOpData=egOpData.filter(r=>r.liberado_pago===true);
  else if(estado==='pendiente') egOpData=egOpData.filter(r=>r.liberado_pago===false);

  const data=egOpData;

  const totalLib=rows.filter(r=>r.liberado_pago).reduce((s,r)=>s+Number(r.monto||0),0);
  const totalPend=rows.filter(r=>!r.liberado_pago).reduce((s,r)=>s+Number(r.monto||0),0);

    <div class="kpi-card orange" style="grid-column:span 2"><div class="kpi-label">Sin liberar</div><div class="kpi-value">${fmt(totalPend)}</div></div>`;

  seleccionadosOP=new Set();

  document.getElementById('contenido').innerHTML=`
    <div style="padding:10px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;background:var(--bg3)">
      <label style="font-size:12px;color:var(--muted);display:flex;align-items:center;gap:6px;cursor:pointer">
        <input type="checkbox" id="cb-select-all" onchange="toggleSelectAll(this)"> Seleccionar todo
      </label>
      <button id="btn-pagar-seleccion" class="btn btn-success btn-sm" onclick="abrirOPMultiple()" style="display:none">💳 Pagar seleccionados</button>
    </div>
    <div style="overflow-x:auto"><table>
      <thead><tr><th style="width:32px"></th><th>Empresa</th><th>Vencimiento pago</th><th>Proveedor</th><th>Descripción</th><th>Monto</th><th>Estado</th><th>Liberado por</th><th>Acciones</th></tr></thead>
      <tbody>${rows.length?rows.map(r=>{
        const venc=r.fecha_vencimiento_pago;
        const vencida=venc&&venc<hoyStr;
        const hoy7=new Date();hoy7.setDate(hoy7.getDate()+7);
        const proxima=venc&&new Date(venc+'T12:00:00')<=hoy7&&!vencida;
        return`<tr>
          <td style="text-align:center">
            ${r.liberado_pago?`<input type="checkbox" id="cb-op-${r.id}" onchange="toggleSeleccionOP('${r.id}',${r.monto})">`:''}
          </td>
          <td style="font-size:12px">${r.empresas?.nombre||'-'}</td>
          <td class="mono" style="color:${vencida?'var(--red)':proxima?'var(--orange)':'var(--text)'}">
            ${venc?fmtF(venc):'<span style="color:var(--muted)">Sin fecha</span>'}
            ${vencida?'<div style="font-size:10px;color:var(--red)">VENCIDO</div>':proxima?'<div style="font-size:10px;color:var(--orange)">Esta semana</div>':''}
          </td>
          <td>${r.proveedores?.nombre||'<span style="color:var(--muted)">Sin proveedor</span>'}</td>
          <td style="font-size:12px;color:var(--muted)">${r.descripcion||''}</td>
          <td class="mono" style="color:var(--red)">${fmt(r.monto)}</td>
          <td>${r.liberado_pago?'<span class="tag liberado">✓ Liberado</span>':'<span class="tag pendiente">Sin liberar</span>'}</td>
          <td style="font-size:11px;color:var(--muted)">${r.liberado_por||'-'}</td>
          <td><div style="display:flex;gap:6px">
            ${!r.liberado_pago?`<button class="btn btn-sm btn-primary" onclick="abrirLiberar('${r.id}','${r.descripcion}','${r.monto}')">Liberar</button>`:''}
            ${r.liberado_pago?`<button class="btn btn-sm btn-success" onclick="abrirOPIndividual('${r.id}')">💳 Pagar</button>`:``}
            ${r.liberado_pago?`<button class="btn btn-sm btn-ghost" onclick="cancelarLiberar('${r.id}')">Quitar</button>`:''}
          </div></td>
        </tr>`;
      }).join(''):'<tr><td colspan="9" style="text-align:center;padding:40px;color:var(--muted)">Sin egresos pendientes</td></tr>'}</tbody>
    </table></div>`;

function toggleSelectAll(cb){
  const checkboxes=document.querySelectorAll('[id^="cb-op-"]');
  checkboxes.forEach(c=>{

    if(cb.checked) seleccionadosOP.add(id);
    else seleccionadosOP.delete(id);
  });
  actualizarBotonOP();
}

// ═══════════════ IMPORTAR AFIP ════════════════════════════════
let importRowsCompras=[];

function mostrarImportarAFIP(){
  document.getElementById('kpis-compras').innerHTML='';
  document.getElementById('contenido').innerHTML=`
    <div style="border:2px dashed var(--border);border-radius:12px;padding:48px;text-align:center;cursor:pointer;transition:border-color 0.2s;background:var(--bg3)"
      id="drop-afip"
      ondragover="event.preventDefault();this.style.borderColor='var(--blue)'"
      ondragleave="this.style.borderColor='var(--border)'"
      ondrop="event.preventDefault();this.style.borderColor='var(--border)';leerExcelAFIP(event.dataTransfer.files[0])">
      <svg width="40" height="40" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="margin:0 auto 16px;display:block;color:var(--muted)">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/>
      </svg>
      <p style="font-size:15px;font-weight:500;color:var(--text);margin-bottom:6px">Subir Excel de AFIP — Compras recibidas</p>
      <p style="font-size:12px;color:var(--muted)">Formato: Mis Comprobantes Recibidos (.xlsx) — Portal AFIP</p>
      <input type="file" id="file-afip" accept=".xlsx,.xls" style="display:none" onchange="leerExcelAFIP(this.files[0])">
      <button class="btn btn-ghost" style="margin-top:16px" onclick="document.getElementById('file-afip').click()">Seleccionar archivo</button>
    </div>
    <div id="preview-afip" style="margin-top:16px"></div>`;
}

function leerExcelAFIP(file){
  if(!file) return;
  procesarExcelAFIP(file);
}

function procesarExcelAFIP(file){
  const reader=new FileReader();
  reader.onload=e=>{
    const wb=XLSX.read(new Uint8Array(e.target.result),{type:'array',cellDates:true});
    const ws=wb.Sheets[wb.SheetNames[0]];
    const json=XLSX.utils.sheet_to_json(ws,{header:1,defval:null,raw:true});

    // Fila 1 = titulo general, Fila 2 = headers reales
    // Buscar la fila que tiene "Fecha" en col 0
    let hrIdx=1;
    for(let i=0;i<Math.min(5,json.length);i++){
      if(json[i]&&String(json[i][0]||'').toLowerCase().trim()==='fecha'){hrIdx=i;break;}
    }
    const dataRows=json.slice(hrIdx+1).filter(r=>r&&r[0]&&r[29]!=null);

    // Columnas reales del archivo "Mis Comprobantes Recibidos" AFIP:
    // [0]  Fecha
    // [1]  Tipo (ej: "1 - Factura A")
    // [2]  Punto de Venta
    // [3]  Numero Desde
    // [7]  Nro. Doc. Emisor (CUIT)
    // [8]  Denominacion Emisor
    // [11] Tipo Cambio
    // [12] Moneda ("$" o "DOL")
    // [24] Neto Gravado Total
    // [25] Neto No Gravado
    // [26] Op. Exentas
    // [28] Total IVA
    // [29] Imp. Total

    importRowsCompras=dataRows.map(r=>{
      // Fecha
      let fechaISO='';
      const fechaRaw=r[0];
      if(fechaRaw instanceof Date){
        fechaISO=fechaRaw.toISOString().split('T')[0];
      } else {
        const s=String(fechaRaw||'');
        fechaISO=s.includes('/')?s.split('/').reverse().join('-'):s;
      }

      // Tipo de comprobante
      const tipoRaw=String(r[1]||'').toUpperCase();
      let tipo='FC';
      if(tipoRaw.includes('CRED')||tipoRaw.includes('NC')) tipo='NC';
      else if(tipoRaw.includes('DEB')&&tipoRaw.includes('ND')) tipo='ND';
      else if(tipoRaw.includes(' A')) tipo='FA';
      else if(tipoRaw.includes(' B')) tipo='FB';
      else if(tipoRaw.includes(' C')) tipo='FC';

      // Numero
      const pv=String(r[2]||'0').padStart(5,'0');
      const nro=String(r[3]||'0').padStart(8,'0');
      const numero=`${pv}-${nro}`;

      // Proveedor
      const cuit=String(r[7]||'').replace(/[^0-9]/g,'');
      const proveedor=String(r[8]||'').trim().toUpperCase();

      // Moneda y tipo de cambio
      const monedaRaw=String(r[12]||'$').trim().toUpperCase();
      const tipoCambio=parseFloat(r[11])||1;
      const esDolar=monedaRaw==='DOL'||monedaRaw==='USD'||monedaRaw==='U$S';

      // Montos — columnas exactas del AFIP
      const netoGravado=parseFloat(r[24])||0;   // [24] Neto Gravado Total
      const netoNoGrav=parseFloat(r[25])||0;     // [25] Neto No Gravado
      const exentas=parseFloat(r[26])||0;        // [26] Op. Exentas
      const neto=netoGravado+netoNoGrav+exentas; // Neto total real
      const totalIVA=parseFloat(r[28])||0;       // [28] Total IVA
      const total=parseFloat(r[29])||0;          // [29] Imp. Total

      if(!total) return null;

      return{
        fecha:fechaISO,tipo,numero,cuit,proveedor,
        neto,totalIVA,total,
        moneda:esDolar?'USD':'ARS',
        tipoCambio:esDolar?tipoCambio:1,
      };
    }).filter(Boolean);

    const usd=importRowsCompras.filter(r=>r.moneda==='USD');
    const fmtNum=(v,isUSD)=>(isUSD?'U$S ':'$')+Number(v).toLocaleString('es-AR',{minimumFractionDigits:2,maximumFractionDigits:2});

    document.getElementById('preview-afip').innerHTML=`
      <div style="background:var(--bg3);border-radius:8px;padding:14px 18px;margin-bottom:16px;display:flex;gap:24px;align-items:center;flex-wrap:wrap">
        <span style="font-size:13px">📄 <strong>${importRowsCompras.length}</strong> comprobantes encontrados</span>
        ${usd.length?`<span style="font-size:12px;color:var(--orange)">💵 <strong>${usd.length}</strong> en dolares</span>`:''}
        ${importRowsCompras.length?`<button class="btn btn-success" onclick="confirmarImportAFIP()">Importar ${importRowsCompras.length} comprobantes</button>`:''}
      </div>
      <div class="panel"><div style="overflow-x:auto;max-height:420px;overflow-y:auto"><table>
        <thead><tr><th>Fecha</th><th>Tipo</th><th>N°</th><th>Proveedor</th><th>Moneda</th><th>Neto</th><th>IVA</th><th>Total</th></tr></thead>
        <tbody>${importRowsCompras.slice(0,100).map(r=>`<tr>
          <td class="mono" style="font-size:12px">${r.fecha}</td>
          <td><span style="font-size:11px;padding:2px 8px;border-radius:4px;background:var(--bg3);color:var(--muted)">${r.tipo}</span></td>
          <td class="mono" style="font-size:11px">${r.numero}</td>
          <td style="font-size:12px;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${r.proveedor}</td>
          <td>${r.moneda==='USD'
            ?'<span style="font-size:11px;padding:2px 8px;border-radius:4px;background:rgba(245,158,11,0.15);color:var(--orange);font-weight:600">USD</span>'
            :'<span style="font-size:11px;padding:2px 8px;border-radius:4px;background:var(--bg3);color:var(--muted)">ARS</span>'}</td>
          <td class="mono" style="font-size:12px">${fmtNum(r.neto,r.moneda==='USD')}</td>
          <td class="mono" style="font-size:12px;color:var(--muted)">${fmtNum(r.totalIVA,r.moneda==='USD')}</td>
          <td class="mono" style="color:var(--red);font-weight:500">${fmtNum(r.total,r.moneda==='USD')}</td>
        </tr>`).join('')}
        ${importRowsCompras.length>100?`<tr><td colspan="8" style="text-align:center;color:var(--muted);font-size:12px">...y ${importRowsCompras.length-100} mas</td></tr>`:''}
        </tbody></table></div></div>`;
  };
  reader.readAsArrayBuffer(file);
}

async function confirmarImportAFIP(){
  const empId=document.getElementById('fi-empresa').value;
  const btn=document.querySelector('#preview-afip .btn-success');
  if(btn){btn.disabled=true;btn.textContent='Importando...';}

  // Cargar proveedores existentes
  const provs=await EgresosAPI.getProveedoresConCuit(empId);
  const listaProvs=provs||[];

  // Deduplicar en bulk
  const numeros=importRowsCompras.map(r=>r.numero).filter(Boolean);
  const existentes=await EgresosAPI.getEgresosExistentes(empId,numeros);
  const numerosExistentes=new Set((existentes||[]).map(r=>r.numero_factura));

  let ok=0,skip=0;
  for(const r of importRowsCompras){
    if(numerosExistentes.has(r.numero)){skip++;continue;}

    // Buscar/crear proveedor
    let prov=listaProvs.find(p=>p.cuit&&p.cuit===r.cuit)
           ||listaProvs.find(p=>p.nombre&&(p.nombre.includes(r.proveedor)||r.proveedor.includes(p.nombre)));
    if(!prov&&r.proveedor){
      const np=await EgresosAPI.buscarOCrearProveedor(empId,r.proveedor,r.cuit||null);
      if(np){prov=np;listaProvs.push(np);}
    }

    // Descripcion con info de dolares si aplica
    const esUSD=r.moneda==='USD';
    const descMoneda=esUSD?` [USD ${r.total.toFixed(2)} x TC ${r.tipoCambio}]`:'';

    try{ await EgresosAPI.crearEgreso({
      empresa_id:empId,
      proveedor_id:prov?.id||null,
      tipo:'materiales',
      descripcion:`${r.tipo} ${r.numero} - ${r.proveedor}${descMoneda}`,
      monto:r.total,
      fecha_egreso:r.fecha,
      numero_factura:r.numero,
      pagado:false,
      observaciones:esUSD?`Factura en USD. Monto: U$S ${r.total.toFixed(2)} | TC: ${r.tipoCambio}`:null,
    }); }catch(e){skip++;} 
    if(!error){ok++;numerosExistentes.add(r.numero);}
  }

  const txtUSD=importRowsCompras.filter(r=>r.moneda==='USD').length;
  toast(`✓ ${ok} comprobantes importados${txtUSD?' ('+txtUSD+' en USD)':''}. ${skip} omitidos (duplicados).`, 'success');
  mostrarImportarAFIP();
}
