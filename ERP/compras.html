<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hidromec ERP — Compras</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

<style>
  :root{--bg:#0f1117;--bg2:#181c27;--bg3:#1e2436;--border:rgba(255,255,255,0.07);--text:#e8eaf0;--muted:#7a8099;--blue:#3b82f6;--green:#10b981;--red:#ef4444;--orange:#f59e0b;--purple:#8b5cf6;--teal:#14b8a6;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
  .sidebar{position:fixed;left:0;top:0;bottom:0;width:220px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:100;overflow-y:auto;overflow-x:hidden;}
  .sidebar-logo{padding:24px 20px 20px;border-bottom:1px solid var(--border);}
  .sidebar-logo h1{font-size:16px;font-weight:600;}
  .sidebar-logo span{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;}
  .nav-section{padding:16px 12px 8px;font-size:10px;font-weight:500;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;}
  .nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;margin:1px 8px;border-radius:8px;font-size:13.5px;color:var(--muted);cursor:pointer;transition:all 0.15s;text-decoration:none;}
  .nav-item:hover{background:var(--bg3);color:var(--text);}
  .nav-item.active{background:rgba(59,130,246,0.15);color:var(--blue);}
  .nav-item svg{width:16px;height:16px;flex-shrink:0;}
  .nav-bottom{padding:16px 12px;border-top:1px solid var(--border);margin-top:auto;position:sticky;bottom:0;background:var(--bg2);}
  .btn-logout{width:100%;padding:9px 12px;background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.2);border-radius:8px;color:var(--red);font-size:13px;font-family:'DM Sans',sans-serif;cursor:pointer;}
  .main{margin-left:220px;padding:28px 32px;}
  .page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px;}
  .page-header h2{font-size:22px;font-weight:600;}
  .tabs{display:flex;gap:4px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:4px;margin-bottom:24px;width:fit-content;}
  .tab{padding:8px 20px;border-radius:7px;font-size:13.5px;cursor:pointer;color:var(--muted);transition:all 0.15s;border:none;background:none;font-family:'DM Sans',sans-serif;}
  .tab.active{background:var(--blue);color:#fff;}
  .tab:hover:not(.active){color:var(--text);}
  .filtros{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;align-items:center;}
  .filtros select,.filtros input{padding:8px 12px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;font-family:'DM Sans',sans-serif;outline:none;}
  .filtros select:focus,.filtros input:focus{border-color:var(--blue);}
  .btn{padding:9px 18px;border-radius:8px;font-size:13px;font-weight:500;font-family:'DM Sans',sans-serif;cursor:pointer;border:none;transition:all 0.15s;}
  .btn-primary{background:var(--blue);color:#fff;}
  .btn-primary:hover{background:#2563eb;}
  .btn-success{background:var(--green);color:#fff;}
  .btn-ghost{background:var(--bg3);color:var(--text);border:1px solid var(--border);}
  .btn-ghost:hover{border-color:var(--blue);}
  .btn-danger{background:rgba(239,68,68,0.1);color:var(--red);border:1px solid rgba(239,68,68,0.2);}
  .btn-sm{padding:5px 12px;font-size:12px;}
  .panel{background:var(--bg2);border:1px solid var(--border);border-radius:12px;overflow:hidden;}
  table{width:100%;border-collapse:collapse;}
  th{padding:10px 16px;text-align:left;font-size:11px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:0.8px;border-bottom:1px solid var(--border);background:var(--bg3);}
  td{padding:11px 16px;font-size:13px;color:var(--text);border-bottom:1px solid var(--border);vertical-align:middle;}
  tr:last-child td{border-bottom:none;}
  tr:hover td{background:rgba(255,255,255,0.02);}
  .mono{font-family:'DM Mono',monospace;font-size:12px;}
  .tag{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:500;}
  .tag.pagado{background:rgba(16,185,129,0.15);color:var(--green);}
  .tag.pendiente{background:rgba(245,158,11,0.15);color:var(--orange);}
  .tag.vencido{background:rgba(239,68,68,0.15);color:var(--red);}
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:200;align-items:center;justify-content:center;}
  .modal-overlay.show{display:flex;}
  .modal{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:32px;width:100%;max-width:580px;max-height:90vh;overflow-y:auto;}
  .modal h3{font-size:18px;font-weight:600;margin-bottom:24px;}
  .form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px;}
  .form-row.full{grid-template-columns:1fr;}
  .form-row.three{grid-template-columns:1fr 1fr 1fr;}
  .form-group{display:flex;flex-direction:column;gap:6px;}
  label{font-size:11.5px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:0.7px;}
  input,select,textarea{padding:10px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13.5px;font-family:'DM Sans',sans-serif;outline:none;transition:border-color 0.15s;}
  input:focus,select:focus,textarea:focus{border-color:var(--blue);}
  textarea{resize:vertical;min-height:70px;}
  .modal-footer{display:flex;justify-content:flex-end;gap:10px;margin-top:24px;padding-top:20px;border-top:1px solid var(--border);}
  .kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px;}
  .kpi-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:16px 20px;}
  .kpi-card::before{content:'';display:block;height:3px;border-radius:3px;margin-bottom:12px;}
  .kpi-card.red::before{background:var(--red);}
  .kpi-card.orange::before{background:var(--orange);}
  .kpi-card.green::before{background:var(--green);}
  .kpi-card.blue::before{background:var(--blue);}
  .kpi-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:6px;}
  .kpi-value{font-size:20px;font-weight:600;font-family:'DM Mono',monospace;}
  .empty{padding:40px;text-align:center;color:var(--muted);font-size:13px;}
  .spinner-wrap{display:flex;align-items:center;justify-content:center;padding:40px;color:var(--muted);}
  .spinner{width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin 0.8s linear infinite;margin-right:10px;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .tipo-badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;background:var(--bg3);color:var(--muted);}
  .sin-factura{background:rgba(139,92,246,0.1);color:var(--purple);}
  .tag.liberado{background:rgba(59,130,246,0.15);color:var(--blue);}
  .tag.en-pago{background:rgba(139,92,246,0.15);color:var(--purple);}
  @media(max-width:768px){.main{margin-left:0;padding:16px;}.kpi-row{grid-template-columns:repeat(2,1fr);}.form-row{grid-template-columns:1fr;}.form-row.three{grid-template-columns:1fr;}}
</style>
</head>

<main class="main">
  <div class="page-header">
    <h2>Compras y gastos</h2>
    <button class="btn btn-primary" onclick="abrirNuevo()">+ Nuevo egreso</button>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="cambiarTab('egresos',this)">Todos los egresos</button>
    <button class="tab" onclick="cambiarTab('pendientes',this)">Pendientes de pago</button>
    <button class="tab" id="tab-liberar" onclick="cambiarTab('liberar',this)">
      Liberar para pago <span id="badge-liberar" style="display:none;background:var(--red);color:#fff;border-radius:20px;padding:1px 7px;font-size:11px;margin-left:4px"></span>
    </button>
    <button class="tab" onclick="cambiarTab('proveedores',this)">Proveedores</button>
    <button class="tab" onclick="cambiarTab('importar',this)">↑ Importar AFIP</button>
  </div>

  <div class="filtros" id="filtros-egresos">
    <select id="f-empresa" onchange="cargarEgresos()">
      <option value="">Todas las empresas</option>
      <option value="a1000000-0000-0000-0000-000000000001">Hidromec</option>
      <option value="a2000000-0000-0000-0000-000000000002">Placemem</option>
    </select>
    <select id="f-tipo" onchange="cargarEgresos()">
      <option value="">Todos los tipos</option>
      <option value="materiales">Materiales</option>
      <option value="servicios">Servicios</option>
      <option value="alquiler_equipo">Alquiler equipo</option>
      <option value="costo_fijo">Costo fijo</option>
      <option value="impuesto">Impuesto</option>
      <option value="sueldo">Sueldo</option>
      <option value="otro">Otro</option>
    </select>
    <select id="f-pagado" onchange="cargarEgresos()">
      <option value="">Todos</option>
      <option value="false">Sin pagar</option>
      <option value="true">Pagados</option>
    </select>
    <input type="month" id="f-mes" onchange="cargarEgresos()">
    <input type="text" id="f-buscar" placeholder="Buscar proveedor o descripción..." oninput="cargarEgresos()" style="min-width:220px">
  </div>

  <div class="filtros" id="filtros-liberar" style="display:none">
    <select id="fl-empresa" onchange="cargarParaLiberar()">
      <option value="">Todas las empresas</option>
      <option value="a1000000-0000-0000-0000-000000000001">Hidromec</option>
      <option value="a2000000-0000-0000-0000-000000000002">Placemem</option>
    </select>
    <select id="fl-proveedor" onchange="cargarParaLiberar()">
      <option value="">Todos los proveedores</option>
    </select>
    <select id="fl-estado" onchange="cargarParaLiberar()">
      <option value="pendiente">Sin liberar</option>
      <option value="liberado">Liberados</option>
      <option value="todos">Todos</option>
    </select>
  </div>

  <div class="filtros" id="filtros-proveedores" style="display:none">
    <select id="fp-empresa" onchange="cargarProveedores()">
      <option value="">Todas las empresas</option>
      <option value="a1000000-0000-0000-0000-000000000001">Hidromec</option>
      <option value="a2000000-0000-0000-0000-000000000002">Placemem</option>
    </select>
    <input type="text" id="fp-buscar" placeholder="Buscar proveedor..." oninput="cargarProveedores()" style="min-width:220px">
    <button class="btn btn-ghost" onclick="abrirNuevoProveedor()">+ Nuevo proveedor</button>
  </div>
  <div class="filtros" id="filtros-importar" style="display:none">
    <select id="fi-empresa">
      <option value="a1000000-0000-0000-0000-000000000001">Hidromec</option>
      <option value="a2000000-0000-0000-0000-000000000002">Placemem</option>
    </select>
  </div>

  <div class="kpi-row" id="kpis-compras"></div>

  <div class="panel">
    <div id="contenido"><div class="spinner-wrap"><div class="spinner"></div>Cargando...</div></div>
  </div>
</main>

<!-- MODAL EGRESO -->
<div class="modal-overlay" id="modal-egreso">
  <div class="modal">
    <h3 id="modal-titulo">Nuevo egreso</h3>
    <div class="form-row">
      <div class="form-group">
        <label>Empresa</label>
        <select id="ne-empresa" onchange="cargarProveedoresPorEmpresa()">
          <option value="a1000000-0000-0000-0000-000000000001">Hidromec</option>
          <option value="a2000000-0000-0000-0000-000000000002">Placemem</option>
        </select>
      </div>
      <div class="form-group">
        <label>Tipo de gasto</label>
        <select id="ne-tipo">
          <option value="materiales">Materiales</option>
          <option value="servicios">Servicios</option>
          <option value="alquiler_equipo">Alquiler de equipo</option>
          <option value="costo_fijo">Costo fijo</option>
          <option value="impuesto">Impuesto / tasa</option>
          <option value="sueldo">Sueldo</option>
          <option value="otro">Otro gasto</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Proveedor (opcional)</label>
        <select id="ne-proveedor">
          <option value="">Sin proveedor / gasto directo</option>
        </select>
      </div>
      <div class="form-group">
        <label>Proyecto (opcional)</label>
        <select id="ne-proyecto">
          <option value="">Gasto general</option>
        </select>
      </div>
    </div>
    <div class="form-row full">
      <div class="form-group">
        <label>Descripción</label>
        <input type="text" id="ne-descripcion" placeholder="Ej: Compra de caños galvanizados, Alquiler andamio, Viáticos...">
      </div>
    </div>
    <div class="form-row three">
      <div class="form-group">
        <label>Monto</label>
        <input type="number" id="ne-monto" placeholder="0.00">
      </div>
      <div class="form-group">
        <label>Fecha</label>
        <input type="date" id="ne-fecha">
      </div>
      <div class="form-group">
        <label>N° Factura (opcional)</label>
        <input type="text" id="ne-numero" placeholder="Sin factura si no tiene">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>¿Ya está pagado?</label>
        <select id="ne-pagado" onchange="togglePago()">
          <option value="false">No — pendiente de pago</option>
          <option value="true">Sí — ya pagado</option>
        </select>
      </div>
      <div class="form-group" id="grupo-metodo-pago" style="display:none">
        <label>Método de pago</label>
        <select id="ne-metodo">
          <option value="transferencia">Transferencia</option>
          <option value="cheque">Cheque diferido</option>
          <option value="efectivo">Efectivo</option>
          <option value="otro">Otro</option>
        </select>
      </div>
    </div>
    <div class="form-row" id="grupo-cheque" style="display:none">
      <div class="form-group">
        <label>Fecha vencimiento cheque</label>
        <input type="date" id="ne-vencimiento-cheque">
      </div>
    </div>
    <div class="form-row full">
      <div class="form-group">
        <label>Observaciones</label>
        <textarea id="ne-obs" placeholder="Opcional..."></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="cerrarModal('modal-egreso')">Cancelar</button>
      <button class="btn btn-primary" onclick="guardarEgreso()">Guardar</button>
    </div>
  </div>
</div>

<!-- MODAL PROVEEDOR -->
<div class="modal-overlay" id="modal-proveedor">
  <div class="modal">
    <h3>Nuevo proveedor</h3>
    <div class="form-row">
      <div class="form-group">
        <label>Empresa</label>
        <select id="np-empresa">
          <option value="a1000000-0000-0000-0000-000000000001">Hidromec</option>
          <option value="a2000000-0000-0000-0000-000000000002">Placemem</option>
        </select>
      </div>
      <div class="form-group">
        <label>Nombre / Razón social</label>
        <input type="text" id="np-nombre" placeholder="Nombre del proveedor">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>CUIT</label>
        <input type="text" id="np-cuit" placeholder="30-12345678-9">
      </div>
      <div class="form-group">
        <label>Rubro</label>
        <input type="text" id="np-rubro" placeholder="Ej: Ferretería, Transporte...">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Teléfono</label>
        <input type="text" id="np-telefono" placeholder="Opcional">
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="text" id="np-email" placeholder="Opcional">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="cerrarModal('modal-proveedor')">Cancelar</button>
      <button class="btn btn-primary" onclick="guardarProveedor()">Guardar proveedor</button>
    </div>
  </div>
</div>

<!-- MODAL REGISTRAR PAGO -->
<div class="modal-overlay" id="modal-pago">
  <div class="modal">
    <h3>Registrar pago</h3>
    <p id="pago-info" style="font-size:13px;color:var(--muted);margin-bottom:20px"></p>
    <div class="form-row">
      <div class="form-group">
        <label>Fecha de pago</label>
        <input type="date" id="mp-fecha">
      </div>
      <div class="form-group">
        <label>Método de pago</label>
        <select id="mp-metodo">
          <option value="transferencia">Transferencia</option>
          <option value="cheque">Cheque</option>
          <option value="efectivo">Efectivo</option>
          <option value="otro">Otro</option>
        </select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="cerrarModal('modal-pago')">Cancelar</button>
      <button class="btn btn-success" onclick="confirmarPago()">Confirmar pago</button>
    </div>
  </div>
</div>

<!-- MODAL LIBERAR PARA PAGO -->
<div class="modal-overlay" id="modal-liberar">
  <div class="modal" style="max-width:460px">
    <h3>📤 Liberar para pago</h3>
    <p id="lib-info" style="font-size:13px;color:var(--muted);margin-bottom:20px;padding:12px;background:var(--bg3);border-radius:8px"></p>
    <div class="form-row">
      <div class="form-group">
        <label>Fecha vencimiento de pago</label>
        <input type="date" id="lib-fecha">
      </div>
    </div>
    <div class="form-row full">
      <div class="form-group">
        <label>Observaciones para caja (opcional)</label>
        <textarea id="lib-obs" placeholder="Ej: Pagar con transferencia, cuenta Banco Galicia..."></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="cerrarModal('modal-liberar')">Cancelar</button>
      <button class="btn btn-primary" onclick="confirmarLiberar()">✓ Liberar para pago</button>
    </div>
  </div>
</div>

<script>

let tabActual='egresos';
let egresoEditId=null;
let pagoEgresoId=null;

async function init(){
  const acceso = await verificarAcceso('compras');
  if (!acceso) return;
  document.getElementById('f-mes').value=new Date().toISOString().substring(0,7);
  document.getElementById('ne-fecha').value=hoy();
  document.getElementById('mp-fecha').value=hoy();
  await cargarProveedoresPorEmpresa();
  await cargarProyectosPorEmpresa();
  await cargarProveedoresLiberar();
  await cargarEgresos();
  actualizarBadgeLiberar();
}

function cambiarTab(tab,btn){
  tabActual=tab;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('filtros-egresos').style.display=(tab==='egresos'||tab==='pendientes')?'flex':'none';
  document.getElementById('filtros-liberar').style.display=tab==='liberar'?'flex':'none';
  document.getElementById('filtros-proveedores').style.display=tab==='proveedores'?'flex':'none';
  document.getElementById('filtros-importar').style.display=tab==='importar'?'flex':'none';
  if(tab==='egresos') cargarEgresos();
  else if(tab==='pendientes') cargarPendientes();
  else if(tab==='liberar') cargarParaLiberar();
  else if(tab==='importar') mostrarImportarAFIP();
  else cargarProveedores();
}

async function cargarEgresos(){
  document.getElementById('contenido').innerHTML='<div class="spinner-wrap"><div class="spinner"></div>Cargando...</div>';
  const emp=document.getElementById('f-empresa').value;
  const tipo=document.getElementById('f-tipo').value;
  const pagado=document.getElementById('f-pagado').value;
  const mes=document.getElementById('f-mes').value;
  const buscar=document.getElementById('f-buscar').value.toLowerCase();

  let q=db.from('egresos').select('*,proveedores(nombre),empresas(nombre),proyectos(nombre)').order('fecha_egreso',{ascending:false});
  if(emp) q=q.eq('empresa_id',emp);
  if(tipo) q=q.eq('tipo',tipo);
  if(pagado!=='') q=q.eq('pagado',pagado==='true');
  if(mes){q=q.gte('fecha_egreso',mes+'-01');const fin=new Date(mes+'-01');fin.setMonth(fin.getMonth()+1);q=q.lt('fecha_egreso',fin.toISOString().split('T')[0]);}

  const {data}=await q;
  let rows=data||[];
  if(buscar) rows=rows.filter(r=>(r.proveedores?.nombre||r.descripcion||'').toLowerCase().includes(buscar)||(r.descripcion||'').toLowerCase().includes(buscar));

  const total=rows.reduce((s,r)=>s+Number(r.monto||0),0);
  const pagados=rows.filter(r=>r.pagado).reduce((s,r)=>s+Number(r.monto||0),0);
  const pendiente=rows.filter(r=>!r.pagado).reduce((s,r)=>s+Number(r.monto||0),0);
  const conFactura=rows.filter(r=>r.numero_factura).length;

  document.getElementById('kpis-compras').innerHTML=`
    <div class="kpi-card red"><div class="kpi-label">Total egresos</div><div class="kpi-value">${fmt(total)}</div></div>
    <div class="kpi-card orange"><div class="kpi-label">Pendiente de pago</div><div class="kpi-value">${fmt(pendiente)}</div></div>
    <div class="kpi-card green"><div class="kpi-label">Ya pagado</div><div class="kpi-value">${fmt(pagados)}</div></div>
    <div class="kpi-card blue"><div class="kpi-label">Con factura</div><div class="kpi-value">${conFactura} / ${rows.length}</div></div>`;

  document.getElementById('contenido').innerHTML=`
    <div style="padding:10px 20px;border-bottom:1px solid var(--border)">
      <span style="font-size:12px;color:var(--muted)">${rows.length} registros — Total: <strong style="color:var(--text)">${fmt(total)}</strong></span>
    </div>
    <div style="overflow-x:auto"><table>
      <thead><tr><th>Empresa</th><th>Fecha</th><th>Tipo</th><th>Proveedor / Descripción</th><th>Proyecto</th><th>N° Factura</th><th>Monto</th><th>Estado</th><th>Acciones</th></tr></thead>
      <tbody>${rows.length?rows.map(r=>{
        const sinFac=!r.numero_factura;
        return`<tr>
          <td style="font-size:12px">${r.empresas?.nombre||'—'}</td>
          <td class="mono">${fmtF(r.fecha_egreso)}</td>
          <td><span class="tipo-badge">${r.tipo}</span></td>
          <td>
            <div style="font-size:13px">${r.proveedores?.nombre||'<span style="color:var(--muted)">Sin proveedor</span>'}</div>
            <div style="font-size:11px;color:var(--muted);margin-top:2px">${r.descripcion||''}</div>
          </td>
          <td style="font-size:12px;color:var(--muted)">${r.proyectos?.nombre||'General'}</td>
          <td class="mono" style="font-size:12px">${r.numero_factura||`<span class="tipo-badge sin-factura">Sin factura</span>`}</td>
          <td class="mono" style="color:var(--red)">${fmt(r.monto)}</td>
          <td>
            ${r.pagado?'<span class="tag pagado">Pagado</span>':
              r.liberado_pago?'<span class="tag liberado">✓ Liberado</span>':
              '<span class="tag pendiente">Pendiente</span>'}
            ${r.orden_pago_nro?`<div style="font-size:10px;color:var(--muted);margin-top:2px">OP: ${r.orden_pago_nro}</div>`:''}
          </td>
          <td><div style="display:flex;gap:6px;flex-wrap:wrap">
            ${!r.pagado&&!r.liberado_pago?`<button class="btn btn-sm btn-primary" onclick="abrirLiberar('${r.id}','${r.descripcion}','${r.monto}')">Liberar</button>`:''}
            ${!r.pagado&&r.liberado_pago?`<button class="btn btn-sm btn-ghost" onclick="cancelarLiberar('${r.id}')">Quitar</button>`:''}
            <button class="btn btn-sm btn-ghost" onclick="editarEgreso('${r.id}')">Editar</button>
            <button class="btn btn-sm btn-danger" onclick="borrarEgreso('${r.id}')">Borrar</button>
          </div></td>
        </tr>`;
      }).join(''):'<tr><td colspan="9" style="text-align:center;padding:40px;color:var(--muted)">Sin egresos</td></tr>'}</tbody>
    </table></div>`;
}

async function cargarPendientes(){
  document.getElementById('kpis-compras').innerHTML='';
  document.getElementById('contenido').innerHTML='<div class="spinner-wrap"><div class="spinner"></div>Cargando...</div>';
  const emp=document.getElementById('f-empresa').value;
  let q=db.from('egresos').select('*,proveedores(nombre),empresas(nombre)').eq('pagado',false).order('fecha_egreso');
  if(emp) q=q.eq('empresa_id',emp);
  const {data}=await q;
  const rows=data||[];
  const total=rows.reduce((s,r)=>s+Number(r.monto||0),0);

  document.getElementById('kpis-compras').innerHTML=`
    <div class="kpi-card orange" style="grid-column:span 2"><div class="kpi-label">Total pendiente de pago</div><div class="kpi-value">${fmt(total)}</div></div>
    <div class="kpi-card red" style="grid-column:span 2"><div class="kpi-label">Cantidad de egresos pendientes</div><div class="kpi-value">${rows.length} egresos</div></div>`;

  document.getElementById('contenido').innerHTML=`
    <div style="overflow-x:auto"><table>
      <thead><tr><th>Empresa</th><th>Fecha</th><th>Proveedor / Descripción</th><th>Tipo</th><th>Monto</th><th>Acciones</th></tr></thead>
      <tbody>${rows.length?rows.map(r=>`<tr>
        <td style="font-size:12px">${r.empresas?.nombre||'—'}</td>
        <td class="mono">${fmtF(r.fecha_egreso)}</td>
        <td>
          <div>${r.proveedores?.nombre||'Sin proveedor'}</div>
          <div style="font-size:11px;color:var(--muted)">${r.descripcion||''}</div>
        </td>
        <td><span class="tipo-badge">${r.tipo}</span></td>
        <td class="mono" style="color:var(--red)">${fmt(r.monto)}</td>
        <td><button class="btn btn-sm btn-success" onclick="abrirPago('${r.id}','${r.descripcion}','${r.monto}')">Registrar pago</button></td>
      </tr>`).join(''):'<tr><td colspan="6" style="text-align:center;padding:40px;color:var(--muted)">Sin pagos pendientes</td></tr>'}</tbody>
    </table></div>`;
}

async function cargarProveedores(){
  document.getElementById('kpis-compras').innerHTML='';
  document.getElementById('contenido').innerHTML='<div class="spinner-wrap"><div class="spinner"></div>Cargando...</div>';
  const emp=document.getElementById('fp-empresa').value;
  const buscar=document.getElementById('fp-buscar').value.toLowerCase();
  let q=db.from('proveedores').select('*,empresas(nombre)').eq('activo',true).order('nombre');
  if(emp) q=q.eq('empresa_id',emp);
  const {data}=await q;
  let rows=data||[];
  if(buscar) rows=rows.filter(r=>(r.nombre||'').toLowerCase().includes(buscar));

  document.getElementById('contenido').innerHTML=`
    <div style="overflow-x:auto"><table>
      <thead><tr><th>Empresa</th><th>Nombre</th><th>CUIT</th><th>Rubro</th><th>Teléfono</th><th>Email</th><th>Acciones</th></tr></thead>
      <tbody>${rows.length?rows.map(r=>`<tr>
        <td style="font-size:12px">${r.empresas?.nombre||'—'}</td>
        <td><strong>${r.nombre}</strong></td>
        <td class="mono">${r.cuit||'—'}</td>
        <td style="font-size:12px;color:var(--muted)">${r.rubro||'—'}</td>
        <td style="font-size:12px">${r.telefono||'—'}</td>
        <td style="font-size:12px">${r.email||'—'}</td>
        <td><button class="btn btn-sm btn-danger" onclick="borrarProveedor('${r.id}')">Borrar</button></td>
      </tr>`).join(''):'<tr><td colspan="7" style="text-align:center;padding:40px;color:var(--muted)">Sin proveedores</td></tr>'}</tbody>
    </table></div>`;
}

async function cargarProveedoresPorEmpresa(){
  const empId=document.getElementById('ne-empresa').value;
  const {data}=await db.from('proveedores').select('id,nombre').eq('empresa_id',empId).eq('activo',true).order('nombre');
  const sel=document.getElementById('ne-proveedor');
  sel.innerHTML='<option value="">Sin proveedor / gasto directo</option>'+(data||[]).map(p=>`<option value="${p.id}">${p.nombre}</option>`).join('');
}

async function cargarProyectosPorEmpresa(){
  const empId=document.getElementById('ne-empresa').value;
  const {data}=await db.from('proyectos').select('id,nombre').eq('empresa_id',empId).eq('estado','activo').order('nombre');
  const sel=document.getElementById('ne-proyecto');
  sel.innerHTML='<option value="">Gasto general</option>'+(data||[]).map(p=>`<option value="${p.id}">${p.nombre}</option>`).join('');
}

function togglePago(){
  const pagado=document.getElementById('ne-pagado').value==='true';
  document.getElementById('grupo-metodo-pago').style.display=pagado?'flex':'none';
}

function abrirNuevo(){
  egresoEditId=null;
  document.getElementById('modal-titulo').textContent='Nuevo egreso';
  document.getElementById('ne-descripcion').value='';
  document.getElementById('ne-monto').value='';
  document.getElementById('ne-numero').value='';
  document.getElementById('ne-obs').value='';
  document.getElementById('ne-pagado').value='false';
  document.getElementById('ne-fecha').value=hoy();
  document.getElementById('grupo-metodo-pago').style.display='none';
  document.getElementById('modal-egreso').classList.add('show');
}

async function editarEgreso(id){
  const {data:r}=await db.from('egresos').select('*').eq('id',id).single();
  if(!r) return;
  egresoEditId=id;
  document.getElementById('modal-titulo').textContent='Editar egreso';
  document.getElementById('ne-empresa').value=r.empresa_id;
  await cargarProveedoresPorEmpresa();
  await cargarProyectosPorEmpresa();
  document.getElementById('ne-proveedor').value=r.proveedor_id||'';
  document.getElementById('ne-proyecto').value=r.proyecto_id||'';
  document.getElementById('ne-tipo').value=r.tipo;
  document.getElementById('ne-descripcion').value=r.descripcion;
  document.getElementById('ne-monto').value=r.monto;
  document.getElementById('ne-fecha').value=r.fecha_egreso;
  document.getElementById('ne-numero').value=r.numero_factura||'';
  document.getElementById('ne-pagado').value=r.pagado?'true':'false';
  document.getElementById('ne-metodo').value=r.metodo_pago||'transferencia';
  document.getElementById('ne-obs').value=r.observaciones||'';
  document.getElementById('grupo-metodo-pago').style.display=r.pagado?'flex':'none';
  document.getElementById('modal-egreso').classList.add('show');
}

async function guardarEgreso(){
  const desc=document.getElementById('ne-descripcion').value.trim();
  const monto=parseFloat(document.getElementById('ne-monto').value)||0;
  if(!desc||!monto){alert('Completá descripción y monto.');return;}
  const pagado=document.getElementById('ne-pagado').value==='true';
  const payload={
    empresa_id:document.getElementById('ne-empresa').value,
    proveedor_id:document.getElementById('ne-proveedor').value||null,
    proyecto_id:document.getElementById('ne-proyecto').value||null,
    tipo:document.getElementById('ne-tipo').value,
    descripcion:desc,monto,
    fecha_egreso:document.getElementById('ne-fecha').value,
    numero_factura:document.getElementById('ne-numero').value||null,
    pagado,
    metodo_pago:pagado?document.getElementById('ne-metodo').value:null,
    fecha_pago_real:pagado?hoy():null,
    observaciones:document.getElementById('ne-obs').value||null,
  };
  let error;
  if(egresoEditId){({error}=await db.from('egresos').update(payload).eq('id',egresoEditId));}
  else{({error}=await db.from('egresos').insert(payload));}
  if(error){alert('Error: '+error.message);return;}
  cerrarModal('modal-egreso');
  cargarEgresos();
}

async function borrarEgreso(id){
  if(!confirm('¿Borrar este egreso?')) return;
  await db.from('egresos').delete().eq('id',id);
  cargarEgresos();
}

function abrirPago(id,desc,monto){
  pagoEgresoId=id;
  document.getElementById('pago-info').textContent=`${desc} — ${fmt(monto)}`;
  document.getElementById('mp-fecha').value=hoy();
  document.getElementById('modal-pago').classList.add('show');
}

async function confirmarPago(){
  const {error}=await db.from('egresos').update({
    pagado:true,
    fecha_pago_real:document.getElementById('mp-fecha').value,
    metodo_pago:document.getElementById('mp-metodo').value,
  }).eq('id',pagoEgresoId);
  if(error){alert('Error: '+error.message);return;}
  cerrarModal('modal-pago');
  if(tabActual==='pendientes') cargarPendientes();
  else cargarEgresos();
}

function abrirNuevoProveedor(){ document.getElementById('modal-proveedor').classList.add('show'); }

async function guardarProveedor(){
  const nombre=document.getElementById('np-nombre').value.trim();
  if(!nombre){alert('Ingresá el nombre del proveedor.');return;}
  const {error}=await db.from('proveedores').insert({
    empresa_id:document.getElementById('np-empresa').value,
    nombre:nombre.toUpperCase(),
    cuit:document.getElementById('np-cuit').value||null,
    rubro:document.getElementById('np-rubro').value||null,
    telefono:document.getElementById('np-telefono').value||null,
    email:document.getElementById('np-email').value||null,
    activo:true,
  });
  if(error){alert('Error: '+error.message);return;}
  cerrarModal('modal-proveedor');
  cargarProveedores();
}

async function borrarProveedor(id){
  if(!confirm('¿Borrar este proveedor?')) return;
  await db.from('proveedores').update({activo:false}).eq('id',id);
  cargarProveedores();
}

function cerrarModal(id){ document.getElementById(id).classList.remove('show'); }
async function logout(){ await db.auth.signOut(); window.location.href='login.html'; }

// ── BADGE contador ────────────────────────────────────────────
async function actualizarBadgeLiberar(){
  const {count}=await db.from('egresos')
    .select('*',{count:'exact',head:true})
    .eq('pagado',false).eq('liberado_pago',false);
  const badge=document.getElementById('badge-liberar');
  if(count>0){badge.textContent=count;badge.style.display='inline';}
  else{badge.style.display='none';}
}

// ── LIBERAR PARA PAGO ─────────────────────────────────────────
let liberarId=null;
function abrirLiberar(id,desc,monto){
  liberarId=id;
  document.getElementById('lib-info').textContent=`${desc} — ${fmt(monto)}`;
  document.getElementById('lib-fecha').value='';
  document.getElementById('lib-obs').value='';
  document.getElementById('modal-liberar').classList.add('show');
}

async function confirmarLiberar(){
  const fecha=document.getElementById('lib-fecha').value;
  if(!fecha){alert('Ingresá la fecha de vencimiento de pago.');return;}
  const u=await getUsuario();
  const {error}=await db.from('egresos').update({
    liberado_pago:true,
    fecha_vencimiento_pago:fecha,
    liberado_por:u?.email||'',
    liberado_at:new Date().toISOString(),
    observaciones:document.getElementById('lib-obs').value||null,
  }).eq('id',liberarId);
  if(error){alert('Error: '+error.message);return;}
  cerrarModal('modal-liberar');
  actualizarBadgeLiberar();
  if(tabActual==='egresos') cargarEgresos();
  else cargarParaLiberar();
}

async function cancelarLiberar(id){
  if(!confirm('¿Quitar la liberación de este egreso?')) return;
  await db.from('egresos').update({
    liberado_pago:false,fecha_vencimiento_pago:null,liberado_por:null,liberado_at:null
  }).eq('id',id);
  actualizarBadgeLiberar();
  cargarEgresos();
}

// ── TAB LIBERAR ───────────────────────────────────────────────
async function cargarParaLiberar(){
  document.getElementById('contenido').innerHTML='<div class="spinner-wrap"><div class="spinner"></div>Cargando...</div>';
  const emp=document.getElementById('fl-empresa').value;
  const prov=document.getElementById('fl-proveedor').value;
  const estado=document.getElementById('fl-estado').value;

  let q=db.from('egresos').select('*,proveedores(nombre),empresas(nombre)')
    .eq('pagado',false).order('fecha_vencimiento_pago',{ascending:true,nullsFirst:false});
  if(emp) q=q.eq('empresa_id',emp);
  if(prov) q=q.eq('proveedor_id',prov);
  if(estado==='liberado') q=q.eq('liberado_pago',true);
  else if(estado==='pendiente') q=q.eq('liberado_pago',false);

  const {data}=await q;
  const rows=data||[];
  const hoyStr=new Date().toISOString().split('T')[0];

  const totalLib=rows.filter(r=>r.liberado_pago).reduce((s,r)=>s+Number(r.monto||0),0);
  const totalPend=rows.filter(r=>!r.liberado_pago).reduce((s,r)=>s+Number(r.monto||0),0);

  document.getElementById('kpis-compras').innerHTML=`
    <div class="kpi-card blue" style="grid-column:span 2"><div class="kpi-label">Liberados para pago</div><div class="kpi-value">${fmt(totalLib)}</div></div>
    <div class="kpi-card orange" style="grid-column:span 2"><div class="kpi-label">Sin liberar</div><div class="kpi-value">${fmt(totalPend)}</div></div>`;

  document.getElementById('contenido').innerHTML=`
    <div style="overflow-x:auto"><table>
      <thead><tr><th>Empresa</th><th>Vencimiento pago</th><th>Proveedor</th><th>Descripción</th><th>Monto</th><th>Estado</th><th>Liberado por</th><th>Acciones</th></tr></thead>
      <tbody>${rows.length?rows.map(r=>{
        const venc=r.fecha_vencimiento_pago;
        const vencida=venc&&venc<hoyStr;
        return`<tr>
          <td style="font-size:12px">${r.empresas?.nombre||'—'}</td>
          <td class="mono" style="color:${vencida?'var(--red)':'var(--text)'}">
            ${venc?fmtF(venc):'<span style="color:var(--muted)">Sin fecha</span>'}
            ${vencida?'<span style="color:var(--red);font-size:10px;margin-left:4px">VENCIDO</span>':''}
          </td>
          <td>${r.proveedores?.nombre||'<span style="color:var(--muted)">Sin proveedor</span>'}</td>
          <td style="font-size:12px;color:var(--muted)">${r.descripcion||''}</td>
          <td class="mono" style="color:var(--red)">${fmt(r.monto)}</td>
          <td>${r.liberado_pago?'<span class="tag liberado">✓ Liberado</span>':'<span class="tag pendiente">Sin liberar</span>'}</td>
          <td style="font-size:11px;color:var(--muted)">${r.liberado_por||'—'}</td>
          <td><div style="display:flex;gap:6px">
            ${!r.liberado_pago?`<button class="btn btn-sm btn-primary" onclick="abrirLiberar('${r.id}','${r.descripcion}','${r.monto}')">Liberar</button>`:''}
            ${r.liberado_pago?`<button class="btn btn-sm btn-ghost" onclick="cancelarLiberar('${r.id}')">Quitar</button>`:''}
          </div></td>
        </tr>`;
      }).join(''):'<tr><td colspan="8" style="text-align:center;padding:40px;color:var(--muted)">Sin egresos pendientes</td></tr>'}</tbody>
    </table></div>`;
}

async function cargarProveedoresLiberar(){
  const {data}=await db.from('proveedores').select('id,nombre').eq('activo',true).order('nombre');
  const sel=document.getElementById('fl-proveedor');
  if(sel) sel.innerHTML='<option value="">Todos los proveedores</option>'+(data||[]).map(p=>`<option value="${p.id}">${p.nombre}</option>`).join('');
}

// ── IMPORTAR AFIP (compras recibidas) ─────────────────────────
let importRowsCompras=[];

function mostrarImportarAFIP(){
  document.getElementById('kpis-compras').innerHTML='';
  document.getElementById('contenido').innerHTML=`
    <div style="border:2px dashed var(--border);border-radius:12px;padding:40px;text-align:center;cursor:pointer;transition:all 0.2s;margin-bottom:20px"
      id="zone-afip" onclick="document.getElementById('file-afip').click()"
      ondragover="event.preventDefault();this.style.borderColor='var(--blue)'"
      ondragleave="this.style.borderColor=''"
      ondrop="handleDropAfip(event)">
      <svg style="width:40px;height:40px;color:var(--muted);margin-bottom:12px" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/></svg>
      <h3 style="font-size:15px;font-weight:500;margin-bottom:6px">Subir Excel de AFIP — Compras recibidas</h3>
      <p style="font-size:12px;color:var(--muted)">Formato: Mis Comprobantes Recibidos (.xlsx) — Portal AFIP</p>
    </div>
    <input type="file" id="file-afip" accept=".xlsx,.xls" style="display:none" onchange="leerExcelAFIP(this)">
    <div id="preview-afip"></div>`;
}

function handleDropAfip(e){
  e.preventDefault();
  const file=e.dataTransfer.files[0];
  if(file) procesarExcelAFIP(file);
}
function leerExcelAFIP(input){
  const file=input.files[0];
  if(file) procesarExcelAFIP(file);
}

function procesarExcelAFIP(file){
  const reader=new FileReader();
  reader.onload=e=>{
    const wb=XLSX.read(new Uint8Array(e.target.result),{type:'array'});
    const ws=wb.Sheets[wb.SheetNames[0]];
    const json=XLSX.utils.sheet_to_json(ws,{header:1,defval:null});
    // Fila 1 = título, Fila 2 = headers ("Fecha","Tipo",...), Fila 3+ = datos
    let hrIdx=1;
    for(let i=0;i<Math.min(5,json.length);i++){
      if(json[i]&&String(json[i][0]||'').toLowerCase().includes('fecha')){hrIdx=i;break;}
    }
    const dataRows=json.slice(hrIdx+1).filter(r=>r&&r[0]&&r[29]!=null);
    importRowsCompras=dataRows.map(r=>{
      // Columnas reales del archivo AFIP "Mis Comprobantes Recibidos":
      // [0] Fecha  [1] Tipo  [2] Pto Venta  [3] Nro Desde
      // [7] CUIT Emisor  [8] Denominacion Emisor
      // [11] Tipo Cambio  [12] Moneda
      // [24] Neto Gravado Total  [25] Neto No Gravado  [26] Op. Exentas
      // [28] Total IVA  [29] Imp. Total
      const fechaRaw=String(r[0]||'');
      const fechaISO=fechaRaw.includes('/')?fechaRaw.split('/').reverse().join('-'):fechaRaw;
      const tipoRaw=String(r[1]||'').toUpperCase();
      let tipo='FC';
      if(tipoRaw.includes('CRED')||tipoRaw.includes('NC')) tipo='NC';
      else if(tipoRaw.includes('DEB')&&tipoRaw.includes('ND')) tipo='ND';
      else if(tipoRaw.includes(' A')) tipo='FA';
      else if(tipoRaw.includes(' B')) tipo='FB';
      else if(tipoRaw.includes(' C')) tipo='FC';
      const pv=String(r[2]||'0').padStart(5,'0');
      const nro=String(r[3]||'0').padStart(8,'0');
      const numero=`${pv}-${nro}`;
      const cuit=String(r[7]||'').replace(/[^0-9]/g,'');
      const proveedor=String(r[8]||'').trim().toUpperCase();
      const monedaRaw=String(r[12]||'$').trim().toUpperCase();
      const tipoCambio=parseFloat(r[11])||1;
      const esDolar=monedaRaw==='DOL'||monedaRaw==='USD'||monedaRaw==='U$S';
      // Neto = Neto Gravado Total + Neto No Gravado + Op. Exentas
      const netoGravado=parseFloat(r[24])||0;
      const netoNoGrav=parseFloat(r[25])||0;
      const exentas=parseFloat(r[26])||0;
      const neto=netoGravado+netoNoGrav+exentas;
      const totalIVA=parseFloat(r[28])||0;
      const total=parseFloat(r[29])||0;
      if(!total) return null;
      return{fecha:fechaISO,tipo,numero,cuit,proveedor,neto,totalIVA,total,
             moneda:esDolar?'USD':'ARS',tipoCambio:esDolar?tipoCambio:1};
    }).filter(Boolean);

    const usd=importRowsCompras.filter(r=>r.moneda==='USD');
    const fmtNum=(v,usd)=>(usd?'U$S ':'$')+Number(v).toLocaleString('es-AR',{minimumFractionDigits:2,maximumFractionDigits:2});
    document.getElementById('preview-afip').innerHTML=`
      <div style="background:var(--bg3);border-radius:8px;padding:14px 18px;margin-bottom:16px;display:flex;gap:24px;align-items:center;flex-wrap:wrap">
        <span style="font-size:13px">\u{1F4C4} <strong>${importRowsCompras.length}</strong> comprobantes encontrados</span>
        ${usd.length?`<span style="font-size:12px;color:var(--orange)">\u{1F4B5} <strong>${usd.length}</strong> en d\u00f3lares</span>`:''}
        ${importRowsCompras.length?`<button class="btn btn-success" onclick="confirmarImportAFIP()">Importar ${importRowsCompras.length} comprobantes</button>`:''}
      </div>
      <div class="panel"><div style="overflow-x:auto;max-height:400px;overflow-y:auto"><table>
        <thead><tr><th>Fecha</th><th>Tipo</th><th>N\u00b0</th><th>Proveedor</th><th>Moneda</th><th>Neto</th><th>IVA</th><th>Total</th></tr></thead>
        <tbody>${importRowsCompras.slice(0,50).map(r=>`<tr>
          <td class="mono">${r.fecha}</td>
          <td><span style="font-size:11px;padding:2px 8px;border-radius:4px;background:var(--bg3);color:var(--muted)">${r.tipo}</span></td>
          <td class="mono" style="font-size:11px">${r.numero}</td>
          <td style="font-size:12px;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${r.proveedor}</td>
          <td>${r.moneda==='USD'?'<span style=\"font-size:11px;padding:2px 8px;border-radius:4px;background:rgba(245,158,11,0.15);color:var(--orange);font-weight:600\">USD</span>':'<span style=\"font-size:11px;padding:2px 8px;border-radius:4px;background:var(--bg3);color:var(--muted)\">ARS</span>'}</td>
          <td class="mono" style="font-size:12px">${fmtNum(r.neto,r.moneda==='USD')}</td>
          <td class="mono" style="font-size:12px;color:var(--muted)">${fmtNum(r.totalIVA,r.moneda==='USD')}</td>
          <td class="mono" style="color:var(--red);font-weight:500">${fmtNum(r.total,r.moneda==='USD')}</td>
        </tr>`).join('')}
        ${importRowsCompras.length>50?`<tr><td colspan="8" style="text-align:center;color:var(--muted);font-size:12px">...y ${importRowsCompras.length-50} m\u00e1s</td></tr>`:''}
        </tbody></table></div></div>`;
  };
  reader.readAsArrayBuffer(file);
}

async function confirmarImportAFIP(){
  const empId=document.getElementById('fi-empresa').value;
  const btn=document.querySelector('#preview-afip .btn-success');
  if(btn){btn.disabled=true;btn.textContent='Importando...';}

  // Cargar proveedores existentes
  const {data:provs}=await db.from('proveedores').select('id,nombre,cuit').eq('empresa_id',empId).eq('activo',true);
  const listaProvs=provs||[];

  // Cargar números de factura ya existentes para deduplicar en bulk (más eficiente)
  const numeros=importRowsCompras.map(r=>r.numero).filter(Boolean);
  const {data:existentes}=await db.from('egresos')
    .select('numero_factura')
    .eq('empresa_id',empId)
    .in('numero_factura',numeros);
  const numerosExistentes=new Set((existentes||[]).map(r=>r.numero_factura));

  let ok=0,skip=0;
  for(const r of importRowsCompras){
    // Verificar duplicado
    if(numerosExistentes.has(r.numero)){skip++;continue;}

    // Buscar/crear proveedor
    let prov=listaProvs.find(p=>p.cuit&&p.cuit===r.cuit)
           ||listaProvs.find(p=>p.nombre&&(p.nombre.includes(r.proveedor)||r.proveedor.includes(p.nombre)));
    if(!prov&&r.proveedor){
      const {data:np}=await db.from('proveedores')
        .insert({empresa_id:empId,nombre:r.proveedor,cuit:r.cuit||null,activo:true})
        .select().maybeSingle();
      if(np){prov=np;listaProvs.push(np);}
    }

    const esUSD=r.moneda==='USD';
    const descMoneda=esUSD?` [USD ${r.total.toFixed(2)} × TC ${r.tipoCambio}]`:'';
    const {error}=await db.from('egresos').insert({
      empresa_id:empId,
      proveedor_id:prov?.id||null,
      tipo:'materiales',
      descripcion:`${r.tipo} ${r.numero} — ${r.proveedor}${descMoneda}`,
      monto:r.total,
      fecha_egreso:r.fecha,
      numero_factura:r.numero,
      pagado:false,
      observaciones:esUSD?`Factura en USD. Monto original: U$S ${r.total.toFixed(2)} | Tipo de cambio: ${r.tipoCambio}`:null,
    });
    if(!error){ok++;numerosExistentes.add(r.numero);}else skip++;
  }
  const txtUSD=importRowsCompras.filter(r=>r.moneda==='USD').length;
  alert(`✓ ${ok} comprobantes importados.${txtUSD?` (${txtUSD} en USD)`:''}\n${skip} omitidos (ya existían).`);
  mostrarImportarAFIP();
}

init();
</script>
