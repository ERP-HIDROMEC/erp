<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hidromec ERP — Impuestos</title>
<link rel="stylesheet" href="erp-layout.css">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="erp-utils.js"></script>
<script src="erp-sidebar.js"></script>
<script src="empresas.api.js"></script>
<script src="clientes.api.js"></script>
<script src="impuestos.api.js"></script>
<style>
  tr:hover .saldo-pos{color:var(--red);}
  .saldo-neg{color:var(--green);}
  .saldo-cero{color:var(--muted);}
  .mes-row-total{background:var(--bg3);font-weight:600;}
  .tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;}
  input:focus,select:focus{border-color:var(--blue);}
  .kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px;}
  .kpi-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:16px 20px;position:relative;overflow:hidden;}
  .kpi-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;}
  .kpi-card.blue::before{background:var(--blue);}
  .kpi-card.green::before{background:var(--green);}
  .kpi-card.red::before{background:var(--red);}
  .kpi-card.orange::before{background:var(--orange);}
  .kpi-value{font-size:18px;font-weight:600;font-family:'DM Mono',monospace;}
  @media(max-width:768px){.main{margin-left:0;padding:16px;}.kpi-row{grid-template-columns:repeat(2,1fr);}  }
</style>
</head>
<body>
<div id="overlay" class="overlay" onclick="ERP.closeSidebar()"></div>
<div id="sidebar-root"></div>

<main class="main">
  <div class="page-header">
    <h2>Impuestos</h2>
    <button class="btn btn-primary" id="btn-nuevo" onclick="abrirNuevo()">+ Cargar retención</button>
  </div>

  <div class="filtros">
    <select id="f-empresa" onchange="recargar()">
      <option value="a1000000-0000-0000-0000-000000000001">Hidromec</option>
      <option value="a2000000-0000-0000-0000-000000000002">Placemem</option>
    </select>
    <select id="f-vista" onchange="toggleVista()">
      <option value="mensual">Vista mensual</option>
      <option value="anual">Vista anual</option>
    </select>
    <select id="f-anio" onchange="recargar()"></select>
    <select id="f-mes" onchange="recargar()" style="display:none">
      <option value="01">Enero</option>
      <option value="02">Febrero</option>
      <option value="03">Marzo</option>
      <option value="04">Abril</option>
      <option value="05">Mayo</option>
      <option value="06">Junio</option>
      <option value="07">Julio</option>
      <option value="08">Agosto</option>
      <option value="09">Septiembre</option>
      <option value="10">Octubre</option>
      <option value="11">Noviembre</option>
      <option value="12">Diciembre</option>
    </select>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="cambiarTab('iva',this)">Posición IVA</button>
    <button class="tab" onclick="cambiarTab('iibb',this)">Posición IIBB</button>
    <button class="tab" onclick="cambiarTab('retenciones',this)">Retenciones recibidas</button>
    <button class="tab" onclick="cambiarTab('pagos',this)">Pagos realizados</button>
    <button class="tab" onclick="cambiarTab('varios',this)">Impuestos varios</button>
  </div>

  <div id="contenido"><div class="spinner-wrap"><div class="spinner"></div>Cargando...</div></div>
</main>

<!-- MODAL RETENCIÓN -->
<div class="modal-overlay" id="modal-ret">
  <div class="modal">
    <h3 id="ret-titulo">Cargar retención</h3>
    <div class="form-row">
      <div class="form-group">
        <label>Empresa</label>
        <select id="nr-empresa" onchange="cargarClientesRet()">
          <option value="a1000000-0000-0000-0000-000000000001">Hidromec</option>
          <option value="a2000000-0000-0000-0000-000000000002">Placemem</option>
        </select>
      </div>
      <div class="form-group">
        <label>Tipo de retención</label>
        <select id="nr-tipo">
          <option value="iva">IVA</option>
          <option value="ganancias">Ganancias</option>
          <option value="iibb">IIBB</option>
          <option value="suss">SUSS</option>
          <option value="municipal">Tasa municipal</option>
          <option value="higiene">Seguridad e Higiene</option>
          <option value="otro">Otro</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Cliente</label>
        <select id="nr-cliente"></select>
      </div>
      <div class="form-group">
        <label>Período</label>
        <input type="month" id="nr-periodo">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Fecha</label>
        <input type="date" id="nr-fecha">
      </div>
      <div class="form-group">
        <label>Monto</label>
        <input type="number" id="nr-monto" placeholder="0.00">
      </div>
    </div>
    <div class="form-row full">
      <div class="form-group">
        <label>N° Certificado (opcional)</label>
        <input type="text" id="nr-cert" placeholder="Número del certificado de retención">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="cerrarModal('modal-ret')">Cancelar</button>
      <button class="btn btn-primary" onclick="guardarRetencion()">Guardar</button>
    </div>
  </div>
</div>

<!-- MODAL PAGO IMPUESTO -->
<div class="modal-overlay" id="modal-pago">
  <div class="modal">
    <h3>Registrar pago de impuesto</h3>
    <div class="form-row">
      <div class="form-group">
        <label>Empresa</label>
        <select id="np-empresa">
          <option value="a1000000-0000-0000-0000-000000000001">Hidromec</option>
          <option value="a2000000-0000-0000-0000-000000000002">Placemem</option>
        </select>
      </div>
      <div class="form-group">
        <label>Tipo</label>
        <select id="np-tipo" onchange="toggleSocio()">
          <option value="iva">IVA</option>
          <option value="iibb">IIBB</option>
          <option value="f931">F931 — Cargas sociales</option>
          <option value="autonomos">Autónomos socios</option>
          <option value="ganancias_anticipo">Anticipo Ganancias</option>
          <option value="ganancias_anual">Ganancias anual</option>
          <option value="cheque">Impuesto al cheque</option>
          <option value="otro">Otro</option>
        </select>
      </div>
    </div>
    <div class="form-row" id="grupo-socio" style="display:none">
      <div class="form-group full">
        <label>Socio</label>
        <input type="text" id="np-socio" placeholder="Nombre del socio">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Período</label>
        <input type="month" id="np-periodo">

        <label>Fecha de pago</label>

      <div class="form-group">

      </div>
      <div class="form-group">
        <label>N° VEP (opcional)</label>

    <div class="form-row full">
      <div class="form-group">
        <label>Observaciones</label>
        <input type="text" id="np-obs" placeholder="Opcional">

    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="cerrarModal('modal-pago')">Cancelar</button>

    </div>
  </div>
</div>

<!-- MODAL IMPUESTOS VARIOS -->
<div class="modal-overlay" id="modal-varios">
  <div class="modal">
    <h3>Cargar impuesto / carga obligatoria</h3>
    <div class="form-row">
      <div class="form-group">
        <label>Empresa</label>
        <select id="nv-empresa">
          <option value="a1000000-0000-0000-0000-000000000001">Hidromec</option>
          <option value="a2000000-0000-0000-0000-000000000002">Placemem</option>
        </select>
      </div>
      <div class="form-group">
        <label>Tipo de impuesto</label>
        <select id="nv-tipo">
          <option value="anticipo_ganancias">Anticipo de Ganancias</option>
          <option value="sindicato">Sindicato / Cuota sindical</option>
          <option value="ieric">IERIC</option>
          <option value="autonomo_gerente">Autónomo – Gerentes/Socios</option>
          <option value="uocra">UOCRA</option>
          <option value="sunsal">SUNSAL</option>
          <option value="inssjp">INSSJP / PAMI</option>
          <option value="obra_social">Obra social</option>
          <option value="art">ART</option>
          <option value="seguro_vida">Seguro de vida obligatorio</option>
          <option value="otro">Otro impuesto / carga</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Descripción / Detalle</label>
        <input type="text" id="nv-descripcion" placeholder="Ej: Sindicato UOCRA Mar 2026, Anticipo #3...">
      </div>
      <div class="form-group">
        <label>Período</label>
        <input type="month" id="nv-periodo">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Fecha de pago / vencimiento</label>
        <input type="date" id="nv-fecha">
      </div>
      <div class="form-group">
        <label>Monto</label>
        <input type="number" id="nv-monto" placeholder="0.00">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>¿Ya pagado?</label>
        <select id="nv-pagado">
          <option value="true">Sí — ya pagado</option>

      <button class="btn btn-ghost" onclick="cerrarModal('modal-varios')">Cancelar</button>

<script>
const MESES=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
let tabActual='iva';

async function init(){
  const usuario = await ERP.initLayout('impuestos');
  if(!usuario) return;
  // Poblar años
  const anioSel=document.getElementById('f-anio');
  const anioActual=new Date().getFullYear();
  for(let a=anioActual;a>=2023;a--){
    const opt=document.createElement('option');
    opt.value=a;opt.textContent=a;
    anioSel.appendChild(opt);
  }
  // Setear mes actual
  const mesActual=String(new Date().getMonth()+1).padStart(2,'0');
  document.getElementById('f-mes').value=mesActual;
  document.getElementById('f-mes').style.display=''; // vista mensual por default
  document.getElementById('nr-periodo').value=new Date().toISOString().substring(0,7);
  document.getElementById('np-periodo').value=new Date().toISOString().substring(0,7);
  document.getElementById('nr-fecha').value=hoy();
  document.getElementById('np-fecha').value=hoy();
  document.getElementById('nv-periodo').value=new Date().toISOString().substring(0,7);
  document.getElementById('nv-fecha').value=hoy();
  await cargarClientesRet();
  recargar();
}

function cambiarTab(tab,btn){
  tabActual=tab;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  const btnNuevo=document.getElementById('btn-nuevo');
  if(tab==='pagos') btnNuevo.textContent='+ Registrar pago';
  else if(tab==='varios') btnNuevo.textContent='+ Cargar impuesto';
  else btnNuevo.textContent='+ Cargar retención';
  recargar();
}

function abrirNuevo(){
  if(tabActual==='pagos') document.getElementById('modal-pago').classList.add('show');
  else if(tabActual==='varios') document.getElementById('modal-varios').classList.add('show');
  else document.getElementById('modal-ret').classList.add('show');
}

function toggleVista(){
  const vista=document.getElementById('f-vista').value;
  document.getElementById('f-mes').style.display=vista==='mensual'?'':'none';
  recargar();
}

function getPeriodo(){
  const anio=document.getElementById('f-anio').value;
  const vista=document.getElementById('f-vista').value;
  if(vista==='mensual'){
    const mes=document.getElementById('f-mes').value;
    return{tipo:'mes',periodo:`${anio}-${mes}`,label:new Date(`${anio}-${mes}-01`).toLocaleDateString('es-AR',{month:'long',year:'numeric'})};
  }
  return{tipo:'anio',periodo:anio,label:anio};
}

function recargar(){
  if(tabActual==='iva') cargarIVA();
  else if(tabActual==='iibb') cargarIIBB();
  else if(tabActual==='retenciones') cargarRetenciones();
  else if(tabActual==='varios') cargarVarios();
  else cargarPagos();
}

// ===== POSICIÓN IVA =====
async function cargarIVA(){
  document.getElementById('contenido').innerHTML='<div class="spinner-wrap"><div class="spinner"></div>Calculando posición IVA...</div>';
  const empId=document.getElementById('f-empresa').value;
  const {tipo,periodo,label}=getPeriodo();
  const anio=document.getElementById('f-anio').value;
  const fechaIni=tipo==='mes'?`${periodo}-01`:`${anio}-01-01`;
  const fechaFin=tipo==='mes'
    ? new Date(anio,parseInt(document.getElementById('f-mes')?.value||'01'),0).toISOString().split('T')[0]
    : `${anio}-12-31`;
  const perIni=tipo==='mes'?periodo:`${anio}-01`;
  const perFin=tipo==='mes'?periodo:`${anio}-12`;

  const { facturas, compras: comprasIva, retenciones, pagos: pagosIva } = await ImpuestosAPI.getDatosIVA(empId,fechaIni,fechaFin);

  const compras = comprasIva;

  // retenciones already loaded above

  // pagosIva already loaded above

  // Armar filas según vista
  const periodos=tipo==='mes'
    ? [{mes:label,periodo,idx:parseInt(document.getElementById('f-mes')?.value||'1')-1}]
    : Array.from({length:12},(_,i)=>({mes:MESES[i],periodo:`${anio}-${String(i+1).padStart(2,'0')}`,idx:i}));

  const meses=periodos.map(({mes,periodo})=>{
    const facs=(facturas||[]).filter(f=>f.fecha_emision?.substring(0,7)===periodo&&f.tipo!=='NC');
    const ncs=(facturas||[]).filter(f=>f.fecha_emision?.substring(0,7)===periodo&&f.tipo==='NC');
    const debito=facs.reduce((s,f)=>s+Number(f.monto_iva||0),0)-ncs.reduce((s,f)=>s+Number(f.monto_iva||0),0);
    const credito=(compras||[]).filter(c=>c.fecha_egreso?.substring(0,7)===periodo).reduce((s,c)=>s+Number(c.monto||0)*0.21,0);
    const retenIva=(retenciones||[]).filter(r=>r.periodo===periodo).reduce((s,r)=>s+Number(r.monto||0),0);
    const pagado=(pagosIva||[]).filter(p=>p.periodo===periodo).reduce((s,p)=>s+Number(p.monto||0),0);
    const saldo=debito-credito-retenIva;
    return{mes,periodo,debito,credito,retenIva,saldo,pagado};
  });

  const totDebito=meses.reduce((s,m)=>s+m.debito,0);
  const totCredito=meses.reduce((s,m)=>s+m.credito,0);
  const totReten=meses.reduce((s,m)=>s+m.retenIva,0);
  const totSaldo=meses.reduce((s,m)=>s+m.saldo,0);
  const totPagado=meses.reduce((s,m)=>s+m.pagado,0);

  // KPIs anuales
  document.getElementById('contenido').innerHTML=`
    <div class="kpi-row">
      <div class="kpi-card red"><div class="kpi-label">IVA débito anual</div><div class="kpi-value">${fmt(totDebito)}</div></div>
      <div class="kpi-card green"><div class="kpi-label">IVA crédito anual</div><div class="kpi-value">${fmt(totCredito)}</div></div>
      <div class="kpi-card orange"><div class="kpi-label">Retenciones IVA</div><div class="kpi-value">${fmt(totReten)}</div></div>
      <div class="kpi-card ${totSaldo>0?'red':'green'}">
        <div class="kpi-label">Posición anual</div>
        <div class="kpi-value" style="color:${totSaldo>0?'var(--red)':'var(--green)'}">
          ${fmt(Math.abs(totSaldo))} ${totSaldo>0?'a pagar':'a favor'}
        </div>
      </div>
    </div>

    <div class="panel">
      <div class="panel-header"><h3>Posición IVA — ${label}</h3></div>
      <div style="overflow-x:auto"><table>
        <thead><tr>
          <th>Mes</th>
          <th style="text-align:right">IVA Débito</th>
          <th style="text-align:right">IVA Crédito</th>
          <th style="text-align:right">Ret. IVA</th>
          <th style="text-align:right">Saldo del mes</th>
          <th style="text-align:right">Pagado</th>
          <th style="text-align:right">Diferencia</th>
        </tr></thead>
        <tbody>
          ${meses.map(m=>{
            const dif=m.saldo-m.pagado;
            const hayDatos=m.debito>0||m.credito>0||m.retenIva>0;
            return`<tr style="${!hayDatos?'opacity:0.4':''}">
              <td style="font-weight:500">${m.mes}</td>
              <td class="mono" style="text-align:right;color:var(--red)">${m.debito?fmt(m.debito):'—'}</td>
              <td class="mono" style="text-align:right;color:var(--green)">${m.credito?fmt(m.credito):'—'}</td>
              <td class="mono" style="text-align:right;color:var(--orange)">${m.retenIva?fmt(m.retenIva):'—'}</td>
              <td class="mono" style="text-align:right;font-weight:600;color:${m.saldo>0?'var(--red)':m.saldo<0?'var(--green)':'var(--muted)'}">
                ${m.debito||m.credito||m.retenIva?(m.saldo>0?fmt(m.saldo)+' ▲':m.saldo<0?fmt(Math.abs(m.saldo))+' ▼ favor':'$0'):'—'}
              </td>
              <td class="mono" style="text-align:right">${m.pagado?fmt(m.pagado):'—'}</td>
              <td class="mono" style="text-align:right;color:${Math.abs(dif)<100?'var(--muted)':dif>0?'var(--red)':'var(--green)'}">
                ${m.saldo||m.pagado?(dif>100?fmt(dif)+' pendiente':dif<-100?fmt(Math.abs(dif))+' a favor':'✓'):'—'}
              </td>
            </tr>`;
          }).join('')}
          <tr class="mes-row-total">
            <td>TOTAL ${anio}</td>
            <td class="mono" style="text-align:right;color:var(--red)">${fmt(totDebito)}</td>
            <td class="mono" style="text-align:right;color:var(--green)">${fmt(totCredito)}</td>
            <td class="mono" style="text-align:right;color:var(--orange)">${fmt(totReten)}</td>
            <td class="mono" style="text-align:right;color:${totSaldo>0?'var(--red)':'var(--green)'}">
              ${totSaldo>0?fmt(totSaldo)+' ▲':fmt(Math.abs(totSaldo))+' ▼ favor'}
            </td>
            <td class="mono" style="text-align:right">${fmt(totPagado)}</td>
            <td class="mono" style="text-align:right"></td>
          </tr>
        </tbody>
      </table></div>
    </div>`;
}

// ===== POSICIÓN IIBB =====
async function cargarIIBB(){
  document.getElementById('contenido').innerHTML='<div class="spinner-wrap"><div class="spinner"></div>Calculando posición IIBB...</div>';
  const empId=document.getElementById('f-empresa').value;
  const {tipo,periodo:periodoSel,label}=getPeriodo();
  const anio=document.getElementById('f-anio').value;
  const fechaIni=tipo==='mes'?`${periodoSel}-01`:`${anio}-01-01`;
  const fechaFin=tipo==='mes'
    ? new Date(parseInt(anio),parseInt(document.getElementById('f-mes')?.value||'1'),0).toISOString().split('T')[0]
    : `${anio}-12-31`;
  const perIni=tipo==='mes'?periodoSel:`${anio}-01`;
  const perFin=tipo==='mes'?periodoSel:`${anio}-12`;

  const { facturas: facturasIIBB, retenciones: retIIBB2, pagos: pagosIIBB2 } = await ImpuestosAPI.getDatosIIBB(empId,fechaIni,fechaFin);
const facturas = facturasIIBB;

  const retIIBB = retIIBB2;

  const pagosIIBB = pagosIIBB2;

  const periodos=tipo==='mes'
    ? [{mes:label,periodo:periodoSel}]
    : Array.from({length:12},(_,i)=>({mes:MESES[i],periodo:`${anio}-${String(i+1).padStart(2,'0')}`}));

  const meses=periodos.map(({mes,periodo})=>{
    const facs=(facturas||[]).filter(f=>f.fecha_emision?.substring(0,7)===periodo&&f.tipo!=='NC');
    const ncs=(facturas||[]).filter(f=>f.fecha_emision?.substring(0,7)===periodo&&f.tipo==='NC');
    // Base imponible: suma de netos
    const base=facs.reduce((s,f)=>s+Number(f.monto_neto||0),0)-ncs.reduce((s,f)=>s+Number(f.monto_neto||0),0);
    // IIBB calculado: usa alícuota del cliente o 3.5% default
    const iibbCalc=facs.reduce((s,f)=>{
      const alic=Number(f.clientes?.alicuota_iibb||0.035);
      return s+Number(f.monto_neto||0)*alic;
    },0)-ncs.reduce((s,f)=>{
      const alicNC=Number(f.clientes?.alicuota_iibb||0.035);
      return s+Number(f.monto_neto||0)*alicNC;
    },0);
    const retIibb=(retIIBB||[]).filter(r=>r.periodo===periodo).reduce((s,r)=>s+Number(r.monto||0),0);
    const pagado=(pagosIIBB||[]).filter(p=>p.periodo===periodo).reduce((s,p)=>s+Number(p.monto||0),0);
    const saldo=iibbCalc-retIibb;
    return{mes,periodo,base,iibbCalc,retIibb,saldo,pagado};
  });

  const totBase=meses.reduce((s,m)=>s+m.base,0);
  const totCalc=meses.reduce((s,m)=>s+m.iibbCalc,0);
  const totRet=meses.reduce((s,m)=>s+m.retIibb,0);
  const totSaldo=meses.reduce((s,m)=>s+m.saldo,0);

  document.getElementById('contenido').innerHTML=`
    <div class="kpi-row">
      <div class="kpi-card blue"><div class="kpi-label">Base imponible anual</div><div class="kpi-value">${fmt(totBase)}</div></div>
      <div class="kpi-card red"><div class="kpi-label">IIBB calculado</div><div class="kpi-value">${fmt(totCalc)}</div></div>
      <div class="kpi-card orange"><div class="kpi-label">Retenciones IIBB</div><div class="kpi-value">${fmt(totRet)}</div></div>
      <div class="kpi-card ${totSaldo>0?'red':'green'}">
        <div class="kpi-label">Posición anual</div>
        <div class="kpi-value" style="color:${totSaldo>0?'var(--red)':'var(--green)'}">
          ${fmt(Math.abs(totSaldo))} ${totSaldo>0?'a pagar':'a favor'}
        </div>
      </div>
    </div>

    <div style="background:rgba(245,158,11,0.08);border:1px solid rgba(245,158,11,0.2);border-radius:8px;padding:10px 16px;margin-bottom:16px;font-size:12px;color:var(--orange)">
      ⚠ IIBB calculado con alícuota por cliente (default 3.5%). Configurá la alícuota de cada cliente en el módulo Empleados → Clientes.
    </div>

    <div class="panel">
      <div class="panel-header"><h3>Posición IIBB — ${label}</h3></div>
      <div style="overflow-x:auto"><table>
        <thead><tr>
          <th>Mes</th>
          <th style="text-align:right">Base imponible</th>
          <th style="text-align:right">IIBB calculado</th>
          <th style="text-align:right">Ret. IIBB</th>
          <th style="text-align:right">Saldo del mes</th>
          <th style="text-align:right">Pagado</th>
        </tr></thead>
        <tbody>
          ${meses.map(m=>`<tr style="${!m.base?'opacity:0.4':''}">
            <td style="font-weight:500">${m.mes}</td>
            <td class="mono" style="text-align:right">${m.base?fmt(m.base):'—'}</td>
            <td class="mono" style="text-align:right;color:var(--red)">${m.iibbCalc?fmt(m.iibbCalc):'—'}</td>
            <td class="mono" style="text-align:right;color:var(--orange)">${m.retIibb?fmt(m.retIibb):'—'}</td>
            <td class="mono" style="text-align:right;font-weight:600;color:${m.saldo>0?'var(--red)':m.saldo<0?'var(--green)':'var(--muted)'}">
              ${m.base?(m.saldo>0?fmt(m.saldo)+' ▲':m.saldo<0?fmt(Math.abs(m.saldo))+' ▼ favor':'$0'):'—'}
            </td>
            <td class="mono" style="text-align:right">${m.pagado?fmt(m.pagado):'—'}</td>
          </tr>`).join('')}
          <tr class="mes-row-total">
            <td>TOTAL ${anio}</td>
            <td class="mono" style="text-align:right">${fmt(totBase)}</td>
            <td class="mono" style="text-align:right;color:var(--red)">${fmt(totCalc)}</td>
            <td class="mono" style="text-align:right;color:var(--orange)">${fmt(totRet)}</td>
            <td class="mono" style="text-align:right;color:${totSaldo>0?'var(--red)':'var(--green)'}">
              ${totSaldo>0?fmt(totSaldo)+' ▲':fmt(Math.abs(totSaldo))+' ▼ favor'}
            </td>
            <td></td>
          </tr>
        </tbody>
      </table></div>
    </div>`;
}

async function guardarRetencion(){
  const monto=parseFloat(document.getElementById('nr-monto').value)||0;
  if(!monto){toast('Ingresá el monto.', 'warn');return;}
  let error;
  try{ await ImpuestosAPI.crearRetencion({
    empresa_id:document.getElementById('nr-empresa').value,
    cliente_id:document.getElementById('nr-cliente').value||null,
    tipo:document.getElementById('nr-tipo').value,
    periodo:document.getElementById('nr-periodo').value,
    fecha:document.getElementById('nr-fecha').value,
    monto,
    nro_certificado:document.getElementById('nr-cert').value||null,
  });
  }catch(e){error=e;}
  if(error){toast('Error: ', 'error');return;}
  cerrarModal('modal-ret');
  recargar();
}

  await ImpuestosAPI.eliminarRetencion(id);

// ===== IMPUESTOS VARIOS =====
const VARIOS_LABELS={
  anticipo_ganancias:'Anticipo Ganancias',
  sindicato:'Sindicato',
  ieric:'IERIC',
  autonomo_gerente:'Autónomo (Gerentes)',
  uocra:'UOCRA',
  sunsal:'SUNSAL',
  inssjp:'INSSJP / PAMI',
  obra_social:'Obra social',
  art:'ART',
  seguro_vida:'Seguro vida oblig.',
  otro:'Otro',
};

async function cargarVarios(){
  document.getElementById('contenido').innerHTML='<div class="spinner-wrap"><div class="spinner"></div>Cargando...</div>';
  const empId=document.getElementById('f-empresa').value;
  const {tipo,periodo:perSel,label}=getPeriodo();
  const anio=document.getElementById('f-anio').value;
  const perIni=tipo==='mes'?perSel:`${anio}-01`;
  const perFin=tipo==='mes'?perSel:`${anio}-12`;

  const data=await ImpuestosAPI.getImpuestosVarios({empresaId:empId});
  const rows=data||[];

  const total=rows.reduce((s,r)=>s+Number(r.monto||0),0);
  const pagados=rows.filter(r=>r.pagado).reduce((s,r)=>s+Number(r.monto||0),0);
  const pendientes=rows.filter(r=>!r.pagado).reduce((s,r)=>s+Number(r.monto||0),0);

  // Agrupar por tipo para resumen
  const porTipo={};
  rows.forEach(r=>{porTipo[r.tipo]=(porTipo[r.tipo]||0)+Number(r.monto||0);});

  document.getElementById('contenido').innerHTML=`
    <div class="kpi-row">
      <div class="kpi-card red"><div class="kpi-label">Total ${label}</div><div class="kpi-value">${fmt(total)}</div></div>
      <div class="kpi-card green"><div class="kpi-label">Pagados</div><div class="kpi-value">${fmt(pagados)}</div></div>
      <div class="kpi-card orange"><div class="kpi-label">Pendientes</div><div class="kpi-value">${fmt(pendientes)}</div></div>
      <div class="kpi-card blue"><div class="kpi-label">Registros</div><div class="kpi-value">${rows.length}</div></div>
    </div>
    ${Object.keys(porTipo).length?`
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px">
      ${Object.entries(porTipo).map(([k,v])=>`
        <div style="background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:8px 14px;font-size:12px">
          <span style="color:var(--muted)">${VARIOS_LABELS[k]||k}</span>
          <span style="font-family:'DM Mono',monospace;color:var(--text);margin-left:8px">${fmt(v)}</span>
        </div>`).join('')}
    </div>`:''}
    <div class="panel">
      <div class="panel-header">
        <h3>${rows.length} registros — ${label}</h3>
      </div>
      <div style="overflow-x:auto"><table>
        <thead><tr><th>Empresa</th><th>Fecha</th><th>Período</th><th>Tipo</th><th>Descripción</th><th>Comprobante</th><th>Monto</th><th>Estado</th><th></th></tr></thead>
        <tbody>${rows.length?rows.map(r=>`<tr>
          <td style="font-size:12px">${r.empresas?.nombre||'—'}</td>
          <td class="mono">${fmtF(r.fecha)}</td>
          <td class="mono">${r.periodo||'—'}</td>
          <td><span class="tag" style="background:var(--bg3);color:var(--muted)">${VARIOS_LABELS[r.tipo]||r.tipo}</span></td>
          <td style="font-size:12px">${r.descripcion||'—'}</td>
          <td class="mono" style="font-size:11px">${r.comprobante||'—'}</td>
          <td class="mono" style="color:var(--red)">${fmt(r.monto)}</td>
          <td>
            ${r.pagado
              ?'<span class="tag" style="background:rgba(16,185,129,0.15);color:var(--green)">Pagado</span>'
              :`<button class="btn btn-sm btn-ghost" onclick="pagarVarios('${r.id}')" style="font-size:11px">✓ Pagar</button>`}
          </td>
          <td><button class="btn btn-sm btn-danger" onclick="borrarVarios('${r.id}')">×</button></td>
        </tr>`).join(''):'<tr><td colspan="9" style="text-align:center;padding:32px;color:var(--muted)">Sin registros cargados para este período</td></tr>'}</tbody>
      </table></div>
    </div>`;
}

async function guardarVarios(){
  const monto=parseFloat(document.getElementById('nv-monto').value)||0;
  const desc=document.getElementById('nv-descripcion').value.trim();
  if(!monto||!desc){toast('Completá descripción y monto.', 'warn');return;}
  let error;
  try{ await ImpuestosAPI.registrarImpuestoVario({
    empresa_id:document.getElementById('nv-empresa').value,
    tipo:document.getElementById('nv-tipo').value,
    descripcion:desc,
    periodo:document.getElementById('nv-periodo').value,
    fecha:document.getElementById('nv-fecha').value,
    monto,
    pagado:document.getElementById('nv-pagado').value==='true',
    comprobante:document.getElementById('nv-comprobante').value||null,
  });
  }catch(e){error=e;}
  if(error){toast('Error: ', 'error');return;}
  cerrarModal('modal-varios');
  cargarVarios();
}

async function pagarVarios(id){
  await ImpuestosAPI.marcarPagadoVario(id);
  cargarVarios();
}

async function borrarVarios(id){
  if(!(await confirmar('¿Borrar este registro?'))) return;
  await ImpuestosAPI.eliminarImpuestoVario(id);
  cargarVarios();
}

function cerrarModal(id){document.getElementById(id).classList.remove('show');}

init();
