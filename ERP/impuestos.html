<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hidromec ERP — Impuestos</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
  :root{--bg:#0f1117;--bg2:#181c27;--bg3:#1e2436;--border:rgba(255,255,255,0.07);--text:#e8eaf0;--muted:#7a8099;--blue:#3b82f6;--green:#10b981;--red:#ef4444;--orange:#f59e0b;--purple:#8b5cf6;--teal:#14b8a6;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
  .sidebar{position:fixed;left:0;top:0;bottom:0;width:220px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:100;}
  .sidebar-logo{padding:24px 20px 20px;border-bottom:1px solid var(--border);}
  .sidebar-logo h1{font-size:16px;font-weight:600;}
  .sidebar-logo span{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;}
  .nav-section{padding:16px 12px 8px;font-size:10px;font-weight:500;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;}
  .nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;margin:1px 8px;border-radius:8px;font-size:13.5px;color:var(--muted);cursor:pointer;transition:all 0.15s;text-decoration:none;}
  .nav-item:hover{background:var(--bg3);color:var(--text);}
  .nav-item.active{background:rgba(59,130,246,0.15);color:var(--blue);}
  .nav-item svg{width:16px;height:16px;flex-shrink:0;}
  .nav-bottom{margin-top:auto;padding:16px 12px;border-top:1px solid var(--border);}
  .btn-logout{width:100%;padding:9px 12px;background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.2);border-radius:8px;color:var(--red);font-size:13px;font-family:'DM Sans',sans-serif;cursor:pointer;}
  .main{margin-left:220px;padding:28px 32px;}
  .page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px;}
  .page-header h2{font-size:22px;font-weight:600;}
  .tabs{display:flex;gap:4px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:4px;margin-bottom:24px;width:fit-content;flex-wrap:wrap;}
  .tab{padding:8px 16px;border-radius:7px;font-size:13px;cursor:pointer;color:var(--muted);transition:all 0.15s;border:none;background:none;font-family:'DM Sans',sans-serif;}
  .tab.active{background:var(--blue);color:#fff;}
  .tab:hover:not(.active){color:var(--text);}
  .filtros{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;align-items:center;}
  .filtros select,.filtros input{padding:8px 12px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;font-family:'DM Sans',sans-serif;outline:none;}
  .btn{padding:9px 18px;border-radius:8px;font-size:13px;font-weight:500;font-family:'DM Sans',sans-serif;cursor:pointer;border:none;transition:all 0.15s;}
  .btn-primary{background:var(--blue);color:#fff;}
  .btn-primary:hover{background:#2563eb;}
  .btn-ghost{background:var(--bg3);color:var(--text);border:1px solid var(--border);}
  .btn-ghost:hover{border-color:var(--blue);}
  .btn-danger{background:rgba(239,68,68,0.1);color:var(--red);border:1px solid rgba(239,68,68,0.2);}
  .btn-sm{padding:5px 12px;font-size:12px;}
  .panel{background:var(--bg2);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:20px;}
  .panel-header{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--bg3);}
  .panel-header h3{font-size:14px;font-weight:600;}
  table{width:100%;border-collapse:collapse;}
  th{padding:9px 14px;text-align:left;font-size:11px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:0.8px;border-bottom:1px solid var(--border);background:var(--bg3);}
  td{padding:10px 14px;font-size:13px;color:var(--text);border-bottom:1px solid var(--border);vertical-align:middle;}
  tr:last-child td{border-bottom:none;}
  tr:hover td{background:rgba(255,255,255,0.02);}
  .mono{font-family:'DM Mono',monospace;font-size:12px;}
  .saldo-pos{color:var(--red);}
  .saldo-neg{color:var(--green);}
  .saldo-cero{color:var(--muted);}
  .mes-row-total{background:var(--bg3);font-weight:600;}
  .tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;}
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:200;align-items:center;justify-content:center;}
  .modal-overlay.show{display:flex;}
  .modal{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:32px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;}
  .modal h3{font-size:18px;font-weight:600;margin-bottom:20px;}
  .form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px;}
  .form-row.full{grid-template-columns:1fr;}
  .form-group{display:flex;flex-direction:column;gap:6px;}
  label{font-size:11.5px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:0.7px;}
  input,select,textarea{padding:10px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13.5px;font-family:'DM Sans',sans-serif;outline:none;transition:border-color 0.15s;}
  input:focus,select:focus{border-color:var(--blue);}
  .modal-footer{display:flex;justify-content:flex-end;gap:10px;margin-top:24px;padding-top:20px;border-top:1px solid var(--border);}
  .kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px;}
  .kpi-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:16px 20px;position:relative;overflow:hidden;}
  .kpi-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;}
  .kpi-card.blue::before{background:var(--blue);}
  .kpi-card.green::before{background:var(--green);}
  .kpi-card.red::before{background:var(--red);}
  .kpi-card.orange::before{background:var(--orange);}
  .kpi-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:6px;}
  .kpi-value{font-size:18px;font-weight:600;font-family:'DM Mono',monospace;}
  .spinner-wrap{display:flex;align-items:center;justify-content:center;padding:40px;color:var(--muted);}
  .spinner{width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin 0.8s linear infinite;margin-right:10px;}
  @keyframes spin{to{transform:rotate(360deg);}}
  @media(max-width:768px){.main{margin-left:0;padding:16px;}.kpi-row{grid-template-columns:repeat(2,1fr);}  .form-row{grid-template-columns:1fr;}}
</style>
</head>

<script>
// DB inicializado en erp-utils.js
// fmt inicializado en erp-utils.js
// fmtF inicializado en erp-utils.js
// hoy inicializado en erp-utils.js
const MESES=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
let tabActual='iva';

async function init(){
  const usuario = await getUsuario();
  if (!usuario) return;
  await verificarAcceso('impuestos');
  // Poblar años
  const anioSel=document.getElementById('f-anio');
  const anioActual=new Date().getFullYear();
  for(let a=anioActual;a>=2023;a--){
    const opt=document.createElement('option');
    opt.value=a;opt.textContent=a;
    anioSel.appendChild(opt);
  }
  // Setear mes actual
  const mesActual=String(new Date().getMonth()+1).padStart(2,'0');
  document.getElementById('f-mes').value=mesActual;
  document.getElementById('f-mes').style.display=''; // vista mensual por default
  document.getElementById('nr-periodo').value=new Date().toISOString().substring(0,7);
  document.getElementById('np-periodo').value=new Date().toISOString().substring(0,7);
  document.getElementById('nr-fecha').value=hoy();
  document.getElementById('np-fecha').value=hoy();
  await cargarClientesRet();
  recargar();
}

function cambiarTab(tab,btn){
  tabActual=tab;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  const btnNuevo=document.getElementById('btn-nuevo');
  btnNuevo.textContent=tab==='pagos'?'+ Registrar pago':'+ Cargar retención';
  recargar();
}

function abrirNuevo(){
  if(tabActual==='pagos') document.getElementById('modal-pago').classList.add('show');
  else document.getElementById('modal-ret').classList.add('show');
}

function toggleVista(){
  const vista=document.getElementById('f-vista').value;
  document.getElementById('f-mes').style.display=vista==='mensual'?'':'none';
  recargar();
}

function getPeriodo(){
  const anio=document.getElementById('f-anio').value;
  const vista=document.getElementById('f-vista').value;
  if(vista==='mensual'){
    const mes=document.getElementById('f-mes').value;
    return{tipo:'mes',periodo:`${anio}-${mes}`,label:new Date(`${anio}-${mes}-01`).toLocaleDateString('es-AR',{month:'long',year:'numeric'})};
  }
  return{tipo:'anio',periodo:anio,label:anio};
}

function recargar(){
  if(tabActual==='iva') cargarIVA();
  else if(tabActual==='iibb') cargarIIBB();
  else if(tabActual==='retenciones') cargarRetenciones();
  else cargarPagos();
}

// ===== POSICIÓN IVA =====
async function cargarIVA(){
  document.getElementById('contenido').innerHTML='<div class="spinner-wrap"><div class="spinner"></div>Calculando posición IVA...</div>';
  const empId=document.getElementById('f-empresa').value;
  const {tipo,periodo,label}=getPeriodo();
  const anio=document.getElementById('f-anio').value;
  const fechaIni=tipo==='mes'?`${periodo}-01`:`${anio}-01-01`;
  const fechaFin=tipo==='mes'
    ? new Date(anio,parseInt(document.getElementById('f-mes')?.value||'01'),0).toISOString().split('T')[0]
    : `${anio}-12-31`;
  const perIni=tipo==='mes'?periodo:`${anio}-01`;
  const perFin=tipo==='mes'?periodo:`${anio}-12`;

  const {data:facturas}=await db.from('facturas_emitidas')
    .select('monto_neto,monto_iva,fecha_emision,tipo')
    .eq('empresa_id',empId)
    .gte('fecha_emision',fechaIni)
    .lte('fecha_emision',fechaFin)
    .neq('estado','anulada');

  const {data:compras}=await db.from('egresos')
    .select('monto,fecha_egreso')
    .eq('empresa_id',empId)
    .not('numero_factura','is',null)
    .gte('fecha_egreso',fechaIni)
    .lte('fecha_egreso',fechaFin);

  const {data:retenciones}=await db.from('retenciones')
    .select('monto,periodo')
    .eq('empresa_id',empId)
    .eq('tipo','iva')
    .gte('periodo',perIni)
    .lte('periodo',perFin);

  const {data:pagosIva}=await db.from('pagos_impuestos')
    .select('monto,periodo')
    .eq('empresa_id',empId)
    .eq('tipo','iva')
    .gte('periodo',perIni)
    .lte('periodo',perFin);

  // Armar filas según vista
  const periodos=tipo==='mes'
    ? [{mes:label,periodo,idx:parseInt(document.getElementById('f-mes')?.value||'1')-1}]
    : Array.from({length:12},(_,i)=>({mes:MESES[i],periodo:`${anio}-${String(i+1).padStart(2,'0')}`,idx:i}));

  const meses=periodos.map(({mes,periodo})=>{
    const facs=(facturas||[]).filter(f=>f.fecha_emision?.substring(0,7)===periodo&&f.tipo!=='NC');
    const ncs=(facturas||[]).filter(f=>f.fecha_emision?.substring(0,7)===periodo&&f.tipo==='NC');
    const debito=facs.reduce((s,f)=>s+Number(f.monto_iva||0),0)-ncs.reduce((s,f)=>s+Number(f.monto_iva||0),0);
    const credito=(compras||[]).filter(c=>c.fecha_egreso?.substring(0,7)===periodo).reduce((s,c)=>s+Number(c.monto||0)*0.21,0);
    const retenIva=(retenciones||[]).filter(r=>r.periodo===periodo).reduce((s,r)=>s+Number(r.monto||0),0);
    const pagado=(pagosIva||[]).filter(p=>p.periodo===periodo).reduce((s,p)=>s+Number(p.monto||0),0);
    const saldo=debito-credito-retenIva;
    return{mes,periodo,debito,credito,retenIva,saldo,pagado};
  });

  const totDebito=meses.reduce((s,m)=>s+m.debito,0);
  const totCredito=meses.reduce((s,m)=>s+m.credito,0);
  const totReten=meses.reduce((s,m)=>s+m.retenIva,0);
  const totSaldo=meses.reduce((s,m)=>s+m.saldo,0);
  const totPagado=meses.reduce((s,m)=>s+m.pagado,0);

  // KPIs anuales
  document.getElementById('contenido').innerHTML=`
    <div class="kpi-row">
      <div class="kpi-card red"><div class="kpi-label">IVA débito anual</div><div class="kpi-value">${fmt(totDebito)}</div></div>
      <div class="kpi-card green"><div class="kpi-label">IVA crédito anual</div><div class="kpi-value">${fmt(totCredito)}</div></div>
      <div class="kpi-card orange"><div class="kpi-label">Retenciones IVA</div><div class="kpi-value">${fmt(totReten)}</div></div>
      <div class="kpi-card ${totSaldo>0?'red':'green'}">
        <div class="kpi-label">Posición anual</div>
        <div class="kpi-value" style="color:${totSaldo>0?'var(--red)':'var(--green)'}">
          ${fmt(Math.abs(totSaldo))} ${totSaldo>0?'a pagar':'a favor'}
        </div>
      </div>
    </div>

    <div class="panel">
      <div class="panel-header"><h3>Posición IVA — ${label}</h3></div>
      <div style="overflow-x:auto"><table>
        <thead><tr>
          <th>Mes</th>
          <th style="text-align:right">IVA Débito</th>
          <th style="text-align:right">IVA Crédito</th>
          <th style="text-align:right">Ret. IVA</th>
          <th style="text-align:right">Saldo del mes</th>
          <th style="text-align:right">Pagado</th>
          <th style="text-align:right">Diferencia</th>
        </tr></thead>
        <tbody>
          ${meses.map(m=>{
            const dif=m.saldo-m.pagado;
            const hayDatos=m.debito>0||m.credito>0||m.retenIva>0;
            return`<tr style="${!hayDatos?'opacity:0.4':''}">
              <td style="font-weight:500">${m.mes}</td>
              <td class="mono" style="text-align:right;color:var(--red)">${m.debito?fmt(m.debito):'—'}</td>
              <td class="mono" style="text-align:right;color:var(--green)">${m.credito?fmt(m.credito):'—'}</td>
              <td class="mono" style="text-align:right;color:var(--orange)">${m.retenIva?fmt(m.retenIva):'—'}</td>
              <td class="mono" style="text-align:right;font-weight:600;color:${m.saldo>0?'var(--red)':m.saldo<0?'var(--green)':'var(--muted)'}">
                ${m.debito||m.credito||m.retenIva?(m.saldo>0?fmt(m.saldo)+' ▲':m.saldo<0?fmt(Math.abs(m.saldo))+' ▼ favor':'$0'):'—'}
              </td>
              <td class="mono" style="text-align:right">${m.pagado?fmt(m.pagado):'—'}</td>
              <td class="mono" style="text-align:right;color:${Math.abs(dif)<100?'var(--muted)':dif>0?'var(--red)':'var(--green)'}">
                ${m.saldo||m.pagado?(dif>100?fmt(dif)+' pendiente':dif<-100?fmt(Math.abs(dif))+' a favor':'✓'):'—'}
              </td>
            </tr>`;
          }).join('')}
          <tr class="mes-row-total">
            <td>TOTAL ${anio}</td>
            <td class="mono" style="text-align:right;color:var(--red)">${fmt(totDebito)}</td>
            <td class="mono" style="text-align:right;color:var(--green)">${fmt(totCredito)}</td>
            <td class="mono" style="text-align:right;color:var(--orange)">${fmt(totReten)}</td>
            <td class="mono" style="text-align:right;color:${totSaldo>0?'var(--red)':'var(--green)'}">
              ${totSaldo>0?fmt(totSaldo)+' ▲':fmt(Math.abs(totSaldo))+' ▼ favor'}
            </td>
            <td class="mono" style="text-align:right">${fmt(totPagado)}</td>
            <td class="mono" style="text-align:right"></td>
          </tr>
        </tbody>
      </table></div>
    </div>`;
}

// ===== POSICIÓN IIBB =====
async function cargarIIBB(){
  document.getElementById('contenido').innerHTML='<div class="spinner-wrap"><div class="spinner"></div>Calculando posición IIBB...</div>';
  const empId=document.getElementById('f-empresa').value;
  const {tipo,periodo:periodoSel,label}=getPeriodo();
  const anio=document.getElementById('f-anio').value;
  const fechaIni=tipo==='mes'?`${periodoSel}-01`:`${anio}-01-01`;
  const fechaFin=tipo==='mes'
    ? new Date(parseInt(anio),parseInt(document.getElementById('f-mes')?.value||'1'),0).toISOString().split('T')[0]
    : `${anio}-12-31`;
  const perIni=tipo==='mes'?periodoSel:`${anio}-01`;
  const perFin=tipo==='mes'?periodoSel:`${anio}-12`;

  const {data:facturas}=await db.from('facturas_emitidas')
    .select('monto_neto,fecha_emision,tipo,cliente_id,clientes(nombre,alicuota_iibb)')
    .eq('empresa_id',empId)
    .gte('fecha_emision',fechaIni)
    .lte('fecha_emision',fechaFin)
    .neq('estado','anulada');

  const {data:retIIBB}=await db.from('retenciones')
    .select('monto,periodo')
    .eq('empresa_id',empId)
    .eq('tipo','iibb')
    .gte('periodo',perIni)
    .lte('periodo',perFin);

  const {data:pagosIIBB}=await db.from('pagos_impuestos')
    .select('monto,periodo')
    .eq('empresa_id',empId)
    .eq('tipo','iibb')
    .gte('periodo',perIni)
    .lte('periodo',perFin);

  const periodos=tipo==='mes'
    ? [{mes:label,periodo:periodoSel}]
    : Array.from({length:12},(_,i)=>({mes:MESES[i],periodo:`${anio}-${String(i+1).padStart(2,'0')}`}));

  const meses=periodos.map(({mes,periodo})=>{
    const facs=(facturas||[]).filter(f=>f.fecha_emision?.substring(0,7)===periodo&&f.tipo!=='NC');
    const ncs=(facturas||[]).filter(f=>f.fecha_emision?.substring(0,7)===periodo&&f.tipo==='NC');
    // Base imponible: suma de netos
    const base=facs.reduce((s,f)=>s+Number(f.monto_neto||0),0)-ncs.reduce((s,f)=>s+Number(f.monto_neto||0),0);
    // IIBB calculado: usa alícuota del cliente o 3.5% default
    const iibbCalc=facs.reduce((s,f)=>{
      const alic=Number(f.clientes?.alicuota_iibb||0.035);
      return s+Number(f.monto_neto||0)*alic;
    },0)-ncs.reduce((s,f)=>{
      const alicNC=Number(f.clientes?.alicuota_iibb||0.035);
      return s+Number(f.monto_neto||0)*alicNC;
    },0);
    const retIibb=(retIIBB||[]).filter(r=>r.periodo===periodo).reduce((s,r)=>s+Number(r.monto||0),0);
    const pagado=(pagosIIBB||[]).filter(p=>p.periodo===periodo).reduce((s,p)=>s+Number(p.monto||0),0);
    const saldo=iibbCalc-retIibb;
    return{mes,periodo,base,iibbCalc,retIibb,saldo,pagado};
  });

  const totBase=meses.reduce((s,m)=>s+m.base,0);
  const totCalc=meses.reduce((s,m)=>s+m.iibbCalc,0);
  const totRet=meses.reduce((s,m)=>s+m.retIibb,0);
  const totSaldo=meses.reduce((s,m)=>s+m.saldo,0);

  document.getElementById('contenido').innerHTML=`
    <div class="kpi-row">
      <div class="kpi-card blue"><div class="kpi-label">Base imponible anual</div><div class="kpi-value">${fmt(totBase)}</div></div>
      <div class="kpi-card red"><div class="kpi-label">IIBB calculado</div><div class="kpi-value">${fmt(totCalc)}</div></div>
      <div class="kpi-card orange"><div class="kpi-label">Retenciones IIBB</div><div class="kpi-value">${fmt(totRet)}</div></div>
      <div class="kpi-card ${totSaldo>0?'red':'green'}">
        <div class="kpi-label">Posición anual</div>
        <div class="kpi-value" style="color:${totSaldo>0?'var(--red)':'var(--green)'}">
          ${fmt(Math.abs(totSaldo))} ${totSaldo>0?'a pagar':'a favor'}
        </div>
      </div>
    </div>

    <div style="background:rgba(245,158,11,0.08);border:1px solid rgba(245,158,11,0.2);border-radius:8px;padding:10px 16px;margin-bottom:16px;font-size:12px;color:var(--orange)">
      ⚠ IIBB calculado con alícuota por cliente (default 3.5%). Configurá la alícuota de cada cliente en el módulo Empleados → Clientes.
    </div>

    <div class="panel">
      <div class="panel-header"><h3>Posición IIBB — ${label}</h3></div>
      <div style="overflow-x:auto"><table>
        <thead><tr>
          <th>Mes</th>
          <th style="text-align:right">Base imponible</th>
          <th style="text-align:right">IIBB calculado</th>
          <th style="text-align:right">Ret. IIBB</th>
          <th style="text-align:right">Saldo del mes</th>
          <th style="text-align:right">Pagado</th>
        </tr></thead>
        <tbody>
          ${meses.map(m=>`<tr style="${!m.base?'opacity:0.4':''}">
            <td style="font-weight:500">${m.mes}</td>
            <td class="mono" style="text-align:right">${m.base?fmt(m.base):'—'}</td>
            <td class="mono" style="text-align:right;color:var(--red)">${m.iibbCalc?fmt(m.iibbCalc):'—'}</td>
            <td class="mono" style="text-align:right;color:var(--orange)">${m.retIibb?fmt(m.retIibb):'—'}</td>
            <td class="mono" style="text-align:right;font-weight:600;color:${m.saldo>0?'var(--red)':m.saldo<0?'var(--green)':'var(--muted)'}">
              ${m.base?(m.saldo>0?fmt(m.saldo)+' ▲':m.saldo<0?fmt(Math.abs(m.saldo))+' ▼ favor':'$0'):'—'}
            </td>
            <td class="mono" style="text-align:right">${m.pagado?fmt(m.pagado):'—'}</td>
          </tr>`).join('')}
          <tr class="mes-row-total">
            <td>TOTAL ${anio}</td>
            <td class="mono" style="text-align:right">${fmt(totBase)}</td>
            <td class="mono" style="text-align:right;color:var(--red)">${fmt(totCalc)}</td>
            <td class="mono" style="text-align:right;color:var(--orange)">${fmt(totRet)}</td>
            <td class="mono" style="text-align:right;color:${totSaldo>0?'var(--red)':'var(--green)'}">
              ${totSaldo>0?fmt(totSaldo)+' ▲':fmt(Math.abs(totSaldo))+' ▼ favor'}
            </td>
            <td></td>
          </tr>
        </tbody>
      </table></div>
    </div>`;
}

async function guardarRetencion(){
  const monto=parseFloat(document.getElementById('nr-monto').value)||0;
  if(!monto){alert('Ingresá el monto.');return;}
  const {error}=await db.from('retenciones').insert({
    empresa_id:document.getElementById('nr-empresa').value,
    cliente_id:document.getElementById('nr-cliente').value||null,
    tipo:document.getElementById('nr-tipo').value,
    periodo:document.getElementById('nr-periodo').value,
    fecha:document.getElementById('nr-fecha').value,
    monto,
    nro_certificado:document.getElementById('nr-cert').value||null,
  });
  if(error){alert('Error: '+error.message);return;}
  cerrarModal('modal-ret');
  recargar();
}

async function borrarRetencion(id){
  if(!confirm('¿Borrar esta retención?')) return;
  await db.from('retenciones').delete().eq('id',id);
  cargarRetenciones();
}

  document.getElementById('np-vep').value='';
  document.getElementById('np-obs').value='IIBB '+label;
  toggleSocio();
  document.getElementById('modal-pago').classList.add('show');
}

function exportarModulo(){
  const filas=document.querySelectorAll('#contenido table tbody tr');
  if(!filas.length){alert('No hay datos para exportar.');return;}
  // Recolectar headers
  const ths=document.querySelectorAll('#contenido table thead th');
  const headers=[...ths].map(t=>t.textContent.trim()).filter(h=>h&&h!=='');
  // Recolectar filas
  const rows=[];
  filas.forEach(tr=>{
    const tds=[...tr.querySelectorAll('td')].map(td=>td.textContent.trim().replace(/\n/g,' '));
    if(tds.some(v=>v)) rows.push(tds.slice(0,headers.length));
  });
  if(!rows.length){alert('No hay datos para exportar.');return;}
  let csv=headers.join(',')+'\n';
  rows.forEach(r=>{csv+=r.map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(',')+'\n';});
  const blob=new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download='Retenciones_'+new Date().toISOString().split('T')[0]+'.csv';a.click();URL.revokeObjectURL(url);
}

function cerrarModal(id){document.getElementById(id).classList.remove('show');}
async function logout(){await db.auth.signOut();window.location.href='login.html';}

init();
</script>
