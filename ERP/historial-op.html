<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Órdenes de Pago — Hidromec ERP</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
<link rel="stylesheet" href="erp-layout.css">
<style>
  .tag-metodo {
    display: inline-block; padding: 2px 8px; border-radius: 4px;
    font-size: 11px; font-weight: 500;
    background: rgba(59,130,246,0.1); color: var(--blue);
  }
</style>
</head>
<body>

<div id="overlay" class="overlay" onclick="ERP.closeSidebar()"></div>
<div id="sidebar-root"></div>

<div class="main">
  <div class="page-header">
    <h2>📋 Órdenes de Pago</h2>
    <span id="badge-total" style="background:rgba(59,130,246,0.15);color:var(--blue);padding:4px 12px;border-radius:20px;font-size:12px;font-weight:500">—</span>
  </div>

  <div class="filtros">
    <input type="text" id="filtro-buscar" placeholder="Buscar proveedor, N° orden..." oninput="filtrar()" style="min-width:220px">
    <select id="filtro-empresa" onchange="filtrar()">
      <option value="">Todas las empresas</option>
    </select>
    <select id="filtro-metodo" onchange="filtrar()">
      <option value="">Todos los métodos</option>
      <option value="transferencia">Transferencia</option>
      <option value="cheque">Cheque</option>
      <option value="efectivo">Efectivo</option>
    </select>
    <input type="date" id="filtro-desde" onchange="filtrar()">
    <input type="date" id="filtro-hasta" onchange="filtrar()">
  </div>

  <div class="panel">
    <div id="contenido">
      <div class="spinner-wrap"><div class="spinner"></div>Cargando órdenes de pago...</div>
    </div>
  </div>
</div>

<script src="erp-utils.js"></script>
<script src="erp-sidebar.js"></script>
<script src="empresas.api.js"></script>
<script>
let todosLosRows = [];

async function init() {
  await ERP.initLayout('historial-op');
  await cargarEmpresas();
  await cargarHistorial();
}

async function cargarEmpresas() {
  const { data } = await db.from('empresas').select('id,nombre').eq('activa', true).order('nombre');
  const sel = document.getElementById('filtro-empresa');
  (data||[]).forEach(e => {
    const opt = document.createElement('option');
    opt.value = e.id; opt.textContent = e.nombre;
    sel.appendChild(opt);
  });
}

async function cargarHistorial() {
  document.getElementById('contenido').innerHTML =
    '<div class="spinner-wrap"><div class="spinner"></div>Cargando...</div>';
  try {
    const { data, error } = await db.from('egresos')
      .select('*,proveedores(nombre,cuit),empresas(nombre,cuit)')
      .eq('pagado', true)
      .not('orden_pago_nro', 'is', null)
      .order('orden_pago_at', { ascending: false })
      .limit(500);
    if (error) throw error;
    todosLosRows = data || [];
    filtrar();
  } catch(e) {
    manejarError(e, 'cargar órdenes de pago');
    document.getElementById('contenido').innerHTML =
      '<div class="empty" style="color:var(--red)">Error al cargar datos.</div>';
  }
}

function filtrar() {
  const buscar = document.getElementById('filtro-buscar').value.toLowerCase();
  const empresa = document.getElementById('filtro-empresa').value;
  const metodo = document.getElementById('filtro-metodo').value;
  const desde = document.getElementById('filtro-desde').value;
  const hasta = document.getElementById('filtro-hasta').value;

  let rows = todosLosRows.filter(r => {
    if (empresa && r.empresa_id !== empresa) return false;
    if (metodo && r.metodo_pago !== metodo) return false;
    if (desde && r.fecha_pago_real < desde) return false;
    if (hasta && r.fecha_pago_real > hasta) return false;
    if (buscar) {
      const hay = (r.orden_pago_nro||'').toLowerCase().includes(buscar) ||
                  (r.proveedores?.nombre||'').toLowerCase().includes(buscar) ||
                  (r.descripcion||'').toLowerCase().includes(buscar);
      if (!hay) return false;
    }
    return true;
  });

  // ── Agrupar por orden_pago_nro ───────────────────────────
  // Normalizar: OP-001-2026 y OP-0001-2026 son el mismo número
  function normalizarNroOP(nro) {
    if (!nro) return nro;
    return nro.replace(/OP-0*(\d+)-/i, (m, n) => 'OP-' + n.padStart(4, '0') + '-');
  }
  const grupos = {};
  rows.forEach(r => {
    const key = normalizarNroOP(r.orden_pago_nro) || r.id; // si no tiene nro OP, cada uno es su propio grupo
    if (!grupos[key]) {
      grupos[key] = {
        orden_pago_nro: normalizarNroOP(r.orden_pago_nro)||r.orden_pago_nro,
        fecha_pago_real: r.fecha_pago_real,
        empresa_id: r.empresa_id,
        empresas: r.empresas,
        metodo_pago: r.metodo_pago,
        orden_pago_pdf_url: r.orden_pago_pdf_url,
        total: 0,
        items: [],
        primer_id: r.id,
      };
    }
    grupos[key].total += Number(r.monto||0);
    grupos[key].items.push(r);
  });

  const ops = Object.values(grupos).sort((a,b) =>
    (b.fecha_pago_real||'').localeCompare(a.fecha_pago_real||''));

  const total = ops.reduce((s,g) => s + g.total, 0);
  document.getElementById('badge-total').textContent =
    ops.length + ' órdenes — ' + fmt(total);

  if (!ops.length) {
    document.getElementById('contenido').innerHTML =
      '<div class="empty">Sin órdenes de pago para los filtros seleccionados.</div>';
    return;
  }

  document.getElementById('contenido').innerHTML = `
    <div style="overflow-x:auto"><table>
      <thead><tr>
        <th>N° Orden</th><th>Fecha</th><th>Empresa</th>
        <th>Proveedores / Facturas</th><th>Método</th>
        <th>Total</th><th>PDF</th>
      </tr></thead>
      <tbody>${ops.map(g => {
        const proveedores = [...new Set(g.items.map(r => r.proveedores?.nombre||'Sin proveedor'))];
        const facturas = g.items.map(r => r.numero_factura||'s/n').filter(Boolean);
        return `<tr>
          <td class="mono" style="font-weight:600;color:var(--blue)">${g.orden_pago_nro||'—'}</td>
          <td class="mono">${g.fecha_pago_real ? fmtF(g.fecha_pago_real) : '—'}</td>
          <td style="font-size:12px">${g.empresas?.nombre||'—'}</td>
          <td>
            ${proveedores.map(p => `<div style="font-size:13px">${p}</div>`).join('')}
            ${g.items.length > 1
              ? `<div style="font-size:11px;color:var(--muted);margin-top:2px">${g.items.length} facturas · Fac: ${facturas.slice(0,3).join(', ')}${facturas.length>3?'…':''}</div>`
              : `<div style="font-size:11px;color:var(--muted)">${g.items[0]?.descripcion||''}</div>`
            }
          </td>
          <td><span class="tag-metodo">${g.metodo_pago||'—'}</span></td>
          <td class="mono" style="font-weight:600;color:var(--green)">${fmt(g.total)}</td>
          <td>
            ${g.orden_pago_pdf_url
              ? `<a href="${g.orden_pago_pdf_url}" target="_blank" class="btn btn-sm btn-ghost">📄 Ver</a>`
              : `<button class="btn btn-sm btn-ghost" onclick="descargarOrdenPagoAgrupada('${g.primer_id}','${g.orden_pago_nro||''}')">⬇ PDF</button>`
            }
          </td>
        </tr>`;
      }).join('')}
      </tbody>
    </table></div>`;
}

async function descargarOrdenPagoAgrupada(primerId, nroOrden){
  // Cargar todos los egresos con el mismo orden_pago_nro
  let rows = [];
  if (nroOrden) {
    const { data } = await db.from('egresos')
      .select('*,proveedores(nombre,cuit),empresas(nombre,cuit)')
      .eq('orden_pago_nro', nroOrden);
    rows = data || [];
  }
  if (!rows.length) {
    const { data } = await db.from('egresos')
      .select('*,proveedores(nombre,cuit),empresas(nombre,cuit)')
      .eq('id', primerId).single();
    if (data) rows = [data];
  }
  if (!rows.length) { toast('No se pudieron cargar los datos.','error'); return; }

  const eg = rows[0];
  const fecha = eg.fecha_pago_real || new Date().toISOString().split('T')[0];
  const metodo = eg.metodo_pago || '—';
  const u = await getUsuario();

  // Cargar líneas de pago (cheques, transferencias, etc.)
  // Para OP agrupada, las líneas están en el primer egreso (el que las registró)
  let lineas = [];
  try {
    const egresoIdParaLineas = primerId || rows[0]?.id;
    if (egresoIdParaLineas) {
      const { data: _l, error: _le } = await db.from('egresos_pagos_detalle')
        .select('*')
        .eq('egreso_id', egresoIdParaLineas)
        .order('created_at');
      if (!_le && _l) lineas = _l;
    }
  } catch(e) { console.warn('egresos_pagos_detalle no disponible:', e); }

  if (rows.length === 1) {
    generarPDFOrden(eg, eg.orden_pago_nro||'OP-???', fecha, metodo, u?.email||'', lineas);
  } else {
    generarPDFOrdenAgrupada(rows, nroOrden, fecha, metodo, u?.email||'', lineas);
  }
}

function generarPDFOrdenAgrupada(rows, nro, fecha, metodo, operador, lineas=[]) {
  if(!window.jspdf||!window.jspdf.jsPDF){ toast('jsPDF no cargado','error'); return; }
  const {jsPDF} = window.jspdf;
  const doc = new jsPDF({format:'a4', unit:'mm'});

  const logoB64 = (empresa||'').toLowerCase().includes('placemem') ? LOGO_PLACEMEM_B64 : LOGO_HIDROMEC_B64;
  const fmtM = v => new Intl.NumberFormat('es-AR',{style:'currency',currency:'ARS',maximumFractionDigits:0}).format(v||0);
  const fmtD = d => d ? new Date(d+'T12:00:00').toLocaleDateString('es-AR') : '—';

  const L=10, R=200, W=190, midX=105, T=8;
  const total = rows.reduce((s,r) => s+Number(r.monto||0), 0);
  const empresa = rows[0]?.empresas?.nombre || 'Hidromec S.R.L.';
  const empresaCuit = rows[0]?.empresas?.cuit || '30-71163249-9';
  const metodoLabel = {'transferencia':'Transferencia','cheques':'Cheques','echeq':'E-Cheq','efectivo':'Efectivo','otro':'Otro'}[metodo]||metodo;

  // ── BORDE DOBLE
  doc.setDrawColor(0,0,0); doc.setLineWidth(0.8); doc.rect(L,T,W,275);
  doc.setLineWidth(0.3); doc.rect(L+1,T+1,W-2,273);

  // ── HEADER — fondo gris
  doc.setFillColor(245,245,245); doc.rect(L+1,T+1,W-2,42,'F');

  // Logo
  try { doc.addImage('data:image/jpeg;base64,'+logoB64,'JPEG',L+3,T+3,55,22); }
  catch(e) { doc.setFontSize(14); doc.setFont('helvetica','bold'); doc.text('HIDROMEC S.R.L.',L+5,T+15); }

  // Datos empresa izquierda
  doc.setFontSize(7.5); doc.setFont('helvetica','normal'); doc.setTextColor(80,80,80);
  doc.text('Colectora Oeste 1525 - Zárate - Bs.As.',L+4,T+28);
  doc.text('Tel: 03487-456419',L+4,T+33);
  doc.text('administracion@hidromecsrl.com.ar',L+4,T+38);

  // Línea divisoria vertical
  doc.setDrawColor(180,180,180); doc.setLineWidth(0.3);
  doc.line(midX-15,T+1,midX-15,T+43);

  // Título central
  doc.setDrawColor(0,0,0); doc.setLineWidth(0.8);
  doc.setFontSize(18); doc.setFont('helvetica','bold'); doc.setTextColor(0,0,0);
  doc.text('ORDEN DE PAGO',midX+15,T+14,{align:'center'});
  doc.setFontSize(13); doc.setFont('helvetica','normal');
  doc.text(nro,midX+15,T+23,{align:'center'});
  doc.setFontSize(10);
  doc.text('Fecha: '+fmtD(fecha),midX+15,T+31,{align:'center'});

  // Datos empresa derecha
  doc.setFontSize(7.5); doc.setTextColor(60,60,60);
  doc.text('C.U.I.T.: '+empresaCuit,R-5,T+16,{align:'right'});
  doc.setFontSize(8); doc.setFont('helvetica','bold'); doc.setTextColor(0,0,0);
  doc.text(empresa,R-5,T+38,{align:'right'});
  doc.setFontSize(9); doc.setFont('helvetica','bold'); doc.setTextColor(100,100,100);
  doc.text('ORIGINAL',R-5,T+6,{align:'right'});

  // ── SEPARADOR MÉTODO
  doc.setDrawColor(0,0,0); doc.setLineWidth(0.5);
  doc.line(L+1,T+43,R-1,T+43);
  doc.setFillColor(250,250,250); doc.rect(L+1,T+43,W-2,10,'F');
  doc.setFontSize(8); doc.setFont('helvetica','bold'); doc.setTextColor(0,0,0);
  doc.text('MÉTODO DE PAGO:',L+4,T+50);
  doc.setFont('helvetica','normal'); doc.setFontSize(9);
  doc.text(metodoLabel.toUpperCase(),L+40,T+50);
  doc.setFont('helvetica','bold'); doc.setFontSize(8);
  doc.text('OPERADOR:',midX,T+50);
  doc.setFont('helvetica','normal');
  doc.text(operador,midX+22,T+50);

  // ── TÍTULO DETALLE
  const yD = T+53;
  doc.setDrawColor(0,0,0); doc.setLineWidth(0.5);
  doc.line(L+1,yD,R-1,yD);
  doc.setFillColor(230,230,230); doc.rect(L+1,yD,W-2,8,'F');
  doc.setFontSize(10); doc.setFont('helvetica','bold'); doc.setTextColor(0,0,0);
  doc.text('DETALLE DE COMPROBANTES',midX,yD+6,{align:'center'});
  doc.line(L+1,yD+8,R-1,yD+8);

  // Headers tabla
  doc.setFontSize(8); doc.setFont('helvetica','bold'); doc.setTextColor(80,80,80);
  doc.text('PROVEEDOR',L+5,yD+15);
  doc.text('DESCRIPCIÓN',L+62,yD+15);
  doc.text('N° FACTURA',L+128,yD+15);
  doc.text('MONTO',R-8,yD+15,{align:'right'});
  doc.setDrawColor(200,200,200); doc.line(L+1,yD+17,R-1,yD+17);

  // Filas
  let y = yD+18;
  doc.setFont('helvetica','normal'); doc.setTextColor(0,0,0);
  rows.forEach((r,i) => {
    if(i%2===0){ doc.setFillColor(252,252,252); doc.rect(L+1,y-4,W-2,9,'F'); }
    doc.setFontSize(9);
    doc.text(doc.splitTextToSize(r.proveedores?.nombre||'—',52)[0], L+5, y+2);
    doc.text(doc.splitTextToSize(r.descripcion||'—',60)[0], L+62, y+2);
    doc.text(r.numero_factura||'—', L+128, y+2);
    doc.setFont('helvetica','bold');
    doc.text(fmtM(r.monto), R-8, y+2, {align:'right'});
    doc.setFont('helvetica','normal');
    y += 9;
  });

  // ── TOTAL
  doc.setLineWidth(0.4); doc.line(L+1,y,R-1,y); y+=2;
  doc.setFillColor(30,36,54); doc.rect(L+1,y,W-2,14,'F');
  doc.setFontSize(11); doc.setFont('helvetica','bold'); doc.setTextColor(255,255,255);
  doc.text('TOTAL:', L+5, y+10);
  doc.setFontSize(14); doc.text(fmtM(total), R-8, y+10, {align:'right'});
  y += 18;

  // ── DETALLE DEL PAGO (cheques, transferencias, etc.)
  if (lineas && lineas.length) {
    y += 6;
    doc.setLineWidth(0.5); doc.line(L+1,y,R-1,y); y += 2;
    doc.setFillColor(230,230,230); doc.rect(L+1,y,W-2,8,'F');
    doc.setFontSize(10); doc.setFont('helvetica','bold'); doc.setTextColor(0,0,0);
    doc.text('DETALLE DEL PAGO', midX, y+6, {align:'center'});
    doc.line(L+1,y+8,R-1,y+8); y+=10;

    // Headers
    doc.setFontSize(8); doc.setFont('helvetica','bold'); doc.setTextColor(80,80,80);
    doc.text('N°',L+5,y+4); doc.text('TIPO',L+14,y+4);
    doc.text('NÚMERO / REF',L+38,y+4); doc.text('BANCO',L+100,y+4);
    doc.text('FECHA COBRO',L+143,y+4); doc.text('MONTO',R-8,y+4,{align:'right'});
    doc.setDrawColor(200,200,200); doc.line(L+1,y+6,R-1,y+6); y+=8;

    doc.setFont('helvetica','normal'); doc.setTextColor(0,0,0);
    lineas.forEach((p, i) => {
      const tipoLabel = {'cheque':'Cheque','cheques':'Cheque','transferencia':'Transferencia','echeq':'E-Cheq','efectivo':'Efectivo','otro':'Otro'}[p.tipo_pago||p.tipo] || (p.tipo_pago||p.tipo||'—');
      const pFecha = p.fecha ? new Date(p.fecha+'T12:00:00').toLocaleDateString('es-AR') : '—';
      if(i%2===0){ doc.setFillColor(252,252,252); doc.rect(L+1,y-3,W-2,8,'F'); }
      doc.setFontSize(8.5);
      doc.text(String(i+1), L+5, y+3);
      doc.text(tipoLabel, L+14, y+3);
      doc.text(doc.splitTextToSize(p.numero||'—',58)[0], L+38, y+3);
      doc.text(doc.splitTextToSize(p.banco||'—',38)[0], L+100, y+3);
      doc.text(pFecha, L+143, y+3);
      doc.setFont('helvetica','bold');
      doc.text(fmtM(p.monto), R-8, y+3, {align:'right'});
      doc.setFont('helvetica','normal');
      y += 8;
    });
    y += 4;

    // Concepto si existe
    const concepto = lineas[0]?.referencia || '';
    if (concepto) {
      doc.setFontSize(8.5); doc.setFont('helvetica','bold'); doc.setTextColor(0,0,0);
      doc.text('CONCEPTO:', L+5, y+4);
      doc.setFont('helvetica','normal');
      doc.text(doc.splitTextToSize(concepto, 150)[0], L+35, y+4);
      y += 8;
    }
  }

  // ── FIRMAS
  const yF = Math.max(y+10, T+220);
  doc.setDrawColor(0,0,0); doc.setLineWidth(0.3);
  doc.line(L+5,yF,L+80,yF); doc.line(L+110,yF,R-5,yF);
  doc.setFontSize(8); doc.setFont('helvetica','normal'); doc.setTextColor(80,80,80);
  doc.text('FIRMA EMISOR', L+35, yF+5, {align:'center'});
  doc.text('FIRMA RECEPTOR', L+147, yF+5, {align:'center'});

  // ── PIE
  const yP = yF+12;
  doc.setFillColor(240,240,240); doc.rect(L+1,yP,W-2,16,'F');
  doc.setLineWidth(0.3); doc.line(L+1,yP,R-1,yP);
  doc.setFontSize(8); doc.setFont('helvetica','bold'); doc.setTextColor(0,0,0);
  doc.text('N° ORDEN: '+nro, L+5, yP+6);
  doc.text('Operador: '+operador, L+5, yP+12);
  doc.setFont('helvetica','normal'); doc.setTextColor(100,100,100);
  doc.text('Sistema ERP — Hidromec SRL / Placemem SRL', R-5, yP+12, {align:'right'});

  doc.save('OrdenPago_'+nro+'.pdf');
}

async function descargarOrdenPago(egresoId){
  // Cargar egreso con joins + líneas de pago
  const {data:eg}=await db.from('egresos')
    .select('*,proveedores(nombre,cuit),empresas(nombre,cuit)')
    .eq('id',egresoId).single();
  if(!eg){toast('No se pudo cargar el egreso','error');return;}

  let lineas=[];
  try{
    const {data:_l,error:_le}=await db.from('egresos_pagos_detalle')
      .select('*')
      .eq('egreso_id',egresoId)
      .order('created_at');
    if(!_le&&_l) lineas=_l;
  }catch(e){ console.warn('egresos_pagos_detalle no disponible:',e); }

  const u=await getUsuario();
  generarPDFOrden(eg,eg.orden_pago_nro||'OP-???',eg.fecha_pago_real||new Date().toISOString().split('T')[0],

function generarPDFOrden(eg,nro,fecha,metodo,operador,pagos=[]){
  // Guard: jsPDF debe estar cargado
  if(!window.jspdf||!window.jspdf.jsPDF){
    toast('Error: librería PDF no cargada. Recargá la página.','error');
    console.error('jsPDF not loaded - window.jspdf:',window.jspdf);
    return;
  }
  // Guard: eg puede ser null si el egreso no se cargó
  if(!eg){
    toast('Error: no se pudieron cargar los datos del egreso.','error');
    console.error('generarPDFOrden: eg is null');
    return;
  }
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF({format:'a4',unit:'mm'});

  const logoB64 = ((eg.empresas?.nombre||'').toLowerCase().includes('placemem')) ? LOGO_PLACEMEM_B64 : LOGO_HIDROMEC_B64;
  const fmtM=v=>new Intl.NumberFormat('es-AR',{style:'currency',currency:'ARS',maximumFractionDigits:0}).format(v||0);
  const fmtD=d=>d?new Date(d+'T12:00:00').toLocaleDateString('es-AR'):'—';

  const L=10,R=200,W=190,midX=105,T=8;

  // ── BORDE DOBLE (igual al remito)
  doc.setDrawColor(0,0,0); doc.setLineWidth(0.8);
  doc.rect(L,T,W,275);
  doc.setLineWidth(0.3);
  doc.rect(L+1,T+1,W-2,273);

  // ── HEADER — fondo gris igual al remito
  doc.setFillColor(245,245,245);
  doc.rect(L+1,T+1,W-2,42,'F');

  // Logo
  doc.setFillColor(245,245,245);
  doc.rect(L+3,T+3,55,22,'F');
  try { doc.addImage('data:image/jpeg;base64,'+logoB64,'JPEG',L+3,T+3,55,22); }
  catch(e) { doc.setFontSize(14);doc.setFont('helvetica','bold');doc.text('HIDROMEC S.R.L.',L+5,T+15); }

  // Datos empresa izquierda
  doc.setFontSize(7.5);doc.setFont('helvetica','normal');doc.setTextColor(80,80,80);
  doc.text('Colectora Oeste 1525 - Zárate - Bs.As.',L+4,T+28);
  doc.text('Tel: 03487-456419',L+4,T+33);
  doc.text('administracion@hidromecsrl.com.ar',L+4,T+38);

  // Línea divisoria vertical
  doc.setDrawColor(180,180,180);doc.setLineWidth(0.3);
  doc.line(midX-15,T+1,midX-15,T+43);

  // Título central — ORDEN DE PAGO en vez de REMITO
  doc.setDrawColor(0,0,0);doc.setLineWidth(0.8);
  doc.setFontSize(18);doc.setFont('helvetica','bold');doc.setTextColor(0,0,0);
  doc.text('ORDEN DE PAGO',midX+15,T+14,{align:'center'});
  doc.setFontSize(13);doc.setFont('helvetica','normal');
  doc.text(nro,midX+15,T+23,{align:'center'});
  doc.setFontSize(10);
  doc.text('Fecha: '+fmtD(fecha),midX+15,T+31,{align:'center'});

  // Datos empresa derecha
  doc.setFontSize(7.5);doc.setTextColor(60,60,60);
  doc.text('C.U.I.T.: '+(eg.empresas?.cuit||'30-71163249-9'),R-5,T+16,{align:'right'});
  doc.setFontSize(8);doc.setFont('helvetica','bold');doc.setTextColor(0,0,0);
  doc.text(eg.empresas?.nombre||'Hidromec S.R.L.',R-5,T+38,{align:'right'});
  doc.setFontSize(9);doc.setFont('helvetica','bold');doc.setTextColor(100,100,100);
  doc.text('ORIGINAL',R-5,T+6,{align:'right'});

  // ── SEPARADOR
  doc.setDrawColor(0,0,0);doc.setLineWidth(0.5);
  doc.line(L+1,T+43,R-1,T+43);

  // ── DATOS PROVEEDOR (mismo estilo que "Datos Cliente" del remito)
  const yC=T+43;
  doc.setFillColor(250,250,250);
  doc.rect(L+1,yC,W-2,36,'F');
  const lX=L+4,vX=L+38;

  doc.setFontSize(8);doc.setFont('helvetica','bold');doc.setTextColor(0,0,0);
  doc.text('PROVEEDOR:',lX,yC+8);
  doc.setFont('helvetica','normal');doc.setFontSize(10);
  doc.text(eg.proveedores?.nombre||'Sin proveedor',vX,yC+8);

  doc.setFont('helvetica','bold');doc.setFontSize(8);
  doc.text('C.U.I.T.:',lX,yC+16);
  doc.setFont('helvetica','normal');
  doc.text(eg.proveedores?.cuit||'—',vX,yC+16);

  doc.setFont('helvetica','bold');
  doc.text('N° FACTURA:',lX,yC+24);
  doc.setFont('helvetica','normal');
  doc.text(eg.numero_factura||'Sin comprobante',vX,yC+24);

  // Derecha proveedor
  doc.setFont('helvetica','bold');doc.setFontSize(8);
  doc.text('EMPRESA:',midX+10,yC+8);
  doc.setFont('helvetica','normal');
  doc.text(eg.empresas?.nombre||'—',midX+32,yC+8);

  doc.setFont('helvetica','bold');
  doc.text('MÉTODO PAGO:',midX+10,yC+16);
  doc.setFont('helvetica','normal');
  doc.text(metodo.charAt(0).toUpperCase()+metodo.slice(1),midX+38,yC+16);

  doc.setFont('helvetica','bold');
  doc.text('LIBERADO POR:',midX+10,yC+24);
  doc.setFont('helvetica','normal');
  doc.text(eg.liberado_por||'—',midX+38,yC+24);

  // Línea
  doc.setLineWidth(0.4);doc.line(L+1,yC+28,R-1,yC+28);
  doc.setFont('helvetica','bold');doc.setFontSize(8);
  doc.text('OPERADOR CAJA:',lX,yC+34);
  doc.setFont('helvetica','normal');
  doc.text(operador,vX,yC+34);

  // ── SECCIÓN DETALLE (equivalente a "Descripción del trabajo")
  const yD=yC+36;
  doc.setDrawColor(0,0,0);doc.setLineWidth(0.5);
  doc.line(L+1,yD,R-1,yD);
  doc.setFillColor(230,230,230);
  doc.rect(L+1,yD,W-2,8,'F');
  doc.setFontSize(11);doc.setFont('helvetica','bold');doc.setTextColor(0,0,0);
  doc.text('DETALLE DEL PAGO',midX,yD+6,{align:'center'});
  doc.line(L+1,yD+8,R-1,yD+8);

  // Headers tabla de pagos
  doc.setFontSize(8);doc.setFont('helvetica','bold');doc.setTextColor(80,80,80);
  doc.text('N°',L+5,yD+15);
  doc.text('TIPO',L+18,yD+15);
  doc.text('NÚMERO / REF',L+50,yD+15);
  doc.text('BANCO',midX+10,yD+15);
  doc.text('FECHA COBRO',midX+50,yD+15);
  doc.text('MONTO',R-10,yD+15,{align:'right'});
  doc.setDrawColor(200,200,200);
  doc.line(L+1,yD+17,R-1,yD+17);

  // Filas de pagos
  let yRow=yD+18;
  const pagosRender=pagos.length?pagos:[{tipo:metodo,numero:'',banco:'',fecha:'',monto:eg?.monto||0}];
  pagosRender.forEach((p,i)=>{
    const bg=i%2===0?[252,252,252]:[248,248,255];
    doc.setFillColor(...bg);doc.rect(L+1,yRow,W-2,10,'F');
    doc.setFont('helvetica','normal');doc.setFontSize(9);doc.setTextColor(0,0,0);
    doc.text(String(i+1),L+5,yRow+7);
    const tipoLabel={'cheque':'Cheque','cheques':'Cheque','transferencia':'Transf.','echeq':'E-Cheq','efectivo':'Efectivo'}[p.tipo_pago||p.tipo]||p.tipo_pago||p.tipo||'—';
    doc.text(tipoLabel,L+18,yRow+7);
    doc.text(String(p.numero||'—').substring(0,20),L+50,yRow+7);
    doc.text(String(p.banco||'—').substring(0,18),midX+10,yRow+7);
    const fechaCobro=p.fecha?new Date(p.fecha+'T12:00:00').toLocaleDateString('es-AR'):'—';
    doc.text(fechaCobro,midX+50,yRow+7);
    doc.setFont('helvetica','bold');
    doc.text(fmtM(p.monto),R-10,yRow+7,{align:'right'});
    yRow+=10;
  });

  // Concepto del egreso
  yRow+=4;
  doc.setFontSize(8);doc.setFont('helvetica','bold');doc.setTextColor(80,80,80);
  doc.text('CONCEPTO:',L+5,yRow+6);
  doc.setFont('helvetica','normal');doc.setTextColor(0,0,0);
  const desc=String(eg?.descripcion||'');
  const descLines=doc.splitTextToSize(desc,150);
  doc.text(descLines,L+36,yRow+6);
  yRow+=10;

  // Si hay observaciones
  if(eg?.observaciones){
    doc.setFont('helvetica','italic');doc.setFontSize(8);doc.setTextColor(80,80,80);
    doc.text('Obs: '+eg.observaciones,L+5,yRow+6);
    yRow+=8;
  }

  // ── TOTAL DESTACADO
  const yTotal=yD+155;
  doc.setFillColor(30,36,54);
  doc.rect(L+1,yTotal,W-2,16,'F');
  doc.setFontSize(11);doc.setFont('helvetica','bold');doc.setTextColor(255,255,255);
  doc.text('MONTO TOTAL PAGADO:',L+8,yTotal+11);
  doc.setFontSize(14);
  doc.text(fmtM(eg.monto),R-8,yTotal+11,{align:'right'});

  // ── FIRMA (igual al remito)
  const yF=yTotal+20;
  doc.setDrawColor(0,0,0);doc.setLineWidth(0.4);
  doc.line(L+1,yF,R-1,yF);
  doc.setFontSize(8.5);doc.setFont('helvetica','italic');doc.setTextColor(60,60,60);
  doc.text('Conforme recibido',L+5,yF+7);
  doc.setFont('helvetica','normal');doc.setTextColor(0,0,0);
  doc.line(L+5,yF+18,L+85,yF+18);
  doc.line(L+100,yF+18,R-5,yF+18);
  doc.setFontSize(8);
  doc.text('FIRMA',L+40,yF+23,{align:'center'});
  doc.text('ACLARACIÓN',L+140,yF+23,{align:'center'});

  // ── PIE (igual al remito — fondo gris con nro de orden)
  const yP=yF+26;
  doc.setFillColor(240,240,240);
  doc.rect(L+1,yP,W-2,20,'F');
  doc.setLineWidth(0.4);doc.line(L+1,yP,R-1,yP);
  doc.setFontSize(9);doc.setFont('helvetica','bold');doc.setTextColor(0,0,0);
  doc.text('N° ORDEN:',L+5,yP+7);
  doc.setFontSize(11);doc.setFont('courier','bold');
  doc.text(nro,L+28,yP+7);
  doc.setFontSize(9);doc.setFont('helvetica','bold');
  doc.text('Fecha emisión:',L+5,yP+14);
  doc.setFontSize(10);doc.setFont('courier','normal');
  doc.text(new Date().toLocaleDateString('es-AR'),L+38,yP+14);
  doc.setFontSize(8);doc.setFont('helvetica','normal');doc.setTextColor(100,100,100);
  doc.text('Sistema ERP — Hidromec SRL / Placemem SRL',R-5,yP+14,{align:'right'});
  doc.setLineWidth(0.3);doc.setDrawColor(0,0,0);
  doc.line(L+1,yP+20,R-1,yP+20);

  doc.save('OrdenPago_'+nro+'.pdf');
}

window.addEventListener('load', init);
</script>
</body>
</html>
